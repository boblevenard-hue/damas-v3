  {n:"Clos Saint-Jean 2021",p:"Pillot",pr:375,g:"Pinot Noir",r:"1er Cru Chassagne Montrachet, Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Premier Cru red Chassagne-Montrachet — rare, as most Chassagne is white. Elegant cherry, mineral finesse from limestone soils. Pillot is a benchmark Chassagne producer. For Burgundy lovers who want to explore beyond the obvious."},
  {n:"Château Fonsalette 2010",p:"Fonsalette",pr:400,g:"Grenache",r:"Côtes du Rhône",c:"France",cl:"rouge",s:"Rouge — France",pf:"Rayas family\'s \'other\' estate — Fonsalette Côtes du Rhône has legendary depth and complexity. 15 years of age gives truffle, leather, dried herbs. The same genius that makes Château Rayas, the most mythical Châteauneuf. Extremely rare."},
  {n:"Haut Bailly 2014",p:"Haut Bailly",pr:400,g:"Cabernets",r:"Pessac-Léognan",c:"France",cl:"rouge",s:"Rouge — France",pf:"Classified Graves from the elegant Pessac-Léognan appellation. Cabernet-dominant with cassis, cedar, tobacco, silk. Haut-Bailly is considered the most harmonious of the Graves. 11 years of age gives beautiful evolution. A complete Bordeaux."},
  {n:"Coteau de Tupin 2019",p:"Stephan",pr:400,g:"Syrah",r:"Côte-Rôtie, Rhône",c:"France",cl:"rouge",s:"Rouge — France",pf:"Côte-Rôtie from cult natural producer Jean-Michel Stephan. Smoke, iron, bacon fat, violets, wild intensity. Stephan\'s wines are raw, powerful, utterly uncompromising. Not for the faint of heart. One of the Rhône\'s most thrilling producers. With faux filet Sharat."},
  {n:"Viaillère 2019",p:"Rostaing",pr:410,g:"Syrah",r:"Côte Rotie, Rhône",c:"France",cl:"rouge",s:"Rouge — France",pf:"Côte-Rôtie from René Rostaing — one of the appellation\'s greatest names. Powerful, smoky Syrah with violet, black olive, bacon, floral elegance. Côte-Rôtie is the northern Rhône\'s most prestigious appellation. With carré d\'agneau or faux filet."},
  {n:"Clos des Chênes 2019",p:"Lafarge",pr:420,g:"Pinot Noir",r:"1er Cru Volnay, Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Premier Cru Volnay from Lafarge (also Beaune 340$). Clos des Chênes is one of Volnay\'s finest vineyards. Pure, perfumed, mineral depth, silk and structure. Lafarge is synonymous with great Volnay. A reference Burgundy."},
  {n:"Tres Girard 2021",p:"Cécile Tremblay",pr:430,g:"Pinot Noir",r:"1er Cru Morey Saint Denis, Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Premier Cru Morey-Saint-Denis from Cécile Tremblay — one of Burgundy\'s most sought-after producers. Tiny production, perpetually allocated. Perfumed, mineral, extraordinary precision. A collector\'s wine."},
  {n:"Chaillot 2017",p:"Thierry Allemand",pr:440,g:"Syrah",r:"Cornas, Rhône",c:"France",cl:"rouge",s:"Rouge — France",pf:"Cult Cornas from the master — Thierry Allemand is THE reference in Cornas. Dark, wild, blackberry, granite, bacon fat, feral intensity. Hand-harvested from terraced granite slopes. The 2017 is drinking magnificently. Monumental Syrah. With faux filet Sharat."},
  {n:"Ariosa 2014",p:"Saouma",pr:450,g:"Grenache",r:"Châteauneuf du Pape",c:"France",cl:"rouge",s:"Rouge — France",pf:"Aged Châteauneuf from Saouma (also Inopia 115$). 11 years of evolution gives leather, truffle, dried garrigue, fig. Deep, complex, and generous. Saouma makes some of the most refined wines in the appellation. For a grand occasion."},
  {n:"Hermitage 2022",p:"Darnaud",pr:450,g:"Syrah",r:"Hermitage, Rhône",c:"France",cl:"rouge",s:"Rouge — France",pf:"Grand Hermitage Syrah from Darnaud (also Crozes 21$/90$ and Saint-Joseph 162$). Black fruit, smoke, leather, powerful tannic frame. Hermitage is the Rhône\'s most legendary appellation — this is the summit of Darnaud\'s range. Built for decades of aging."},
  {n:"Suchots 2021",p:"Lamarche",pr:450,g:"Pinot Noir",r:"1er Cru Vosne Romanée, Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Premier Cru Vosne-Romanée from Lamarche (also Clos de Vougeot 600$ and Echezeaux 600$). Les Suchots borders Romanée-Saint-Vivant Grand Cru. Silk, roses, profound Burgundian depth. One of the most coveted vineyard sites in the world."},
  {n:"Les Poyeux 2018",p:"Clos Rougeard",pr:450,g:"Cabernet Franc",r:"Saumur Champigny, Loire",c:"France",cl:"rouge",s:"Rouge — France",pf:"Legendary Loire Cab Franc from mythical Clos Rougeard (also Brézé Chenin 500$). Violets, graphite, cassis, texture approaching silk. The Foucault brothers made this estate into one of France\'s greatest. Extremely rare and allocated. A grail wine."},
  {n:"Le Bourg 2018",p:"Clos Rougeard",pr:500,g:"Cabernet Franc",r:"Saumur Champigny, Loire",c:"France",cl:"rouge",s:"Rouge — France",pf:"Top cuvée from Clos Rougeard — Le Bourg is the single-vineyard flagship. Profound, mineral, structured Cab Franc with depth rivaling great Bordeaux. Made only in the best vintages. If Les Poyeux is legendary, Le Bourg is mythical. One of France\'s greatest red wines."},
  {n:"Roc des Cambes 2010",p:"Roc des Cambes",pr:500,g:"Merlot, Cabernet Sauvignon",r:"Cotes de Bourg, Bordeaux",c:"France",cl:"rouge",s:"Rouge — France",pf:"Cult Right Bank Bordeaux from François Mitjavile (also of Tertre Roteboeuf). 16 years of age gives complexity: dark fruit, earth, truffle, tobacco. Côtes de Bourg elevated to grand vin level. A Bordeaux icon."},
  {n:"Clos de Vougeot 2022",p:"Lamarche",pr:600,g:"Pinot Noir",r:"Grand Cru Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Grand Cru Clos de Vougeot from Lamarche (also Suchots 450$ and Echezeaux 600$). One of Burgundy\'s most famous walled vineyards, planted by Cistercian monks in the 12th century. Dark cherry, earth, spice, power and refinement. A piece of French history in every glass."},
  {n:"Echezeaux 2021",p:"Lamarche",pr:600,g:"Pinot Noir",r:"Grand Cru Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Grand Cru Echezeaux from Lamarche. Perfumed, complex, with extraordinary Burgundian depth. Echezeaux sits adjacent to Grands-Echezeaux and close to Romanée-Conti. Silk, spice, forest floor. One of the Côte de Nuits\' great vineyards."},
  {n:"Tertre Roteboeuf 2017",p:"Tertre Roteboeuf",pr:820,g:"Merlot, Cabernet Franc",r:"Saint Emilion, Bordeaux",c:"France",cl:"rouge",s:"Rouge — France",pf:"Cult Saint-Émilion from François Mitjavile (also Roc des Cambes 500$). Rich, exotic, remarkable concentration and length. Tertre Roteboeuf revolutionized Saint-Émilion with its ripe, hedonistic style. 8 years of age gives complexity. A Bordeaux cult classic."},
  {n:"Cos d'Estournel Rouge 2000",p:"Cos d'Estournel",pr:850,g:"Cabernet",r:"Saint-Estèphe, Bordeaux",c:"France",cl:"rouge",s:"Rouge — France",pf:"2nd Growth Saint-Estèphe from the legendary year 2000 — over 25 years of age. Cedar, leather, tobacco, dried roses, truffle. Majestic maturity. Cos d\'Estournel is known for its exotic Pagoda-style château. The blanc is also on our list (600$). A monument of Bordeaux."},
  {n:"Grands Echezeaux 2019",p:"Lucien le Moine",pr:900,g:"Pinot Noir",r:"Grand Cru, Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Grand Cru Grands-Echezeaux from luxury négociant Lucien le Moine. Extraordinarily perfumed, deep, and silky. Grands-Echezeaux is a step above Echezeaux — more concentrated and complex. Among Burgundy\'s greatest vineyards. For the ultimate Pinot Noir experience."},
  {n:"Clos De La Roche VV 2017",p:"Ponsot",pr:900,g:"Pinot Noir",r:"Grand Cru, Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Legendary Ponsot Clos de la Roche Vieilles Vignes — one of Burgundy\'s most iconic wines. Laurent Ponsot\'s old-vine Grand Cru. Power, depth, timeless Burgundian elegance, decades of aging ahead. Some of the oldest Pinot Noir vines in existence. A monument."},
  {n:"Château Margaux 2000",p:"Château Margaux",pr:2000,g:"Cabernet",r:"Margaux, Bordeaux",c:"France",cl:"rouge",s:"Rouge — France",pf:"First Growth Bordeaux from the legendary 2000 vintage — 26 years of age. Cassis, violets, graphite, velvet tannins, cedar, tobacco, truffle. Château Margaux is the most elegant of the First Growths. The 2000 is among the greatest vintages ever produced. A once-in-a-lifetime wine."},
  {n:"Château Lafite-Rothschild 2000",p:"Château Lafite",pr:2200,g:"Cabernet",r:"Pauillac, Bordeaux",c:"France",cl:"rouge",s:"Rouge — France",pf:"First Growth Pauillac from the perfect 2000 vintage. Cedar, lead pencil, blackcurrant, iron, aristocratic eternal finish. Lafite is the most refined of the First Growths — pure breeding and class. The most expensive wine on our list and worth every dollar for the experience. History in a glass."},
  {n:"Logistilla 2022",p:"Luna Gaia",pr:66,g:"Nerello Mascalese",r:"Sicilia",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Volcanic Sicilian red from Etna\'s slopes. Cherry, blood orange, ash, mineral character. Light, electric, vibrant acidity. Nerello Mascalese is called \'the Pinot Noir of the Mediterranean.\' Best value Italian red on our list. With pastirma or lighter mezzé."},
  {n:"Scuderia 2022",p:"Conestabile della Staffa",pr:70,g:"Sangiovese",r:"Umbria",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Umbrian Sangiovese from the same producer as our Alè orange (66$). Cherry, dried herbs, gentle earthy character, smooth tannins. Easy-drinking Italian red with natural winemaking integrity. With pasta, pizza, or mezzé."},
  {n:"Temprano 2022",p:"Dos Tierras",pr:75,g:"Tempranillo",r:"Sicilia",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Tempranillo grown in Sicily — Spanish grape, Italian soil. Dark cherry, Mediterranean herbs, soft tannins. An unusual combination that works beautifully. With humus shawarma or pastirma."},
  {n:"Dolcetto d'Alba 2022 (btl)",p:"Veglio",pr:78,g:"Dolcetto",r:"Piemonte",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Full bottle of the Piedmontese Dolcetto also by glass (18$). Mauro Veglio is a respected Barolo producer — this is his everyday red. Dark cherry, violet, bitter almond, soft tannins. The perfect Tuesday-night Italian red."},
  {n:"Donesco 2020",p:"Pacina",pr:80,g:"Sangiovese",r:"Toscana",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Natural Tuscan Sangiovese from historic estate Pacina, farming organically since 1988. Cherry, dried herbs, earthy authenticity. Rustic in the best sense — honest wine from a family with centuries of history. With kibbeh frit or kebab."},
  {n:"Verduno Pelaverga 2023",p:"Rivera",pr:80,g:"Pelaverga",r:"Piemonte",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Rare Piedmontese grape Pelaverga Piccolo — only found in Verduno (also home to Barolo). Light body, spicy white pepper, cherry, aromatic. Rivera also makes our Barolo Monvigliero (200$). A curiosity that delights every time. With kibbeh nayé."},
  {n:"Sankt Anna 2020",p:"In der Eben",pr:85,g:"Schiava",r:"Alto Adige",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Alto Adige Schiava — a light alpine red like nothing else. Wild strawberry, almond, herbal freshness, almost-invisible tannins. In der Eben (also our orange Gewurtz 90$) farms biodynamically above Bolzano. The lightest red on our list. With lighter mezzé or on its own."},
  {n:"Limonte 2023",p:"Braida",pr:85,g:"Grignolino",r:"Piemonte",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Piedmontese Grignolino from famous Barbera producer Braida. Pale ruby, tannic (unusual for a light wine), raspberry, orange peel, herbs. An intellectual wine — light colored but structured. With kibbeh nayé or cured meats."},
  {n:"Chianti Classico 2020",p:"Il Palagio di Panzano",pr:88,g:"Sangiovese",r:"Toscane",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Chianti Classico from the heart of Panzano — one of the zone\'s best villages. Sour cherry, dried herbs, violet, classic Tuscan acidity. Il Palagio also makes our Gran Selezione (280$). Entry into serious Chianti. With kebab or pasta."},
  {n:"Arlechino 2022",p:"Orsi",pr:88,g:"Sept Cépages",r:"Emilia-Romagna",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Seven-grape Emilian blend — a playful field blend from Orsi. Fruity, rustic, natural charm. The name means \'Harlequin.\' Like a carnival of Italian grape varieties in one glass. Fun with mezzé."},
  {n:"Chianti Classico 2021",p:"Valdellecorti",pr:90,g:"Sangiovese",r:"Greve, Toscane",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Authentic Chianti from Greve by tiny artisan producer Valdellecorti. Sour cherry, dried herb, racy food-friendly acidity, earthy tannins. Handmade wine from a family estate. With kebab, kibbeh frit, or halloumi."},
  {n:"Serpullo 2019",p:"Fongoli",pr:110,g:"Sangiovese",r:"Montefalco, Umbria",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Umbrian Sangiovese from Montefalco (usually known for Sagrantino). Dark fruit, earth, structured tannins. Fongoli farms organically in a medieval hilltop village. With kebab or carré d\'agneau."},
  {n:"Bramaterra 2021",p:"Crus",pr:115,g:"Nebbiolo",r:"Alto Piemonte",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Northern Piedmont Nebbiolo — lighter, more perfumed than Barolo. Wild berry, alpine herbs, violets. Alto Piemonte is having a renaissance — these are wines of elegance at more accessible prices. With kibbeh nayé or lighter meat dishes."},
  {n:"Barbaresco 2021",p:"Morro Gabriele",pr:145,g:"Nebbiolo",r:"Barbaresco, Piemonte",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Elegant Barbaresco — Nebbiolo\'s more approachable sibling to Barolo. Rose, tar, red cherry, truffle, fine-grained tannins, long perfumed finish. Drinks younger than Barolo while maintaining structure. With carré d\'agneau or filet mignon."},
  {n:"Rosso Se 2021",p:"Selvadolce",pr:155,g:"Rossese",r:"Liguria",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Ligurian Rossese from the Italian Riviera (same producer as our blanc 135$). Light, herbal, sea-breeze freshness. Rossese is Liguria\'s noble red — delicate and saline. A coastal red wine. With pieuvre or lighter seafood."},
  {n:"Le Trame 2021",p:"Le Boncie",pr:190,g:"Sangiovese",r:"Toscane",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Tuscan Sangiovese of great depth from Le Boncie in Castelnuovo Berardenga. Cherry, iron, mineral, age-worthy tannins. Giovanna Morganti makes one of Tuscany\'s most profound reds from a tiny estate. With kebab or carré d\'agneau."},
  {n:"Barolo Monvigliero 2019",p:"Rivera",pr:200,g:"Nebbiolo",r:"Verduno, Barolo",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Grand cru Barolo from Monvigliero — one of Barolo\'s most prestigious crus, known for sandy soils giving perfumed, elegant wine. Floral, rose petal, truffle, ethereal. Rivera (also Pelaverga 80$) is one of Verduno\'s finest. A Barolo for elegance lovers."},
  {n:"Cantunera 1975",p:"Salemmi",pr:200,g:"Nero d'Avola",r:"Sicilia",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"50-year-old Sicilian treasure — 1975 Nero d\'Avola. Evolved, complex, dried fruit, leather, dried herbs, tobacco. An archaeological wine experience. Salemmi preserved this wine for half a century. A unique opportunity to taste Sicilian history."},
  {n:"Amarone 2015",p:"Secondo Marco",pr:210,g:"Corvina",r:"Valpolicella, Veneto",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Amarone della Valpolicella from natural producer Secondo Marco. Dried cherry, chocolate, fig, rich concentrated fruit from air-dried grapes. Full-bodied, velvety, warming. 10 years of age adds complexity. Traditional Venetian winemaking. With rich desserts or strong cheese."},
  {n:"Brunello di Montalcino 2019",p:"Voliero",pr:215,g:"Sangiovese",r:"Toscana",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Brunello from small producer Voliero. Dark cherry, leather, herbs, structured and authentic. Brunello requires 100% Sangiovese and minimum 5 years aging. Entry into the world of Brunello on our list. With carré d\'agneau or faux filet."},
  {n:"Brunello di Montalcino 2018",p:"San Polino",pr:230,g:"Sangiovese",r:"Toscana",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Biodynamic Brunello from San Polino. Elegant, mineral, cherry, earth. Certified biodynamic since 2002. Shows that Brunello can be refined, not just powerful. With carré d\'agneau."},
  {n:"Barolo Villero 2020",p:"Fenocchio",pr:260,g:"Nebbiolo",r:"Castiglione Falletto",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Barolo from Villero cru in Castiglione Falletto — one of the most powerful Barolo sites. Tannic, structured, rose, tar, dark cherry. Fenocchio is a traditional family producer. Needs time but rewards patience. With faux filet Sharat."},
  {n:"La Vigna delle Bambole 2016",p:"Il Palagio di Panzano",pr:280,g:"Sangiovese",r:"Gran Selezione Chianti Classico",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Top Chianti Gran Selezione from Il Palagio (also Chianti 88$). Concentrated, complex, age-worthy Sangiovese from the best vineyard parcels. \'The Doll\'s Vineyard.\' 10 years of age. With carré d\'agneau or faux filet."},
  {n:"Brunello di Montalcino 2019 (Sesti)",p:"Sesti",pr:290,g:"Sangiovese",r:"Toscana",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Biodynamic Brunello from the Sesti family, who also make astronomical clocks. Dark cherry, leather, dried herb. Deeply authentic, structured. Their estate is also an observatory. A wine for those who look at the stars. With grillades."},
  {n:"Barolo Cannubi 2019",p:"Fenocchio",pr:290,g:"Nebbiolo",r:"Barolo",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Barolo from legendary Cannubi vineyard — historically the first site called \'Barolo.\' Perfumed, complex, age-worthy. Cannubi is the most famous Barolo cru. Fenocchio (also Villero 260$) makes traditional style. A reference Barolo."},
  {n:"Barolo Ginestra 2019",p:"Diego Conterno",pr:290,g:"Nebbiolo",r:"Monforte d'Alba",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Ginestra cru Barolo from Monforte — known for powerful, structured wines. Rose, truffle, tar, dark cherry. Diego Conterno is the brother of the legendary Roberto. Concentrated and long-aging. With faux filet or carré d\'agneau."},
  {n:"Brunello Santa Maria 2019",p:"Colleoni",pr:290,g:"Sangiovese",r:"Brunello di Montalcino",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Single-vineyard Brunello from the Santa Maria sub-zone. Concentrated, mineral, cherry, earth. Colleoni is a small artisan producer. With carré d\'agneau or aged cheese."},
  {n:"Brunello di Montalcino 2019 (Sesti 2)",p:"Sesti",pr:315,g:"Sangiovese",r:"Brunello di Montalcino",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Reserve-level Brunello from Sesti. Deeper, more complex than the regular bottling (290$). Structured for very long aging. Selected from the oldest vines. For serious Brunello collectors."},
  {n:"Tre Stelle 2020",p:"Cascina Delle Rose",pr:315,g:"Nebbiolo",r:"Barbaresco",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Barbaresco from the stellar Tre Stelle vineyard by Cascina Delle Rose. Rose, tar, red cherry, fine-grained Nebbiolo elegance. A beautiful expression of Barbaresco\'s feminine side. With carré d\'agneau or filet mignon."},
  {n:"Brunello di Montalcino 2019 (Ucceliera)",p:"Ucceliera",pr:340,g:"Sangiovese",r:"Brunello di Montalcino",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Powerful Brunello from Ucceliera — one of Montalcino\'s most respected addresses. Dark fruit, leather, concentrated, structured. Andrea Cortonesi\'s wines are consistently among the appellation\'s best. With faux filet Sharat."},
  {n:"Barolo Brunate 2019",p:"Rinaldi",pr:350,g:"Nebbiolo",r:"La Morra, Barolo",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Traditional Barolo from Brunate cru by Giuseppe Rinaldi — one of the last guardians of old-school Barolo. Tar, roses, ethereal Nebbiolo elegance. Rinaldi\'s wines are legendary and highly allocated. A traditionalist\'s dream."},
  {n:"Monte dal Ora 2015",p:"La Stropa",pr:350,g:"Corvina",r:"Amarone della Valpolicella, Veneto",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Natural Amarone from La Stropa (Monte dal Ora). Rich, complex, dried fruit, mineral depth, chocolate, fig. A more elegant, less bombastic Amarone than commercial examples. 10 years of age. With rich dishes or contemplation."},
  {n:"Phenomena 2018",p:"Sesti",pr:400,g:"Sangiovese",r:"Brunello di Montalcino",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Top cuvée Brunello from Sesti (also 290$ and 315$). Extraordinary depth, concentration, aging potential. Named \'Phenomena\' — the astronomical connection again. Made only in exceptional vintages. A collector\'s Brunello."},
  {n:"Barolo Piè Rupestris 2019",p:"Cappellano",pr:430,g:"Nebbiolo",r:"Serralunga d'Alba",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Cult Cappellano Barolo from Serralunga — one of Italy\'s most revered producers. Powerful, tannic, immense aging potential. Cappellano also invented chinato (Barolo with herbs). A piece of Piedmontese heritage."},
  {n:"Rocche dell Annunziata 2017",p:"Mauro Veglio",pr:430,g:"Nebbiolo",r:"La Morra",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"La Morra cru Barolo from Mauro Veglio (also our Dolcetto 18$/78$). Perfumed, elegant, rose, truffle. La Morra is known for Barolo\'s most graceful wines. 8 years of age. The summit of Veglio\'s range."},
  {n:"Barolo 2019",p:"Bartolo Mascarello",pr:450,g:"Nebbiolo",r:"Barolo",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Traditional Barolo from the legendary Bartolo Mascarello estate, now run by daughter Maria Teresa. Multi-vineyard blend — tar, roses, timeless ethereal elegance. Mascarello famously made labels saying \'No Barrique, No Berlusconi.\' A political and viticultural icon."},
  {n:"Barolo Riserva 2016",p:"Vietti",pr:450,g:"Nebbiolo",r:"Barolo",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Reserve Barolo from historic house Vietti. Powerful, structured, built for decades. Extended aging in large oak barrels. Vietti is one of Barolo\'s most consistent and respected names. For very special occasions."},
  {n:"Magma 2019",p:"Cornelissen",pr:575,g:"Nerello Mascalese",r:"Etna, Sicilia",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Cult volcanic wine from Belgian-born Frank Cornelissen on Etna. Unfiltered, unfined, wild: ash, iron, blood, primal raw intensity. Made in buried amphora from the highest vineyards on the volcano. Nothing else tastes like this. The most radical wine on our list."},
  {n:"Barolo Piè Franco 2019",p:"Cappellano",pr:650,g:"Nebbiolo",r:"Serralunga d'Alba, Piemonte",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"Pre-phylloxera Barolo from ungrafted vines — \'Piè Franco\' means \'free foot\' (own roots). Extraordinary rarity, depth, ethereal complexity. These vines survived the phylloxera epidemic that destroyed most European vineyards. A living miracle. Among Italy\'s most coveted wines."},
  {n:"Asili Riserva 2014",p:"Giacosa",pr:800,g:"Nebbiolo",r:"Barbaresco, Piemonte",c:"Italie",cl:"rouge",s:"Rouge — Italie",pf:"The red label Giacosa — Bruno Giacosa\'s Riserva is among Italy\'s greatest wines, period. The Asili vineyard in Barbaresco is the source. Rose, tar, truffle, cherry liqueur, immortal tannic structure. Giacosa\'s red label indicates an exceptional vintage. 11 years of age. A masterpiece of Italian winemaking."},
  {n:"Ayehoros 2022 (btl)",p:"Dalamara",pr:75,g:"Xinomavro, Merlot",r:"Naoussa",c:"Grèce",cl:"rouge",s:"Rouge — Moyen-Orient",pf:"Full bottle of the Greek blend also by glass (17$). Xinomavro tannic bite, Merlot fruit. Tomato leaf, cherry, earthy complexity. Naoussa is Greece\'s most prestigious red wine region. With kebab, kibbeh, or mezzé."},
  {n:"Limnio 2022",p:"Aslanis",pr:80,g:"Limnio",r:"Thessaloniki",c:"Grèce",cl:"rouge",s:"Rouge — Moyen-Orient",pf:"Ancient Greek grape Limnio — mentioned by Aristotle. Herbal, earthy, bay leaf, unique Mediterranean character. From Thessaloniki in northern Greece. Aslanis is reviving this historic variety. A living connection to ancient Greek winemaking."},

  {n:"Heritage 2015",p:"Château Cana",pr:85,g:"Grenache, Cabernet",r:"Mont Liban",c:"Liban",cl:"rouge",s:"Rouge — Moyen-Orient",pf:"Aged Lebanese blend with 11 years of evolution. Garrigue, dark fruit, cedar, dried herbs. Rich and warming. Château Cana is one of Lebanon\'s growing number of quality producers. Mediterranean generosity with Middle Eastern spice. With kebab or carré d\'agneau."},
  {n:"Bargylus Rouge 2017 (btl)",p:"Bargylus",pr:145,g:"Syrah, Cabernet",r:"Lattakia",c:"Syrie",cl:"rouge",s:"Rouge — Moyen-Orient",pf:"Full bottle of Syria\'s iconic red also by glass (27$). The most meaningful wine on our list — produced from coastal Lattakia vineyards managed remotely during the civil war. Dark fruit, leather, garrigue. A testament to resilience, culture, and the enduring human spirit. With any of our grillades."},
  {n:"Amaltea 2021",p:"Loxarel",pr:75,g:"Merlot",r:"Penedès, Catalonia",c:"Espagne",cl:"rouge",s:"Rouge — Espagne",pf:"Organic Catalan Merlot from biodynamic producer Loxarel. Plum, Mediterranean herbs, soft approachable tannins. Loxarel is one of Penedès\' most respected organic estates. With lighter mezzé or pastirma."},
  {n:"Palhete 2019",p:"Vale da Capucha",pr:80,g:"Castelinho, Arinto",r:"Torres Vedras",c:"Portugal",cl:"rouge",s:"Rouge — Espagne",pf:"Portuguese field blend from near Lisbon. Fresh, Atlantic-influenced, herbal character. \'Palhete\' refers to the old tradition of co-fermenting red and white grapes. Vale da Capucha farms close to the ocean. With mezzé or pieuvre."},
  {n:"Tutti Frutti 2021",p:"Viuva Gomes",pr:92,g:"Ramisco, Malvasia",r:"Colares",c:"Portugal",cl:"rouge",s:"Rouge — Espagne",pf:"Rare Colares wine from ungrafted vines growing in sand — one of the only European regions where phylloxera never struck. Sea salt, dark berry, wild ancient character. Ramisco is among the rarest grapes in the world. A viticultural miracle. For wine geeks."},
  {n:"Emma 2020",p:"Vega Aixala",pr:95,g:"Carinyena",r:"Tarragona, Catalonia",c:"Espagne",cl:"rouge",s:"Rouge — Espagne",pf:"Catalan Carignan (Carinyena) from Tarragona. Dark fruit, herbs, Mediterranean depth. Vega Aixala is part of Catalonia\'s natural wine movement. Named for the winemaker\'s daughter. With kebab or kibbeh frit."},
  {n:"BB 2020",p:"Partida Creus",pr:100,g:"Bobal",r:"Penedès, Catalonia",c:"Espagne",cl:"rouge",s:"Rouge — Espagne",pf:"Natural Bobal from cult Catalan producers Partida Creus (also BS orange 100$). Dark fruit, earth, untamed compelling rusticity. Bobal is Spain\'s underdog grape — dark, dense, and characterful. For natural wine enthusiasts. With kebab or carré d\'agneau."},
  {n:"Finca Los Quemados 2022",p:"Goyo Garcia Viadero",pr:110,g:"Tempranillo",r:"Ribeira del Duero",c:"Espagne",cl:"rouge",s:"Rouge — Espagne",pf:"Ribera del Duero Tempranillo from old-vine specialist Goyo Garcia Viadero. Dark fruit, earth, structured elegance. Ribera del Duero at its most authentic — no new oak, no manipulation. With filet mignon or kebab."},
  {n:"Os Granitos 2021",p:"Madeira",pr:220,g:"Jaen",r:"Dão",c:"Portugal",cl:"rouge",s:"Rouge — Espagne",pf:"Granite-grown Dão red from Álvaro de Castro\'s Madeira estate. Jaen grape (Mencía) with black fruit, violet, stony mineral backbone. Serious, age-worthy Portuguese wine. The Dão is one of Portugal\'s most exciting regions. With carré d\'agneau or faux filet."},
  {n:"Un de Ces Quatres 2023",p:"Nival",pr:70,g:"Gamaret",r:"Lac Saint Pierre",c:"Québec",cl:"rouge",s:"Rouge — Canada",pf:"Quebec Gamaret from Nival (also whites 70$/85$ and sparkling 72$). Dark cherry, pepper, fresh Northern-climate vibrancy. Gamaret is a Swiss hybrid that thrives in cold climates. Local wine at its best. With lighter mezzé or on its own."},
  {n:"Frangin 2023",p:"Pinard et Filles",pr:75,g:"Marquette",r:"Lanoraie",c:"Québec",cl:"rouge",s:"Rouge — Canada",pf:"Hybrid Marquette from Pinard et Filles (also Riesling 95$, Frontenac Gris 85$). Wild berry, smoke, rugged Quebec character. Marquette is a cold-hardy grape developed at the University of Minnesota. With pastirma or lighter grillades."},
  {n:"Barbotine 2022",p:"Club de Jus",pr:75,g:"Cabernet Franc, Riesling",r:"Creemore Hills",c:"Ontario",cl:"rouge",s:"Rouge — Canada",pf:"Ontario Cab Franc-Riesling blend — a unique co-fermentation. Fresh, herbal complexity, light body. Club de Jus is part of Ontario\'s young natural wine movement. Creative and unconventional. With mezzé or kibbeh nayé."},
  {n:"Cap à l'Est 2023",p:"Pinard et Filles",pr:88,g:"Assemblage Hybrides",r:"Magog",c:"Québec",cl:"rouge",s:"Rouge — Canada",pf:"Quebec hybrid blend from Pinard et Filles\' Eastern Townships vineyards. Dark fruit, herbs, local terroir expression. A more serious red than the Marquette. Shows the depth Quebec reds can achieve. With kebab or lighter grillades."},
  {n:"L'Homère 2020",p:"Pearl Morissette",pr:118,g:"Merlot",r:"Lincoln Lakeshore",c:"Ontario",cl:"rouge",s:"Rouge — Canada",pf:"Niagara Merlot from Pearl Morissette — arguably Canada\'s finest winery. Plum, graphite, cool-climate elegance that challenges assumptions about Canadian wine. François Morissette is one of North America\'s most talented winemakers. With filet mignon or shish taouk."},

const SECTIONS = [...new Set(W.map(w=>w.section))];
const C = {bg:"#0F0E0C",surface:"#1A1916",card:"#222019",border:"#3A362E",gold:"#C4A265",cream:"#E8DCC8",text:"#C5BBA8",muted:"#8A8070",white:"#F5F0E6",aiBg:"#1E1D1A",aiBdr:"#4A4535"};
const FLAGS={"France":"🇫🇷","Italie":"🇮🇹","Espagne":"🇪🇸","Allemagne":"🇩🇪","Grèce":"🇬🇷","Liban":"🇱🇧","Syrie":"🇸🇾","Arménie":"🇦🇲","Autriche":"🇦🇹","Slovénie":"🇸🇮","Tchéquie":"🇨🇿","Portugal":"🇵🇹","Québec":"🏔️","Ontario":"🍁","États-Unis":"🇺🇸"};

const CLABELS={blanc:"Blanc",rouge:"Rouge",rosé:"Rosé",orange:"Orange",bulles:"Bulles"};

function App(){
  const [tab,setTab]=useState("wine");
  const [section,setSection]=useState(SECTIONS[0]);
  const [drinkSec,setDrinkSec]=useState("Cocktails");
  const [selected,setSelected]=useState(null);
  const [query,setQuery]=useState("");
  const [priceFilter,setPriceFilter]=useState("all");
  const [aiMode,setAiMode]=useState(false);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiResp,setAiResp]=useState(null);
  const [aiWines,setAiWines]=useState([]);
  const inputRef=useRef(null);

  // ===== SOMMELIER BRAIN — Local, instant, encyclopedic =====

  // Multi-signal wine scorer: parses query for taste, food, grape, region, occasion, budget, color
  const scoreWine=(wine,q)=>{
    const ql=q.toLowerCase();const pl=wine.profile.toLowerCase();const all=(wine.name+" "+wine.producer+" "+wine.grape+" "+wine.region+" "+wine.country+" "+wine.profile).toLowerCase();let s=0;
    // Direct field matches (name, producer, grape, region)
    [wine.name,wine.producer,wine.grape,wine.region,wine.country].forEach(f=>{f.toLowerCase().split(/[\s,]+/).forEach(w=>{if(w.length>2&&ql.includes(w))s+=15})});
    // Taste-to-profile matching (15 taste dimensions)
    const T=[
      [/\b(fresh|frais|fraîche|refreshing|crisp|vif|clean)\b/,/fresh|crisp|refreshing|light|mineral|bright|saline|clean/,8],
      [/\b(low acid|peu acide|doux|douce|soft|smooth|mellow|gentle|round|rond|subtle|soyeux)\b/,/soft|silky|round|gentle|balanced|smooth|mellow|velvety|approachable/,9],
      [/\b(bold|puissant|powerful|intense|rich|riche|full|big|heavy|strong|deep|robust|corsé|charpenté)\b/,/full|bold|powerful|intense|rich|deep|dark|concentrated|robust|massive|monumental/,8],
      [/\b(light|léger|légère|delicate|délicat|ethereal|airy|fin|fine)\b/,/light|delicate|ethereal|translucent|gentle|fine|pale|airy|easy/,8],
      [/\b(fruity|fruit|fruits|fruité|berry|berries|peach|pêche|cherry|cerise|apple|pomme|tropical|citrus|agrumes)\b/,/fruit|berry|cherry|peach|apple|plum|citrus|tropical|melon|strawberry|raspberry|blackberry/,6],
      [/\b(earthy|terreux|mineral|minéral|stone|stony|volcanic|volcanique|chalk|calcaire|terroir)\b/,/earth|mineral|stone|chalk|slate|volcanic|granite|flint|saline|iodine|ash|iron/,7],
      [/\b(spicy|épicé|pepper|poivre|peppery|spice|spiced|warm|chaleureux|épices)\b/,/pepper|spice|spicy|warm|cinnamon|garrigue|seven.spice|cardamom/,6],
      [/\b(smoky|fumé|smoke|charcoal|grilled|roasted|toasted|char)\b/,/smoke|smoky|char|roast|toast|grilled|ash|fire|bacon/,6],
      [/\b(floral|flower|flowers|rose|violet|blossom|perfume|perfumed|aromatic|aromatique)\b/,/floral|rose|violet|blossom|flower|perfume|aromatic|jasmine|elderflower|lavender|orange.blossom/,6],
      [/\b(dry|sec|sèche|brut|bone.dry|très sec)\b/,/dry|brut|bone.dry|zero.dosage|nature/,5],
      [/\b(sweet|sucré|off.dry|demi.sec|honeyed|miel|moelleux)\b/,/sweet|off.dry|demi.sec|honeyed|honey|lychee|residual/,6],
      [/\b(tannic|tannin|tannins|structured|structuré|firm|grip|chewy|charpenté)\b/,/tannin|structured|firm|grip|chewy|powerful|concentrated|age.worthy/,6],
      [/\b(funky|natural|naturel|wild|sauvage|raw|alive|cloudy|unfiltered|vin nature|skin.contact|macération|biodynami)\b/,/funky|natural|wild|raw|unfiltered|skin.contact|cloudy|alive|amber|oxidative|biodynamic|pét.nat|ancestral/,9],
      [/\b(oxidative|oxidé|sherry|nutty|noix|walnut|sous.voile|curry)\b/,/oxidative|walnut|nutty|sherry|curry|sous.voile|almond|hazelnut/,7],
      [/\b(elegant|élégant|refined|raffiné|classy|sophistiqué|complex|complexe|precise|précis)\b/,/elegant|refined|complex|sophisticated|precise|finesse|silky|pure|profound|extraordinary/,7],
    ];
    T.forEach(([qRx,pRx,pts])=>{if(qRx.test(ql)&&pRx.test(pl))s+=pts});
    // Color
    if(/\b(blanc|white)\b/.test(ql)&&wine.color==="blanc")s+=12;
    if(/\b(rouge|red)\b/.test(ql)&&wine.color==="rouge")s+=12;
    if(/\b(rosé|rose)\b/.test(ql)&&wine.color==="rosé")s+=12;
    if(/\borange\b/.test(ql)&&wine.color==="orange")s+=12;
    if(/\b(bulles|sparkling|champagne|pétillant|mousseux|bubbly|bubbles)\b/.test(ql)&&wine.color==="bulles")s+=12;
    // Price
    const pm=ql.match(/(?:under|moins de|below|max|budget|around|environ|sous|under)\s*(\d+)/);
    if(pm){const mx=parseInt(pm[1]);if(wine.price<=mx)s+=10;else s-=25}
    if(/\b(cheap|affordable|pas cher|budget|économique|entry|value|bon marché|abordable)\b/.test(ql)&&wine.price<100)s+=7;
    if(/\b(cheap|affordable|pas cher|budget)\b/.test(ql)&&wine.price>200)s-=10;
    if(/\b(splurge|special|best|finest|meilleur|prestige|luxury|rare|exception|top|grand|greatest|collector)\b/.test(ql)&&wine.price>200)s+=6;
    // By the glass
    if(/\b(glass|verre|au verre)\b/.test(ql)&&wine.section==="By the Glass")s+=18;
    // Region/country
    if(/\b(local|québec|quebec|montréal|montreal|canadian|canada|ontario|d'ici|chez nous)\b/.test(ql)&&["Québec","Ontario"].includes(wine.country))s+=16;
    if(/\b(middle.east|moyen.orient|syrian|syrien|lebanese|libanais|liban|syria|syrie|greek|grec|grèce|armenian|arménie|levant)\b/.test(ql)&&["Liban","Syrie","Grèce","Arménie"].includes(wine.country))s+=16;
    if(/\b(italian|italien|italie|italy|piemonte|piedmont|toscane|tuscany|sicil|barolo|barbaresco|brunello|chianti|etna|nebbiolo|sangiovese|abruzzo)\b/.test(ql)&&wine.country==="Italie")s+=14;
    if(/\b(french|français|france|bordeaux|bourgogne|burgundy|loire|rhône|rhone|jura|alsace|champagne|chablis|languedoc|roussillon|provence|cornas|hermitage)\b/.test(ql)&&wine.country==="France")s+=14;
    if(/\b(spain|spanish|espagne|espagnol|rioja|catalonia|penedès|jerez|portugal|portugais|dão|colares)\b/.test(ql)&&["Espagne","Portugal"].includes(wine.country))s+=14;
    if(/\b(german|allemand|allemagne|mosel|baden|austrian|autrich|czech|tchéquie|slovénie)\b/.test(ql)&&["Allemagne","Autriche","Tchéquie","Slovénie"].includes(wine.country))s+=14;
    // Celebration
    if(/\b(celebrat|fête|anniversary|anniversaire|birthday|toast|special occasion|propose|engagement|mariage|wedding)\b/.test(ql)&&wine.color==="bulles")s+=18;
    // Grape words
    wine.grape.toLowerCase().split(/[\s,]+/).forEach(g=>{if(g.length>3&&ql.includes(g))s+=14});
    // Producer-specific search
    if(wine.producer.toLowerCase().split(/[\s,]+/).some(p=>p.length>3&&ql.includes(p)))s+=20;
    return s;
  };

  // ===== FOOD PAIRING DATABASE =====
  const FOOD={
    fattouch:{kw:["fattouch","fattoush","fattouche"],cl:["blanc","rosé","bulles"],av:["rouge"],t:["fresh","crisp","mineral","light","herbal","citrus","saline"],r:"The fattouch — our classic Syrian salad with sumac, pomegranate, fresh herbs, fried pita, and pourpier. It's all about brightness and acidity.\n\nYou want a wine that mirrors that vibrancy: crisp whites with mineral drive, dry rosés with herbal edge, or a bone-dry sparkling to play off the crunchy pita. Avoid heavy reds — they'd clash with the sumac's tartness."},
    olives:{kw:["olives","olive"],cl:["blanc","rosé","orange"],t:["saline","herbal","mineral","savory"],r:"Our olive variety — 8 different types with pomegranate molasses and sesame. Briny, savory, herbal. Served complimentary to start.\n\nA saline white or textured orange wine echoes their Mediterranean character beautifully."},
    plateau:{kw:["plateau","mezzés du chef","chef's selection","platter of dips"],cl:["blanc","rosé","orange","bulles"],t:["versatile","textured","mineral","medium","fresh"],r:"The chef's mezzé plateau — smoky muttabal, spicy mouhammara, creamy humus, earthy beetroot. Four distinct flavors on one plate.\n\nYou need a wine versatile enough to dance with all of them. A textured white, skin-contact orange, or aromatic rosé handles this range. Sparkling works brilliantly as a palate cleanser between bites."},
    pastirma:{kw:["pastirma","pastirme"],cl:["rouge","rosé"],t:["savory","spice","umami","earthy"],r:"The Pastirma — dried filet mignon charcuterie with Kasseri cheese, garlic sauce, fried quail egg. Rich, savory, umami-packed. Eat it in one bite, with your hands.\n\nA medium-bodied red or structured rosé matches the cured meat's intensity."},
    makdous:{kw:["makdous"],cl:["orange","rosé","blanc"],t:["earthy","tangy","nutty","fermented"],r:"The Makdous — fermented baby eggplant stuffed with walnuts on warm pita, topped with fried quail egg. Earthy, tangy, deep umami from the fermentation.\n\nSkin-contact orange wines are a natural match — their tannic, herbal character mirrors the fermented eggplant."},
    baba:{kw:["baba ghannouj","baba","ghannouj"],cl:["blanc","rosé","orange"],t:["smoky","tangy","nutty","textured"],r:"Our Baba Ghannouj — it's a salad, not a dip — with smoked eggplant, feta, walnuts, and pomegranate. Smoky, tangy, beautifully textured.\n\nA white with some body, a mineral rosé, or an orange wine can match the smokiness without overwhelming the freshness."},
    labhne:{kw:["labhne","labneh","labné"],cl:["blanc","rosé","bulles"],t:["creamy","tangy","herbal","fresh"],r:"Our labneh — strained sheep's milk yogurt with grilled olives, zaatar, and cherry tomatoes. Creamy, tangy, herbaceous.\n\nCrisp white with good acidity cuts through richness, herbal zaatar echoes aromatic wines. Sparkling is always lovely with dairy."},
    muttabal_beet:{kw:["muttabal de betterave","beetroot","betterave"],cl:["blanc","rosé","orange"],t:["earthy","creamy","tangy","mineral"],r:"Muttabal de betteraves — creamy beetroot purée with tahini, sheep yogurt, raw garlic, and lemon. Earthy, vibrant.\n\nBeet earthiness loves mineral-driven whites and rosés. Orange wines pair beautifully too — their tannic structure matches tahini's weight."},
    muttabal_aub:{kw:["mutabbal","muttabal d'aubergine","eggplant dip"],cl:["blanc","orange","rosé"],t:["smoky","creamy","silky"],r:"Mutabbal d'aubergine — the classic. Smoky grilled eggplant purée with tahini and pomegranate seeds. Silky, smoky, deeply satisfying.\n\nSmoke + cream calls for wines with texture and character. A skin-contact orange or full-bodied white stands up beautifully."},
    mouhammara:{kw:["mouhammara","muhammara","mouhamara","pepper dip"],cl:["rosé","rouge","orange"],t:["spicy","sweet","nutty","fruity"],r:"Mouhammara — Aleppo's signature. Roasted red peppers, walnuts, pomegranate molasses, cumin. Sweet heat with nutty depth.\n\nFruity rosés or medium reds with soft tannins complement the pepper's sweetness. Orange wines echo the nutty complexity."},
    humus:{kw:["humus","hummus","houmous"],cl:["blanc","orange"],t:["creamy","smooth","garlicky","round"],r:"Our Humus — silky chickpea purée with tahini, garlic, Aleppo pepper. Smooth, creamy, deeply satisfying with warm pita.\n\nA wine with enough texture to match tahini's weight and acidity to cut through richness. Textured whites or orange wines are perfect."},
    kibbeh:{kw:["kibbeh","kibbé","kibbe","nayé","naye","lamb tartare","tartare d'agneau"],cl:["rouge","rosé"],av:["bulles"],t:["delicate","spiced","lean","herbal","raw"],r:"Kibbeh Nayé — our traditional lamb tartare from New Zealand, finely ground with bulgur, mint, marjoram, and seven spices. The texture is uniquely smooth and compact.\n\nThis is delicate despite being raw — a lighter, perfumed red or structured rosé respects its subtlety. Nothing too heavy."},
    yalanji:{kw:["yalanji","feuilles de vigne","grape leaves","dolma"],cl:["blanc","rosé","orange"],t:["herbal","acidic","sweet","fresh"],r:"Yalanji — tender grape leaves stuffed with rice, pine nuts, caramelized onions, pomegranate molasses on labneh. Herbal, acidic, sweet-savory.\n\nAcidity of grape leaves and pomegranate loves a crisp white. Pine nuts and labneh can also handle an orange wine's weight."},
    borek:{kw:["borek","börek","jibne","cheese pastry"],cl:["bulles","blanc"],t:["crispy","rich","cheesy"],r:"Borek aux fromages — crispy pastry with Akkawi and Kasseri cheeses, nigella seeds, fig-onion purée. Crunchy, cheesy, indulgent.\n\nNothing beats sparkling wine with fried cheese — bubbles cut right through richness. A mineral white also works."},
    kibbeh_frit:{kw:["kibbeh frit","fried kibbeh","croquette"],cl:["rouge","rosé"],t:["crispy","spiced","rich","nutty"],r:"Kibbeh frit — fried lamb croquettes with pistachios, walnuts, seven spices on beetroot muttabal. Crispy outside, juicy inside.\n\nNote: NOT halal. A medium red with spice notes or structured rosé matches the seven-spice blend."},
    shish_borek:{kw:["shish borek","dumplings","ravioli syrien"],cl:["blanc","rouge"],t:["comforting","creamy","herbal","aromatic"],r:"Shish Borek — Syrian lamb dumplings pan-seared then served in warm sheep yogurt with garlic, coriander ghee, pine nuts. Comforting and aromatic.\n\nThe yogurt sauce needs a wine that won't fight its acidity. Rich white or lighter elegant red works beautifully."},
    humus_shawarma:{kw:["humus shawarma","shawarma"],cl:["rouge","rosé"],t:["rich","aromatic","spiced","creamy"],r:"Humus Shawarma — silky hummus topped with New Zealand lamb leg in seven spices, pomegranate molasses, pine nuts. Our richest hummus.\n\nThe spiced lamb takes this into red wine territory. Medium-bodied reds with spice and fruit are ideal."},
    humus_champi:{kw:["humus aux champignons","mushroom hummus","champignon","mushroom"],cl:["blanc","orange","rouge"],t:["earthy","umami","creamy"],r:"Humus aux champignons — hummus topped with sautéed king oyster mushrooms (local Montreal grower Big Bloc!), pine nuts, Aleppo pepper. Earthy umami meets creamy chickpea.\n\nVegan and deeply savory. Earthy whites, orange wines, or lighter reds with mushroom notes are ideal."},
    crevettes:{kw:["crevettes","shrimp","kataifi","crevette"],cl:["blanc","bulles","rosé"],t:["sweet","savory","crispy","aromatic"],r:"Crevettes Kataifi — Argentine shrimp in crispy angel-hair pastry with honey, zaatar, labneh. Sweet-savory, crunchy, aromatic.\n\nHoney-zaatar combo loves aromatic whites or festive sparkling. Dry rosé also works well with seafood."},
    pieuvre:{kw:["pieuvre","octopus","poulpe"],cl:["blanc","rosé","orange"],t:["Mediterranean","citrusy","herbal","saline","mineral"],r:"Salade de pieuvre — pan-seared Moroccan octopus with chickpea salad, herbs, lemon aïoli. Mediterranean to the core.\n\nSaline mineral whites are natural here. Rosés with herbal character work beautifully. Orange wines add textural dimension."},
    halloumi:{kw:["halloumi","légumes grillés","grilled vegetables","légumes"],cl:["blanc","rosé","orange"],t:["smoky","salty","herbal","charred"],r:"Légumes grillés et Halloumi — charcoal-grilled sheep's cheese with maitake, courgette, eggplant, zaatar, pomegranate molasses. Smoky, salty, herbaceous.\n\nMineral whites, herbal rosés, or textured orange wines all shine with the charcoal and zaatar."},
    bar:{kw:["bar grillé","moujaddara","sea bass","loup de mer","poisson grillé"],cl:["blanc","rosé"],av:["rouge"],t:["delicate","mineral","fresh","herbal","earthy","citrus"],r:"Bar grillé avec moujaddara — Atlantic wild sea bass, charcoal-grilled with crispy skin, on braised lentils and bulgur with beet salad and lemon gremolata.\n\nFun fact: it's called 'bar' in the Atlantic and 'loup de mer' in the Med. The fish is delicate, lentils are earthy — a white with mineral drive bridges both."},
    joue:{kw:["joue","beef cheek","joue de boeuf","friki"],cl:["rouge"],t:["rich","hearty","umami","smoky","deep","bold"],r:"Joue de boeuf braisée avec Friki — Canada Prime beef cheeks braised until meltingly tender on smoked Syrian wheat (friki) with saffron, pine nuts, raisins. Rich, hearty, deeply savory.\n\nNOT halal. You need a serious red — structured, earthy, with depth to match braised meat and smoked grain."},
    jarret:{kw:["jarret","lamb shank","fattet","mozat"],cl:["rouge"],t:["rich","comforting","spiced","tender","deep"],r:"Jarret d'agneau Fattet Mozat — NZ lamb shank braised for hours in seven spices, on chickpeas with tahini yogurt and grilled pita. Fall-off-the-bone tender.\n\nThis demands structure. Full-bodied reds with spice, garrigue, or earthy depth."},
    daurade:{kw:["daurade","sea bream","samke harra","samke","dorade","whole fish"],cl:["blanc","rosé"],t:["aromatic","spiced","herbal","delicate","citrus"],r:"Daurade Rose Samke Harra — whole Greek sea bream, roasted and stuffed with vegetables, coriander, cumin, Aleppo pepper. Skin is crispy and edible, no bones.\n\nAromatic spiced fish needs a white with character — herbal, citrusy, with some body. Structured rosé can also work."},
    taouk:{kw:["taouk","shish taouk","poulet","chicken"],cl:["blanc","rosé","rouge"],t:["light","aromatic","charred","creamy"],r:"Shish Taouk — chicken in sheep yogurt, orange juice, cardamom marinade, charcoal-grilled with garlic sauce and roasted potatoes.\n\nNOT halal currently. The yogurt marinade and charcoal give lovely range — aromatic whites, fruity rosés, or lighter reds all work."},
    kebab:{kw:["kebab","kabab","kebab d'alep","halabi"],cl:["rouge"],t:["smoky","spiced","rich","charred","bold"],r:"Kebab d'Alep — Aleppo's most famous dish. NZ lamb with pine nuts, charcoal-grilled, with grilled eggplant, brown butter, labneh.\n\nHistorically from the spice-route city of Aleppo. This needs a red with smoky character and spice — Syrah, Grenache, or Nebbiolo."},
    filet:{kw:["filet mignon","filet","tenderloin"],cl:["rouge"],t:["bold","umami","herbal","refined","rich"],r:"Filet Mignon — 10oz Canada Prime Alberta beef, charcoal-grilled, with maitake mushrooms, green hummus, Syrian chimichurri with zaatar.\n\nNOT halal. Chimichurri and green hummus add herbal freshness. A refined red with structure."},
    carre:{kw:["carré","rack","lamb rack","carré d'agneau"],cl:["rouge"],t:["robust","gamey","spiced","smoky","bold"],r:"Carré d'agneau — 18oz Alberta lamb rack, charcoal-grilled with seven spices and pomegranate molasses, smoked eggplant purée, Biwaz salad.\n\nChef recommends medium. The seven spices and pomegranate demand aromatic depth — Rhône reds, Nebbiolo, or structured Bordeaux."},
    ribeye:{kw:["faux filet","sharat","ribeye","contre filet","aged steak"],cl:["rouge"],t:["bold","umami","rich","aged","earthy","intense"],r:"Faux filet Sharat — 45-day aged Canada Prime Alberta ribeye. Sous-vide then charcoal-seared. Porcini hummus, royal oyster mushrooms in ghee.\n\nNOT halal. Med-rare ONLY, not modifiable. 'Sharat' means 'to slice' in Arabic. Our most indulgent cut — you need the biggest, boldest red."},
    mixte:{kw:["grillades mixtes","mixed grill","plateau de viandes"],cl:["rouge","rosé"],t:["bold","varied","smoky"],r:"Grillades mixtes — 185$+ for 2-3 people. Includes filet mignon, lamb rack, shish taouk, kebab, ribeye. All charcoal-grilled.\n\nWith this variety, either a versatile red that handles everything, or better — two bottles, one lighter and one bolder."},
    dessert:{kw:["dessert","desserts","kunafa","knafeh","halaweit","safarjal","halva","sweet course","après"],cl:["bulles"],t:["floral","sweet","aromatic","honeyed"],r:"Our desserts are all about floral aromas — orange blossom, rose — and subtle sweetness.\n\nSafarjal sorbet (dairy-free, gluten-free, melts fast!), Kunafa takes 15 min to bake (order early!), Halaweit El Jibn with ricotta, honey, rose petals.\n\nDemi-sec sparkling wines with floral aromatics pair across the board."},
    tasting:{kw:["tasting","dégustation","menu dégustation","tasting menu","degustation"],cl:["blanc","rosé","rouge","bulles"],t:["versatile"],r:"Our tasting menu takes you through the full Damas experience:\n\nS1: Pastirma + Crevettes Kataifi → Start with sparkling or aromatic white\nS2: Fattouch + Kibbeh Nayé + Borek → Crisp white or rosé\nS3: Calmars → Mineral white or orange\nS4: Main course → Red wine\nS5: Halaweit → Demi-sec sparkling\n\nVegetarian, pescetarian, and vegan versions available. For full pairing I'd suggest 2-3 wines."},
    mezzé:{kw:["mezzé","mezze","meze","spread","sharing","table","apéro","apéritif","aperitif","to start","commencer"],cl:["blanc","rosé","orange","bulles"],t:["versatile","fresh","mineral","textured"],r:"A mezzé table is all about variety — so you want something versatile, food-friendly, with personality to match many flavors.\n\nTextured whites, crisp rosés, orange wines, or sparkling all work beautifully. Or go by the glass and try a few different ones across the table."},
