  "Bières & Cidres": [

    {name:"Débuts 2021",price:35,desc:"Apple & Riesling cider, 750ml, Montréal"},

  "Arak": [
    {name:"Massaya",price:14},{name:"Kefraya",price:13},

};

const W = WINES_DATA.map(w=>({name:w.n,producer:w.p,price:w.pr,grape:w.g,region:w.r,country:w.c,color:w.cl,section:w.s,profile:w.pf}));
const SECTIONS = [...new Set(W.map(w=>w.section))];
const C = {bg:"#0F0E0C",surface:"#1A1916",card:"#222019",border:"#3A362E",gold:"#C4A265",cream:"#E8DCC8",text:"#C5BBA8",muted:"#8A8070",white:"#F5F0E6",aiBg:"#1E1D1A",aiBdr:"#4A4535"};
const FLAGS={"France":"🇫🇷","Italie":"🇮🇹","Espagne":"🇪🇸","Allemagne":"🇩🇪","Grèce":"🇬🇷","Liban":"🇱🇧","Syrie":"🇸🇾","Arménie":"🇦🇲","Autriche":"🇦🇹","Slovénie":"🇸🇮","Tchéquie":"🇨🇿","Portugal":"🇵🇹","Québec":"🏔️","Ontario":"🍁","États-Unis":"🇺🇸"};
const DOTS={blanc:"#D4C98A",rouge:"#8B3A3A",rosé:"#C4787A",orange:"#C49A5A",bulles:"#A8B8A0"};
const CLABELS={blanc:"Blanc",rouge:"Rouge",rosé:"Rosé",orange:"Orange",bulles:"Bulles"};

function App(){
  const [tab,setTab]=useState("wine");
  const [section,setSection]=useState(SECTIONS[0]);
  const [drinkSec,setDrinkSec]=useState("Cocktails");
  const [selected,setSelected]=useState(null);
  const [query,setQuery]=useState("");
  const [priceFilter,setPriceFilter]=useState("all");
  const [aiMode,setAiMode]=useState(false);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiResp,setAiResp]=useState(null);
  const [aiWines,setAiWines]=useState([]);
  const inputRef=useRef(null);

  const FOOD_PAIRINGS={
    fattouch:{kw:["fattouch","fattoush","fattouche"],traits:["fresh","crisp","acidic","citrus","mineral","light","herbal","saline"],colors:["blanc","rosé","bulles"],avoid:["rouge"],resp:"The fattouch is all about brightness — sumac, pomegranate, fresh herbs, and crispy pita. You want a wine that matches its vibrant acidity and herbal freshness.\n\nThe salad's citrusy, herbaceous character calls for something crisp and mineral."},
    humus:{kw:["humus","hummus","houmous"],traits:["round","textured","mineral","citrus","fresh"],colors:["blanc","orange"],resp:"Our humus is silky with tahini and garlic. A textured white or skin-contact wine mirrors its creamy character while acidity cuts through beautifully."},
    kibbeh:{kw:["kibbeh","kibbe","kibbé","tartare","nayé"],traits:["earthy","spice","medium","savory","pepper"],colors:["rouge","rosé"],resp:"The kibbeh nayé is delicate lamb tartare with bulgur and mint — it needs a wine that respects its subtlety without overwhelming."},
    kebab:{kw:["kebab","kabab","alep kebab"],traits:["bold","smoky","spice","dark fruit","tannin","garrigue"],colors:["rouge"],resp:"The Kebab d'Alep brings smoky char, seven spices, and pine nuts. You need a red with body and spice to match those bold flavors."},
    agneau:{kw:["agneau","lamb","carré","rack","jarret","shank"],traits:["bold","tannin","dark fruit","spice","garrigue","earthy","full"],colors:["rouge"],resp:"Lamb at Damas is all about warming spices, pomegranate molasses, and char. A wine with structure and aromatic depth is your best companion."},
    poisson:{kw:["poisson","fish","bar","bass","daurade","bream","samke","moujaddara","sea bass"],traits:["fresh","mineral","citrus","saline","light","herbal","delicate"],colors:["blanc","rosé"],resp:"Our fish is grilled with care — delicate flesh, bright gremolata, gentle spicing. A crisp mineral white lets the fish shine."},
    boeuf:{kw:["boeuf","beef","filet mignon","ribeye","faux filet","sharat","joue","cheek","friki"],traits:["bold","tannin","dark fruit","full","smoky","earthy","umami"],colors:["rouge"],resp:"Whether braised beef cheeks or aged ribeye, our beef dishes are rich and intense. Go bold with a structured red."},
    poulet:{kw:["poulet","chicken","taouk","shish taouk"],traits:["medium","fresh","aromatic","round","fruit"],colors:["blanc","rosé","rouge"],resp:"The Shish Taouk's yogurt marinade and char give it lovely range — white, rosé, or even lighter red all work."},
    pieuvre:{kw:["pieuvre","octopus","poulpe"],traits:["mineral","citrus","saline","medium","herbal"],colors:["blanc","rosé","orange"],resp:"Our octopus is seared with chickpeas and herbs — Mediterranean through and through. Salinity and texture work wonders."},
    crevettes:{kw:["crevettes","shrimp","kataifi"],traits:["aromatic","round","fresh","floral","fruit"],colors:["blanc","bulles","rosé"],resp:"Kataifi shrimp with honey and zaatar — that sweet-savory contrast is magical with aromatic whites or sparkling."},
    mouhammara:{kw:["mouhammara","muhammara"],traits:["spice","fruit","medium","round","earthy"],colors:["rosé","rouge","orange"],resp:"Mouhammara's sweet pepper heat and walnut richness pair wonderfully with fruity rosés or medium reds."},
    halloumi:{kw:["halloumi","légumes","grilled vegetables"],traits:["smoky","mineral","herbal","medium","savory"],colors:["blanc","rosé","orange"],resp:"Smoky grilled vegetables and salty halloumi love mineral whites or skin-contact oranges."},
    dessert:{kw:["dessert","kunafa","halaweit","safarjal","halva","sweet"],traits:["floral","sweet","aromatic","fruit","honeyed"],colors:["bulles"],resp:"For our desserts — think floral and gently sweet. A demi-sec sparkling or aromatic wine is lovely."},
    mezzé:{kw:["mezzé","mezze","meze","plateau","spread","sharing"],traits:["versatile","fresh","mineral","medium","fruit","textured"],colors:["blanc","rosé","orange","bulles"],resp:"A mezzé spread calls for versatile, food-friendly wines — something with personality to match many flavors."},
    borek:{kw:["borek","börek","cheese","fromage"],traits:["crisp","fresh","mineral","bubbles","citrus"],colors:["bulles","blanc"],resp:"Crispy cheese pastry loves the contrast of bright bubbles or mineral white to cut through richness."},
  };

  const TASTE_TAGS={
    fresh:["fresh","frais","fraîche","refreshing","crisp","vif","light","léger","clean","easy"],
    low_acid:["low acid","low acidity","peu acide","doux","douce","soft","smooth","mellow","gentle","rond","round","subtle"],
    bold:["bold","audacieux","powerful","puissant","intense","rich","riche","full","big","heavy","strong","deep","robust"],
    light:["light","léger","delicate","délicat","ethereal","airy","fin","fine","subtle"],
    fruity:["fruity","fruit","fruits","fruité","berry","peach","cherry","apple","tropical","citrus"],
    earthy:["earthy","terreux","mineral","minéral","stone","stony"],
    spicy:["spicy","épicé","pepper","poivre","spice","warm"],
    smoky:["smoky","fumé","smoke","charcoal","grilled","roasted"],
    floral:["floral","flower","rose","violet","blossom","perfume","aromatic"],
    dry:["dry","sec","brut","bone-dry"],
    sweet:["sweet","sucré","doux","off-dry","demi-sec","honeyed"],
    tannic:["tannic","tannin","structured","firm","grip"],
    funky:["funky","natural","naturel","wild","sauvage","raw","alive","cloudy","unfiltered","orange wine"],
    celebration:["celebration","celebrate","fête","special","occasion","anniversary","birthday","champagne","bubbles","sparkling"],
    local:["local","québec","quebec","montréal","montreal","canadian","canada","ontario"],
    middle_east:["middle east","moyen orient","moyen-orient","syrian","syrien","lebanese","libanais","liban","syria","syrie","greek","grec","grèce","armenian","arménie"],
    italian:["italian","italien","italie","italy","piemonte","toscane","sicilia","barolo","barbaresco","brunello","chianti","etna","nebbiolo"],
    french:["french","français","france","bordeaux","bourgogne","burgundy","loire","rhône","jura","alsace","champagne","chablis"],
  };

  const scoreWine=(wine,q)=>{
    const ql=q.toLowerCase();let score=0;let reasons=[];
    [wine.name,wine.producer,wine.grape,wine.region,wine.country].forEach(f=>{if(ql.includes(f.toLowerCase()))score+=20});
    const pl=wine.profile.toLowerCase();
    for(const[trait,keywords]of Object.entries(TASTE_TAGS)){
      if(!keywords.some(k=>ql.includes(k)))continue;
      if(trait==="fresh"&&/fresh|crisp|refreshing|light|mineral|bright/.test(pl)){score+=8;reasons.push("fresh")}
      if(trait==="low_acid"&&/soft|silky|round|gentle|balanced|low acid/.test(pl)){score+=8;reasons.push("low acidity")}
      if(trait==="bold"&&/full|bold|powerful|intense|rich|deep|dark|concentrated/.test(pl)){score+=8;reasons.push("bold")}
      if(trait==="light"&&/light|delicate|ethereal|translucent|gentle|fine/.test(pl)){score+=8;reasons.push("light")}
      if(trait==="fruity"&&/fruit|berry|cherry|peach|apple|plum|citrus|tropical/.test(pl)){score+=6;reasons.push("fruity")}
      if(trait==="earthy"&&/earth|mineral|stone|chalk|slate|volcanic|granite/.test(pl)){score+=6;reasons.push("earthy")}
      if(trait==="spicy"&&/pepper|spice|spicy|warm/.test(pl)){score+=6;reasons.push("spicy")}
      if(trait==="smoky"&&/smoke|smoky|char|roast|toast/.test(pl)){score+=6;reasons.push("smoky")}
      if(trait==="floral"&&/floral|rose|violet|blossom|flower|perfume|aromatic/.test(pl)){score+=6;reasons.push("floral")}
      if(trait==="dry"&&/dry|brut|bone.dry/.test(pl))score+=5;
      if(trait==="sweet"&&/sweet|off.dry|demi.sec|honeyed|honey/.test(pl))score+=5;
      if(trait==="tannic"&&/tannin|structured|firm|grip|powerful/.test(pl))score+=5;
      if(trait==="funky"&&/funky|natural|wild|raw|unfiltered|skin.contact|cloudy|alive/.test(pl)){score+=8;reasons.push("natural/funky")}
      if(trait==="celebration"&&wine.color==="bulles"){score+=15;reasons.push("celebration")}
      if(trait==="local"&&["Québec","Ontario"].includes(wine.country)){score+=12;reasons.push("local")}
      if(trait==="middle_east"&&["Liban","Syrie","Grèce","Arménie"].includes(wine.country)){score+=12;reasons.push("Middle Eastern")}
      if(trait==="italian"&&wine.country==="Italie"){score+=10;reasons.push("Italian")}
      if(trait==="french"&&wine.country==="France"){score+=10;reasons.push("French")}
    }
    if(ql.includes("blanc")||ql.includes("white")){if(wine.color==="blanc")score+=10}
    if(ql.includes("rouge")||ql.includes("red")){if(wine.color==="rouge")score+=10}
    if(ql.includes("rosé")||ql.includes("rose ")){if(wine.color==="rosé")score+=10}
    if(ql.includes("orange")){if(wine.color==="orange")score+=10}
    if(ql.includes("bulles")||ql.includes("sparkling")||ql.includes("champagne")||ql.includes("pétillant")){if(wine.color==="bulles")score+=10}
    const pm=ql.match(/(?:under|moins de|below|max|budget|around|environ)\s*(\d+)/);
    if(pm){const mx=parseInt(pm[1]);if(wine.price<=mx)score+=8;else score-=15}
    if((ql.includes("cheap")||ql.includes("affordable")||ql.includes("pas cher")||ql.includes("budget"))&&wine.price<100)score+=6;
    if((ql.includes("splurge")||ql.includes("special")||ql.includes("best")||ql.includes("meilleur"))&&wine.price>200)score+=5;
    if((ql.includes("glass")||ql.includes("verre"))&&wine.section==="By the Glass")score+=12;
    return{score,reasons:[...new Set(reasons)]};
  };

  const askAI=(q)=>{
    setAiLoading(true);setAiResp(null);setAiWines([]);
    setTimeout(()=>{
      const ql=q.toLowerCase();let response="";let scoredWines=[];let foodMatch=null;
      for(const[key,food]of Object.entries(FOOD_PAIRINGS)){if(food.kw.some(k=>ql.includes(k))){foodMatch=key;break}}
      if(foodMatch){
        const food=FOOD_PAIRINGS[foodMatch];
        scoredWines=W.map(w=>{let s=0;const pl=w.profile.toLowerCase();if(food.colors.includes(w.color))s+=10;if(food.avoid?.includes(w.color))s-=20;food.traits.forEach(t=>{if(pl.includes(t))s+=5});if(["Liban","Syrie","Grèce","Arménie"].includes(w.country))s+=3;if(w.section==="By the Glass")s+=2;if(w.price<100)s+=1;return{wine:w,score:s}}).filter(s=>s.score>5).sort((a,b)=>b.score-a.score);
        response=food.resp+"\n\nHere are my picks:";
      }else{
        scoredWines=W.map(w=>{const{score,reasons}=scoreWine(w,q);return{wine:w,score,reasons}}).filter(s=>s.score>3).sort((a,b)=>b.score-a.score);
        if(scoredWines.length>0){const t=scoredWines[0].reasons?.slice(0,3).join(", ")||"";response=t?`Great taste. Looking for something ${t}, here's what I'd pour for you:`:`Based on what you're looking for, here are some excellent options:`}
        else response="I'd love to help — tell me more about what you're in the mood for. A color (white, red, rosé), a style (fresh, bold, funky), a dish you're ordering, or a budget?"
      }
      const top=scoredWines.slice(0,4).map(s=>s.wine);
      if(top.length>0){const notes=top.map(w=>`\n• ${w.name} (${w.producer}, ${w.price}$) — ${w.profile.split('.')[0]}.`).join("");response+=notes}
      setAiResp(response);setAiWines(top);setAiLoading(false);
    },600);
  };

  const filtered=aiMode?[]:W.filter(w=>{
    const sec=w.section===section;
    const srch=!query||[w.name,w.producer,w.grape,w.region,w.country,w.profile].some(f=>f.toLowerCase().includes(query.toLowerCase()));
    const pr=priceFilter==="all"||(priceFilter==="u100"&&w.price<100)||(priceFilter==="100"&&w.price>=100&&w.price<=200)||(priceFilter==="200"&&w.price>200&&w.price<=500)||(priceFilter==="500"&&w.price>500);
    return sec&&srch&&pr;
  });
  const grouped={};filtered.forEach(w=>{if(!grouped[w.color])grouped[w.color]=[];grouped[w.color].push(w)});

  const WineCard=({wine})=>(
    <div className="wc" onClick={()=>setSelected(wine)} style={{padding:"13px 16px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:14,cursor:"pointer"}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap"}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:DOTS[wine.color],display:"inline-block",flexShrink:0}}/>
          <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:500,color:C.white}}>{wine.name}</span>
          <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:C.muted}}>{wine.producer}</span>
        </div>
        <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:C.muted,marginTop:4,display:"flex",gap:6,flexWrap:"wrap"}}>
          <span>{FLAGS[wine.country]||"🍷"} {wine.grape}</span><span style={{color:C.border}}>•</span><span>{wine.region}</span>
        </div>
      </div>
      <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:500,color:C.gold,whiteSpace:"nowrap"}}>{wine.price}$</span>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"Georgia,serif"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:${C.border};border-radius:4px}
        .wc{transition:all .25s ease}.wc:hover{transform:translateY(-1px);background:${C.card}!important;border-color:${C.gold}!important}
        .tb{transition:all .3s;cursor:pointer;border:none;background:none}.tb:hover{color:${C.gold}!important}
        .sb{transition:all .2s;cursor:pointer;white-space:nowrap}.sb:hover{color:${C.gold}!important}
        .pl{transition:all .2s;cursor:pointer}.pl:hover{background:${C.gold}!important;color:${C.bg}!important}
        .fi{transition:all .2s}.fi:hover{background:${C.card}!important}
        .si:focus{outline:none;border-color:${C.gold}!important}
        .mo{animation:fi .25s ease}.mc{animation:su .3s ease}
        @keyframes fi{from{opacity:0}to{opacity:1}}@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pu{0%,100%{opacity:.4}50%{opacity:1}}.ad{animation:pu 1.4s ease-in-out infinite}
        .hint{transition:all .2s;cursor:pointer}.hint:hover{border-color:${C.gold}!important;color:${C.gold}!important}
      `}</style>
      <header style={{padding:"32px 24px 0",textAlign:"center",borderBottom:`1px solid ${C.border}`}}>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(36px,6vw,52px)",fontWeight:300,color:C.white,letterSpacing:"8px",textTransform:"uppercase",marginBottom:4}}>Damas</h1>
        <p style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:C.muted,letterSpacing:"3px",textTransform:"uppercase",marginBottom:24}}>Carte des Vins & Cocktails • {W.length} vins</p>
        <div style={{display:"flex",justifyContent:"center",marginBottom:-1}}>
          {[{id:"wine",l:"Carte des Vins"},{id:"drinks",l:"Cocktails & Boissons"}].map(t=>(
            <button key={t.id} className="tb" onClick={()=>{setTab(t.id);setAiMode(false);setAiResp(null);setAiWines([]);setQuery("")}}
              style={{padding:"12px 28px",fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:tab===t.id?500:400,color:tab===t.id?C.gold:C.muted,borderBottom:tab===t.id?`2px solid ${C.gold}`:"2px solid transparent",letterSpacing:"1px"}}>{t.l}</button>
          ))}
        </div>
      </header>

      {tab==="wine"&&(
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 16px"}}>
          <div style={{padding:"20px 0 8px"}}>
            <div style={{display:"flex",gap:8,alignItems:"stretch"}}>
              <div style={{flex:1,position:"relative"}}>
                <input ref={inputRef} className="si" type="text" value={query}
                  placeholder={aiMode?"Ask anything — \"fresh wine with low acidity\", \"what goes with the fattouch?\"":"Search wines, grapes, regions..."}
                  onChange={e=>{setQuery(e.target.value);if(aiMode){setAiResp(null);setAiWines([])}}}
                  onKeyDown={e=>{if(e.key==="Enter"&&aiMode&&query.trim()&&!aiLoading){e.preventDefault();askAI(query)}}}
                  style={{width:"100%",padding:"12px 16px 12px 40px",background:aiMode?C.aiBg:C.surface,border:`1px solid ${aiMode?C.aiBdr:C.border}`,borderRadius:8,color:C.cream,fontFamily:"'DM Sans',sans-serif",fontSize:13}}
                />
                <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:14,opacity:.5}}>{aiMode?"✦":"⌕"}</span>
              </div>
              <button type="button" onClick={()=>{setAiMode(!aiMode);setAiResp(null);setAiWines([]);setQuery("");setTimeout(()=>inputRef.current?.focus(),100)}}
                style={{padding:"0 16px",borderRadius:8,border:`1px solid ${aiMode?C.gold:C.border}`,background:aiMode?C.gold:"transparent",color:aiMode?C.bg:C.muted,fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:500,cursor:"pointer",whiteSpace:"nowrap",transition:"all .2s"}}>
                {aiMode?"✦ Sommelier ON":"✦ Ask Sommelier"}
              </button>
              {aiMode&&query.trim()&&!aiResp&&(
                <button type="button" disabled={aiLoading} onClick={()=>{if(query.trim()&&!aiLoading)askAI(query)}}
                  style={{padding:"0 20px",borderRadius:8,border:"none",background:aiLoading?C.border:C.gold,color:C.bg,fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500,cursor:aiLoading?"wait":"pointer",whiteSpace:"nowrap"}}>
                  {aiLoading?"...":"Ask"}
                </button>
              )}
            </div>
          </div>

          {aiMode&&!aiResp&&!aiLoading&&(
            <div style={{padding:"12px 0 20px"}}>
              <p style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:C.muted,marginBottom:12}}>Try asking:</p>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {["A fresh wine with low acidity","What goes well with the fattouch?","Something from the Middle East under 100$","A bold red for the lamb rack","Natural wine, funky and orange","Best bottle for a celebration"].map(h=>(
                  <button key={h} className="hint" onClick={()=>{setQuery(h);askAI(h)}}
                    style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${C.border}`,background:"transparent",color:C.text,fontFamily:"'DM Sans',sans-serif",fontSize:11}}>{h}</button>
                ))}
              </div>
            </div>
          )}

          {aiLoading&&(<div style={{padding:"32px 0",textAlign:"center"}}><div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:12}}>{[0,1,2].map(i=><div key={i} className="ad" style={{width:6,height:6,borderRadius:"50%",background:C.gold,animationDelay:`${i*.2}s`}}/>)}</div><p style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:C.muted}}>Your sommelier is thinking...</p></div>)}

          {aiResp&&(
            <div style={{padding:"16px 0 8px"}}>
              <div style={{padding:"20px 24px",background:C.aiBg,border:`1px solid ${C.aiBdr}`,borderRadius:10,marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><span style={{fontSize:14}}>✦</span><span style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:C.gold,letterSpacing:"2px",textTransform:"uppercase",fontWeight:500}}>Sommelier</span></div>
                <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:C.cream,lineHeight:1.7,whiteSpace:"pre-line"}}>{aiResp}</p>
              </div>
              {aiWines.length>0&&(<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}><p style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:C.gold,letterSpacing:"2px",textTransform:"uppercase",marginBottom:4}}>Recommended wines</p>{aiWines.map((w,i)=><WineCard key={i} wine={w}/>)}</div>)}
              <button onClick={()=>{setAiResp(null);setAiWines([]);setQuery("");inputRef.current?.focus()}} style={{padding:"8px 16px",borderRadius:6,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontFamily:"'DM Sans',sans-serif",fontSize:11,cursor:"pointer"}}>Ask another question</button>
            </div>
          )}

          {!aiMode&&(<>
            <div style={{display:"flex",gap:6,padding:"4px 0 12px",flexWrap:"wrap"}}>
              {[{id:"all",l:"All"},{id:"u100",l:"<100$"},{id:"100",l:"100-200$"},{id:"200",l:"200-500$"},{id:"500",l:"500$+"}].map(f=>(
                <button key={f.id} className="pl" onClick={()=>setPriceFilter(f.id)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${priceFilter===f.id?C.gold:C.border}`,background:priceFilter===f.id?C.gold:"transparent",color:priceFilter===f.id?C.bg:C.muted,fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:priceFilter===f.id?500:400,cursor:"pointer"}}>{f.l}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:4,overflowX:"auto",padding:"4px 0 16px",borderBottom:`1px solid ${C.border}`}}>
              {SECTIONS.map(s=>(<button key={s} className="sb" onClick={()=>setSection(s)} style={{padding:"6px 14px",borderRadius:4,border:"none",background:section===s?C.card:"transparent",color:section===s?C.gold:C.muted,fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:section===s?500:400}}>{s}</button>))}
            </div>
            <div style={{padding:"20px 0 40px"}}>
              {Object.entries(grouped).map(([color,wines])=>(
                <div key={color} style={{marginBottom:28}}>
                  <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:400,color:C.cream,marginBottom:12,paddingBottom:6,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
                    <span style={{width:8,height:8,borderRadius:"50%",background:DOTS[color]}}/>{CLABELS[color]}<span style={{fontSize:12,color:C.muted,fontFamily:"'DM Sans',sans-serif",fontWeight:400}}>({wines.length})</span>
                  </h3>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>{wines.map((w,i)=><WineCard key={i} wine={w}/>)}</div>
                </div>
              ))}
              {Object.keys(grouped).length===0&&<p style={{textAlign:"center",padding:40,fontFamily:"'DM Sans',sans-serif",fontSize:13,color:C.muted}}>No wines match your search.</p>}
            </div>
          </>)}
        </div>
      )}

      {tab==="drinks"&&(
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 16px"}}>
          <div style={{display:"flex",gap:4,overflowX:"auto",padding:"20px 0 16px",borderBottom:`1px solid ${C.border}`}}>
            {Object.keys(COCKTAILS_DATA).map(s=>(<button key={s} className="sb" onClick={()=>setDrinkSec(s)} style={{padding:"6px 14px",borderRadius:4,border:"none",background:drinkSec===s?C.card:"transparent",color:drinkSec===s?C.gold:C.muted,fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:drinkSec===s?500:400}}>{s}</button>))}
          </div>
          <div style={{padding:"20px 0 40px"}}>
            <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:400,color:C.cream,marginBottom:20}}>{drinkSec}</h3>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {COCKTAILS_DATA[drinkSec]?.map((item,i)=>(
                <div key={i} className="fi" style={{padding:"14px 18px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:16}}>
                  <div>
                    <h4 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:500,color:C.white,marginBottom:item.desc?4:0}}>{item.name}</h4>
                    {item.desc&&<p style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:C.muted,lineHeight:1.4}}>{item.desc}</p>}
                    {item.name?.includes("*")&&<span style={{display:"inline-block",padding:"2px 8px",borderRadius:3,fontSize:10,letterSpacing:".5px",textTransform:"uppercase",background:"#2A2832",color:"#9A8AC4",marginTop:4}}>Sans alcool disponible</span>}
                  </div>
                  <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:500,color:C.gold,whiteSpace:"nowrap"}}>{item.price}$</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {selected&&(
        <div className="mo" onClick={()=>setSelected(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:1000}}>
          <div className="mc" onClick={e=>e.stopPropagation()} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,maxWidth:500,width:"100%",maxHeight:"85vh",overflow:"auto"}}>
            <div style={{padding:"28px 28px 20px",borderBottom:`1px solid ${C.border}`,position:"relative"}}>
              <button onClick={()=>setSelected(null)} style={{position:"absolute",top:16,right:16,background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer"}}>✕</button>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:C.gold,letterSpacing:"2px",textTransform:"uppercase",marginBottom:8}}>{FLAGS[selected.country]||"🍷"} {selected.country} · {selected.section}</div>
              <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:400,color:C.white,lineHeight:1.2,marginBottom:4,paddingRight:30}}>{selected.name}</h2>
              <p style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:C.muted}}>{selected.producer}</p>
            </div>
            <div style={{padding:"20px 28px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
                <div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:4}}>Grape</div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:C.cream}}>{selected.grape}</div></div>
                <div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:4}}>Region</div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:C.cream}}>{selected.region}</div></div>
                <div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:4}}>Color</div><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:8,height:8,borderRadius:"50%",background:DOTS[selected.color]}}/><span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:C.cream,textTransform:"capitalize"}}>{selected.color}</span></div></div>
              </div>
              <div style={{marginBottom:24}}>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:8}}>Tasting Profile</div>
                <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:C.text,lineHeight:1.65,fontStyle:"italic"}}>{selected.profile}</p>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 0 8px",borderTop:`1px solid ${C.border}`}}>
                <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:500,color:C.gold}}>{selected.price}$</span>
              </div>
            </div>
          </div>
        </div>
      )}
      <footer style={{textAlign:"center",padding:"24px",borderTop:`1px solid ${C.border}`,fontFamily:"'DM Sans',sans-serif",fontSize:11,color:C.muted}}>Damas — 1201 Avenue Van Horne, Montréal</footer>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>

</body>
</html>
