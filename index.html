  const TOPICS={
    halal:{kw:["halal","haram","permis","religieux"],r:"Important to know — not all dishes are halal at Damas.\n\n❌ NOT halal: Kibbeh frit, Joue de boeuf (Friki), Shish Taouk (currently), Filet Mignon, Calmars, Faux filet Sharat\n\n✅ Halal: Kebab d'Alep, Carré d'agneau, Jarret d'agneau, Bar grillé, Daurade, Humus Shawarma, all cold mezzés, Borek, Shish Borek, Crevettes Kataifi, Halloumi\n\nFor a fully halal experience, I'd recommend Kebab d'Alep or Carré d'agneau with grilled vegetables."},
    veg:{kw:["végé","vegan","vegetar","plant based","sans viande","légumes seulement"],r:"We have wonderful vegetarian and vegan options!\n\n🌿 Vegan: Fattouch, Humus, Mouhammara, Yalanji (sans labneh), Humus aux champignons, Makdous (sans œuf)\n🧀 Vegetarian: All above + Labhne, Muttabal, Baba Ghannouj, Borek aux fromages, Halloumi grillé, Yalanji\n\nFull vegetarian and vegan tasting menus available! For wines, textured whites or orange wines pair beautifully with vegetable-forward dishes."},
    menu:{kw:["menu","what do you serve","carte","plats","dishes","eat","manger","quoi manger","what's good","qu'est-ce qu"],r:"Here's an overview of our menu:\n\n🥒 Mezzés Froids — Fattouch, Humus, Kibbeh Nayé (lamb tartare), Mouhammara, Baba Ghannouj, Yalanji...\n🔥 Mezzés Chauds — Borek aux fromages, Shish Borek, Crevettes Kataifi, Pieuvre, Halloumi grillé...\n🍽 Spécialités — Bar grillé, Joue de boeuf, Jarret d'agneau, Daurade Samke Harra\n🥩 Grillades — Shish Taouk, Kebab d'Alep, Filet Mignon, Carré d'agneau, Ribeye 45 jours, Mixte (185$+)\n🍮 Desserts — Safarjal, Kunafa (15 min!), Halaweit, Halva ice cream\n\nAsk me about any dish and I'll find the perfect wine!"},
    glass:{kw:["by the glass","au verre","verre","glass pour"],r:"Here's what we pour by the glass:\n\nBlanc: Roero Arneis 17$ • Kashf Viognier 18$ • Roc Troucat 18$ • Bargylus Blanc Syria 25$\nBulles: Origins Armenia 20$ • Bulles de Roche 24$\nRosé: L'Éclat Loire 17$\nOrange: Trebbiano Orange 18$\nRouge: Ayehoros Greece 17$ • Dolcetto 18$ • Crozes-Hermitage 21$ • Pinot Noir Baden 22$ • Bargylus Rouge Syria 27$\n\nAll excellent and all tell a story. The Bargylus pair (Syria) are the most special — wines of resilience from coastal Lattakia vineyards managed remotely during the war."},
    arak:{kw:["arak","anise","anis"],r:"Arak — the traditional anise spirit of the Levant, the soul of Syrian dining. Served with water and ice, it turns milky white (the louche effect).\n\nWe carry six: Ksarak 11$ (great starting point), Brun 12$, Kefraya 13$, Massaya 14$, Al-Karram 14$, Ixsir 14$. Beautiful with mezzés — the anise cools the palate after spicy dishes."},
    cocktail:{kw:["cocktail","cocktails","drink","drinks","boisson","mixed drink"],r:"Our cocktails are rooted in Syrian and Middle Eastern flavors:\n\n✦ Aleppo Gin Sour* 23$ — Botanist gin, orange blossom, Aleppo pepper. Our signature.\n✦ Sazarak 24$ — Lustau brandy, Lot 40 rye, Arak. Syrian twist on New Orleans.\n✦ The East Fashioned 25$ — Nikka whiskey, orange blossom, chocolate bitters.\n✦ Cardamome Espresso Martini 22$ — perfect after dinner.\n✦ Bellini Safran Abricot 19$ — Prosecco, apricot, saffron. Light and festive.\n\nCocktails marked * available sans alcool. Also: Almaza beer (Lebanon) 11$, Ghost Farm IPA (Montréal) 14$."},
    bargylus:{kw:["bargylus","syrian wine","vin syrien","syrie wine","lattakia"],r:"The Bargylus wines are the soul of our list — produced from high-altitude coastal vineyards in Lattakia, Syria. The Saadé family manages the vineyards remotely from Beirut, sending harvest instructions by phone through the conflict.\n\nBargylus Blanc 2018 (25$ glass / 115$ bottle) — Sauvignon-Chardonnay, tropical fruit, flint, cedar. Elegant and age-worthy.\nBargylus Rouge 2017 (27$ glass / 145$ bottle) — Syrah-dominant, dark fruit, garrigue, leather. Full-bodied and profound.\n\nThese are wines of extraordinary resilience and quality. Among the most meaningful bottles you'll ever drink."},
    natural:{kw:["natural wine","vin nature","vin naturel","biodynamic","biodynamique","low intervention","sans soufre","organic","bio "],r:"Natural wine is at the heart of our philosophy. Most of our list is low-intervention, biodynamic, or natural.\n\nCult producers on our list: Overnoy (Jura, 175$) — the godfather of French natural wine. Robinot (Loire, 100-350$) — wild, alive, profound. Cossard (Burgundy, 115-420$) — legendary négociant. Occhipinti (Sicily, 155$) — Italy's natural star. Cornelissen (Etna, 575$) — the most radical. Matassa (Roussillon, 108-115$) — South African-born Roussillon legend.\n\nWant me to find something funky, wild, and alive?"},
    selosse:{kw:["selosse","jacques selosse"],r:"Jacques Selosse — the man who revolutionized grower Champagne. His wines are oxidative, vineyard-driven, and utterly unique. We carry four:\n\nLes Carelles (800$) — Blanc de Blancs Grand Cru, Le Mesnil-sur-Oger. Walnut, iodine, profound depth.\nLa Côte Faron (800$) — Blanc de Noir Grand Cru, Aÿ. Powerful, vinous.\nSous le Mont (800$) — 1er Cru, Mareuil-sur-Aÿ. Rich, earthy. Decant it like Burgundy.\nSubstance (850$) — The crown jewel. Perpetual reserve solera since 1986. Every vintage lives in this bottle. Transcendent.\n\nHis son Guillaume Selosse also has the Largillier (600$) from Côte des Bar."},
    clos_rougeard:{kw:["clos rougeard","rougeard","foucault"],r:"Clos Rougeard — one of France's most mythical estates, in Saumur-Champigny on the Loire. The Foucault brothers made wine here for decades, creating legends.\n\nBrézé 2018 (500$) — Chenin Blanc from Anjou. Quince, beeswax, laser minerality. Extremely rare.\nLes Poyeux 2018 (450$) — Cabernet Franc. Violets, graphite, cassis, silk texture.\nLe Bourg 2018 (500$) — The flagship. Profound, mineral Cab Franc rivaling great Bordeaux.\n\nThese are pilgrimage wines — if you see them, don't hesitate."},
    chave:{kw:["chave","hermitage blanc","hermitage white"],r:"Jean-Louis Chave — the greatest name in Hermitage, one of France's most legendary wine families.\n\nL'Hermitage Blanc 2002 (500$) — Over 20 years of age. Honeyed richness, beeswax, truffle, extraordinary depth. A monument of French white wine.\nL'Hermitage Blanc 2014 (500$) — Younger, more vibrant. White peach, acacia, granite. Will age beautifully for decades.\n\nMarsanne-Roussanne from granite soils. Once-in-a-lifetime wines."},
    valentini:{kw:["valentini","trebbiano d'abruzzo"],r:"Edoardo Valentini's Trebbiano d'Abruzzo 2020 (500$) — Italy's most legendary white wine. Only the best barrels are bottled under the Valentini label; the rest is declassified.\n\nWaxy, honeyed, lanolin, profound mineral depth. Decades of aging potential. A unicorn wine. One of the greatest whites in the world, from a grape most people dismiss as simple."},
    giacosa:{kw:["giacosa","asili","red label"],r:"Bruno Giacosa Asili Riserva 2014 (800$) — The red label Giacosa. When Giacosa declares a Riserva, he puts a red label on it (instead of white) to indicate an exceptional vintage.\n\nRose, tar, truffle, cherry liqueur, immortal tannic structure. Among Italy's greatest wines, period. The Asili vineyard in Barbaresco is the source of many of his finest bottles."},
    margaux:{kw:["margaux","lafite","first growth","premier cru classé","grand vin","bordeaux 2000"],r:"We carry two legendary First Growth Bordeaux from the perfect 2000 vintage — both over 25 years old:\n\nChâteau Margaux 2000 (2000$) — The most elegant First Growth. Cassis, violets, graphite, velvet tannins. A benchmark of Bordeaux grandeur.\n\nChâteau Lafite-Rothschild 2000 (2200$) — The most refined. Cedar, lead pencil, blackcurrant, aristocratic eternal finish. The most expensive wine on our list.\n\nAlso: Cos d'Estournel Rouge 2000 (850$), Haut-Bailly 2014 (400$), Tertre Roteboeuf 2017 (820$)."},
    date:{kw:["date","romantic","date night","rendez-vous","amoureux","valentine","soirée romantique"],r:"For a romantic evening at Damas — start with a glass of Champagne (Chartogne-Taillet 145$ is beautiful), then move to something with story.\n\nThe Bargylus wines from Syria are deeply romantic: wines made against all odds. The blanc 25$ or rouge 27$ by the glass are stunning conversation starters. For a bottle, the Faustine rosé from Corsica (95$) or Barbaresco (145$) sets the mood."},
    birthday:{kw:["birthday","anniversaire","fête","celebration","célébration","toast","special"],r:"Congratulations! For celebrations, nothing beats Champagne:\n\nTarlant Cuvée Zéro (130$) — festive and pure, great value grower Champagne.\nChartogne-Taillet Sainte Anne (145$) — elegant, complex, a sommelier favorite.\nKeush Origins Armenia (84$) — unique and unexpected. Great conversation.\n\nFor a once-in-a-lifetime moment: Ulysse Collin (450$) or Selosse Substance (850$)."},
    business:{kw:["business","client","impress","impressionner","affaires","corporate"],r:"For a business dinner — wines that show knowledge without pretension:\n\nChablis Premier Cru Vaillon (150$) — always elegant, universally respected.\nBarbaresco Morro Gabriele (145$) — refined taste at reasonable price.\nUlysse Collin Champagne (450$) — if budget allows, a statement of sophistication.\n\nAvoid anything too 'natural' or funky — play it classic but interesting."},
    value:{kw:["value","best value","rapport qualité","worth","bang for buck","good deal","bon rapport","cheap","affordable","pas cher","budget","économique"],r:"Best values on our list:\n\n🏆 By the glass — every wine under 20$ is a steal. The L'Éclat rosé (17$) and Roero Arneis (17$) are outstanding.\n🏆 Bottles under 80$ — Côt Lectif Loire red (70$), Logistilla Nerello Sicily (66$), Rosé Pigeon Hill Quebec (60$), Matiere à Discussion Vidal (70$).\n🏆 Best splurge value — Barbaresco (145$), Chablis Premier Cru (150$), Mise en Bouche Crozes (90$).\n\nAll these over-deliver massively."},
    group:{kw:["group","groupe","friends","amis","gang","big table","large group","party"],r:"For a big table, you want crowd-pleasers:\n\nStart: Rosé Pigeon Hill Quebec (60$) or Bulles Polisson (62$) — everyone loves these.\nMezzé: Faustine rosé Corsica (95$) or Roc Troucat white (78$) — versatile.\nReds with grillades: Mise en Bouche Crozes-Hermitage (90$) — great value, crowd-pleasing Syrah.\n\nOr go by the glass and let everyone pick their own adventure!"},
    first:{kw:["first time","première fois","never been","recommend","what should","que devrais","new here","suggest"],r:"Welcome to Damas! For a first visit I'd suggest:\n\nStart with the mezzé spread — it's the soul of Syrian dining. The Fattouch and Humus are essential.\n\nBy the glass: Bargylus Blanc from Syria (25$) is a beautiful, meaningful introduction. For red, the Mise en Bouche Crozes-Hermitage (21$) is a perfect entry.\n\nIf ordering a bottle for the table with mezzés: Faustine rosé from Corsica (95$) pairs with everything and has incredible character."},
    quebec:{kw:["local","québec","quebec","montréal","montreal","canadian","canada","ontario","d'ici","chez nous","icitte"],r:"Our local and Canadian selection:\n\n🏔️ Québec whites: Matiere à Discussion Vidal (70$), Décor Frontenac Blanc (80$), Calvaire Riesling (95$)\n🏔️ Québec reds: Un de Ces Quatres Gamaret (70$), Frangin Marquette (75$), Cap à l'Est (88$)\n🏔️ Québec sparkling: Bulles Polisson (62$), Ces Petits Imprévus Vidal (72$)\n🍁 Ontario: Ravel Acadie (75$), Chardonnay Trail Estate (82$), L'Homère Merlot Pearl Morissette (118$)\n\nThe Quebec wine scene is exploding — these are genuine discoveries."},
    middle_east:{kw:["middle east","moyen orient","moyen-orient","levant","syrian","lebanese","libanais","greek","grec","armenian"],r:"Our Middle Eastern and Eastern Mediterranean wines:\n\n🇸🇾 Syria: Bargylus Blanc 25$/115$ and Rouge 27$/145$ — iconic, profound, from Lattakia\n🇱🇧 Lebanon: Kashf Viognier 18$/75$, Wajd Pinot Noir 80$, Ward Tempranillo rosé 88$, Heritage Château Cana 85$, Obeideh orange 105$\n🇬🇷 Greece: Vino di Sasso Robola 75$, Ayehoros 17$/75$, Limnio 80$, Pappou orange 165$\n🇦🇲 Armenia: Origins Keush sparkling 20$/84$\n\nThese wines connect directly to the cuisine's roots. The Bargylus pair is essential Damas."},
  };

  // ===== GRAPE KNOWLEDGE =====
  const GRAPES={
    nebbiolo:{kw:["nebbiolo","barolo","barbaresco","piemonte red","piedmont red"],r:"Nebbiolo — Piedmont's noble grape. High acidity, high tannin, pale deceptive color. Rose, tar, cherry, truffle.\n\nOur Barolos: Monvigliero 200$, Villero 260$, Cannubi 290$, Ginestra 290$, Brunate (Rinaldi) 350$, Piè Rupestris (Cappellano) 430$, Bartolo Mascarello 450$, Riserva Vietti 450$, Piè Franco 650$\nBarbarescos: Morro Gabriele 145$, Tre Stelle 315$, Asili Riserva Giacosa 800$\nAlso: Bramaterra Alto Piemonte 115$ — lighter, more perfumed"},
    sangiovese:{kw:["sangiovese","chianti","brunello","montalcino","tuscan red","toscane rouge"],r:"Sangiovese — Tuscany's heart. Bright cherry, dried herbs, firm acidity.\n\nChianti Classico: Il Palagio 88$, Valdellecorti 90$, Gran Selezione 280$\nBrunello di Montalcino: Voliero 215$, San Polino 230$, Sesti 290$/315$, Colleoni 290$, Ucceliera 340$, Phenomena 400$\nAlso: Serpullo Montefalco 110$, Le Trame 190$"},
    syrah:{kw:["syrah","shiraz","cornas","hermitage","côte-rôtie","crozes","saint-joseph","northern rhône","rhône nord"],r:"Syrah — the northern Rhône's dark soul. Black pepper, smoke, dark fruit, violets.\n\nBy glass: Mise en Bouche Crozes-Hermitage 21$\nBottles: Crozes 90$, Saint-Joseph Johann Michel 145$, Saint-Joseph Darnaud 162$, Vin des Amis Clape 145$ (Cornas), Banneret Châteauneuf 185$, Côte-Rôtie Stephan 400$, Côte-Rôtie Rostaing 410$, Chaillot Allemand 440$ (cult Cornas!), Hermitage Darnaud 450$"},
    cab_franc:{kw:["cabernet franc","cab franc","saumur","champigny","loire red","loire rouge"],r:"Cabernet Franc — the Loire's elegant red grape. Violet, graphite, cassis.\n\nMarginale Roches Neuves 145$, Outre Terre Roches Neuves 220$, La Charpenterie Collier 270$\nLegendary Clos Rougeard: Les Poyeux 450$, Le Bourg 500$ — absolute grail wines\nAlso: Barbotine Ontario Cab Franc-Riesling blend 75$"},
    pinot:{kw:["pinot noir","pinot","bourgogne rouge","burgundy red","volnay","pommard","nuits","vosne","beaune","morey"],r:"Pinot Noir — Burgundy's noble grape. Red cherry, earth, silk.\n\nBy glass: Liaison Baden Germany 22$\nEntry: Bourgogne Rouge Fichet 110$, La Vouivre Lorraine 95$\nVillage: Chorey-les-Beaune 250$, Volnay 270$, Pommard 220$\nPremier Cru: Mercurey 160$, Santenay 300$, Beaune Lafarge 340$/360$, Volnay Lafarge 420$, Morey Tawse 320$/Tremblay 430$, Vosne-Romanée Suchots 450$\nGrand Cru: Clos de Vougeot 600$, Echezeaux 600$, Grands Echezeaux 900$, Clos de la Roche Ponsot 900$"},
    chenin:{kw:["chenin","chenin blanc","savennières","saumur blanc","jasnières","loire blanc","loire white"],r:"Chenin Blanc — the Loire's treasure. Quince, honey, mineral, astonishing aging potential.\n\nLe Berceau des Fées Savennières 120$, Iris Robinot Jasnières 170$, Prieur des Noues Anjou 190$, L'Échelier Roches Neuves 225$, Brézé Clos Rougeard 500$ (legendary!)\nSparkling: Bulles de Roche Germain 24$/105$, Éphémère 85$, Fetembulles Robinot 100$\nOrange: Terre Roches Neuves 200$"},
    chardonnay:{kw:["chardonnay","chablis","meursault","puligny","chassagne","pouilly","white burgundy","bourgogne blanc"],r:"Chardonnay — the world's most versatile white.\n\nChablis: Auxilium 125$, Vaillon 1er Cru 150$, Les Clos Grand Cru 260$, Vaudésir Grand Cru 288$, Clos Béru 265$\nCôte de Beaune: Monthélie 165$, Auxey-Duresses 188$, Meursault 295$/325$, Puligny-Montrachet 225$/300$, Saint-Aubin Lamy 285$/385$\nJura: Les Voisines 128$, JuCha 160$, De L'avant 178$\nAlso: Ardèche 80$, Mercurey 130$, Beaujolais 132$, PEC Ontario 82$"},
    riesling:{kw:["riesling"],r:"Riesling — electric acidity, petrol, lime, extraordinary aging.\n\nBerg Mosel Germany 95$ — classic steep-slate Riesling\nPfersigberg Grand Cru Alsace 200$ — powerful, peach, mineral\nCalvaire Quebec 95$ — impressive local expression from Pinard et Filles\nVues ancestrale Ontario sparkling 80$ — Riesling as bubbly!"},
    orange:{kw:["orange wine","vin orange","skin contact","macération pelliculaire","amber wine"],r:"Orange / skin-contact wines — white grapes fermented on their skins like reds.\n\nEntry: Alè Malvasia Italy 66$, Trebbiano Orange 18$/88$\nMedium: Gewurtz Alto Adige 90$, Obeideh Lebanon 105$ (ancestor of Chardonnay!), Matassa Roussillon 115$\nAdvanced: Pappou Greek Rozaki 165$ (table grape!), Ansoncaca Tuscan island 150$, Scodavacca Friuli 160$\nTop: Bardette Jura Savagnin 200$, Terre Roches Neuves Chenin 200$, Celeste Loire 180$\n\nOrange wines are food-friendly powerhouses — pair with our mezzé, makdous, or mouhammara."},
  };

  // ===== INTELLIGENT RESPONSE GENERATOR =====
  const askAI=(q)=>{
    setAiLoading(true);setAiResp(null);setAiWines([]);
    setTimeout(()=>{
      const ql=q.toLowerCase();let resp="";let picks=[];

      // ===== STEP 0: Extract hard constraints from query =====
      // Count requested
      const countMatch=ql.match(/(\d+)\s*(vin|wine|red|rouge|white|blanc|rosé|rose|orange|bulles|sparkling|bottle|bouteille|option|choix|pick|suggestion|recommendation)/);
      const countMatch2=ql.match(/(?:give me|donne|suggest|recomm|find|trouve)\s*(\d+)/);
      let wantCount=countMatch?parseInt(countMatch[1]):countMatch2?parseInt(countMatch2[1]):4;
      if(wantCount>10)wantCount=4;if(wantCount<1)wantCount=4;

      // Color filter
      let colorFilter=null;
      if(/\b(red|rouge|reds|rouges)\b/.test(ql))colorFilter="rouge";
      else if(/\b(white|blanc|blancs|whites)\b/.test(ql))colorFilter="blanc";
      else if(/\b(rosé|roses|rosés)\b/.test(ql))colorFilter="rosé";
      else if(/\b(orange|oranges|amber|skin.contact)\b/.test(ql))colorFilter="orange";
      else if(/\b(sparkling|champagne|bulles|bubbly|bubbles|pétillant|mousseux)\b/.test(ql))colorFilter="bulles";

      // Price constraints
      let priceMin=null,priceMax=null;
      const overMatch=ql.match(/(?:over|above|plus de|au.dessus de|more than|supérieur à|minimum|min)\s*(\d+)/);
      const underMatch=ql.match(/(?:under|below|moins de|en.dessous de|less than|max|maximum|inférieur à|sous)\s*(\d+)/);
      const betweenMatch=ql.match(/(?:between|entre)\s*(\d+)\s*(?:and|et|to|-)\s*(\d+)/);
      const aroundMatch=ql.match(/(?:around|environ|autour de|about|near)\s*(\d+)/);
      if(overMatch)priceMin=parseInt(overMatch[1]);
      if(underMatch)priceMax=parseInt(underMatch[1]);
      if(betweenMatch){priceMin=parseInt(betweenMatch[1]);priceMax=parseInt(betweenMatch[2])}
      if(aroundMatch){const a=parseInt(aroundMatch[1]);priceMin=Math.floor(a*0.7);priceMax=Math.ceil(a*1.3)}
      // Also catch "$300" or "300$" patterns
      const dollarMatch=ql.match(/\$\s*(\d+)|\b(\d+)\s*\$/);
      if(dollarMatch&&!overMatch&&!underMatch&&!betweenMatch&&!aroundMatch){
        const val=parseInt(dollarMatch[1]||dollarMatch[2]);
        if(/over|above|plus|more|supérieur|au.dessus/.test(ql))priceMin=val;
        else if(/under|below|moins|less|inférieur|en.dessous|max/.test(ql))priceMax=val;
        else{priceMin=Math.floor(val*0.7);priceMax=Math.ceil(val*1.3)}
      }

      // By the glass filter
      const wantGlass=/\b(glass|verre|au verre|by the glass)\b/.test(ql);

      // Build price description for response
      let priceDesc="";
      if(priceMin&&priceMax)priceDesc=`between ${priceMin}$ and ${priceMax}$`;
      else if(priceMin)priceDesc=`over ${priceMin}$`;
      else if(priceMax)priceDesc=`under ${priceMax}$`;

      // ===== STEP 1: Apply hard filters to wine pool =====
      let pool=W;
      if(colorFilter)pool=pool.filter(w=>w.color===colorFilter);
      if(priceMin)pool=pool.filter(w=>w.price>=priceMin);
      if(priceMax)pool=pool.filter(w=>w.price<=priceMax);
      if(wantGlass)pool=pool.filter(w=>w.section==="By the Glass");

      // ===== STEP 2: Check knowledge base for context =====

      // Deep knowledge topics
      for(const[,t]of Object.entries(TOPICS)){if(t.kw.some(k=>ql.includes(k))){
        resp=t.r;
        picks=pool.map(w=>({w,s:scoreWine(w,q)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,wantCount).map(x=>x.w);
        break;
      }}

      // Grape knowledge
      if(!resp){for(const[,g]of Object.entries(GRAPES)){if(g.kw.some(k=>ql.includes(k))){
        resp=g.r;
        picks=pool.filter(w=>{const wl=(w.grape+" "+w.region+" "+w.name+" "+w.profile).toLowerCase();return g.kw.some(k=>wl.includes(k))}).slice(0,wantCount);
        break;
      }}}

      // Food pairing
      if(!resp){for(const[,f]of Object.entries(FOOD)){if(f.kw.some(k=>ql.includes(k))){
        resp=f.r;
        // Score within the filtered pool
        const foodPool=colorFilter?pool:pool.filter(w=>{
          if(f.av?.includes(w.color))return false;
          return true;
        });
        picks=foodPool.map(w=>{let sc=0;const pl=w.profile.toLowerCase();
          if(f.cl.includes(w.color))sc+=12;
          f.t.forEach(t=>{if(pl.includes(t))sc+=5});
          if(["Liban","Syrie","Grèce","Arménie"].includes(w.country))sc+=3;
          if(w.section==="By the Glass")sc+=2;
          sc+=scoreWine(w,q);
          return{w,s:sc};
        }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,wantCount).map(x=>x.w);

        // Add constraint info to response
        if(priceDesc||colorFilter){
          let extra="\n\n";
          if(colorFilter)extra+=`Filtering for ${colorFilter==="rouge"?"reds":colorFilter==="blanc"?"whites":colorFilter} `;
          if(priceDesc)extra+=(colorFilter?"":"Filtering for wines ")+priceDesc;
          extra+=":";
          resp+=extra;
        }
        break;
      }}}

      // General scoring (no topic/food match — pure taste/style/price/color query)
      if(!resp){
        const scored=pool.map(w=>({w,s:scoreWine(w,q)})).sort((a,b)=>b.s-a.s);
        // If we have hard filters, be more lenient on score threshold
        const hasFilters=colorFilter||priceMin||priceMax||wantGlass;
        const threshold=hasFilters?0:6;
        const filtered2=scored.filter(x=>x.s>threshold);

        if(filtered2.length>0){
          picks=filtered2.slice(0,wantCount).map(x=>x.w);
          // Build smart response
          let parts=[];
          if(colorFilter)parts.push(colorFilter==="rouge"?"red":colorFilter==="blanc"?"white":colorFilter==="rosé"?"rosé":colorFilter==="bulles"?"sparkling":colorFilter);
          if(/fresh|frais|crisp/.test(ql))parts.push("fresh");
          if(/bold|puissant|full|rich|corsé/.test(ql))parts.push("bold");
          if(/light|léger|delicate/.test(ql))parts.push("light and delicate");
          if(/funky|natural|wild/.test(ql))parts.push("natural");
          if(/floral|aromatic/.test(ql))parts.push("aromatic");
          if(/mineral|earthy/.test(ql))parts.push("mineral");
          if(/smooth|soft|round|gentle|low acid/.test(ql))parts.push("smooth");
          if(/spicy|épicé|pepper/.test(ql))parts.push("spicy");
          if(/elegant|refined|complex/.test(ql))parts.push("elegant");

          if(parts.length>0||priceDesc){
            let desc=parts.length>0?parts.join(", "):"wines";
            resp=`Here ${wantCount===1?"is":"are"} ${wantCount===picks.length?wantCount:"my top "+picks.length} ${desc}${priceDesc?" "+priceDesc:""}${wantGlass?" by the glass":""}:`;
          }else{
            resp=`Here ${wantCount===1?"is my pick":"are my picks"} from our ${pool.length} options:`;
          }
        }else if(pool.length===0){
          // No wines match the hard filters
          let why=[];
          if(colorFilter)why.push(colorFilter==="rouge"?"red":colorFilter==="blanc"?"white":colorFilter);
          if(priceDesc)why.push(priceDesc);
          resp=`I don't have any ${why.join(" wines ")} wines on the list that match. `;
          // Suggest relaxing constraints
          if(priceMin){
            const closest=W.filter(w=>!colorFilter||w.color===colorFilter).sort((a,b)=>b.price-a.price).slice(0,3);
            if(closest.length>0){
              resp+=`Our most expensive ${colorFilter||""} wines top out at ${closest[0].price}$.`;
              picks=closest.slice(0,wantCount);
            }
          }else if(priceMax){
            const closest=W.filter(w=>!colorFilter||w.color===colorFilter).filter(w=>w.price<=priceMax+50).sort((a,b)=>a.price-b.price).slice(0,3);
            if(closest.length>0){
              resp+=`Closest options near your budget:`;picks=closest.slice(0,wantCount);
            }
          }
          if(picks.length===0){
            resp="I'd love to help! Try asking me about:\n\n🍷 \"3 reds over 300 for the lamb rack\"\n🍽 \"What goes with the kebab d'Alep?\"\n🍇 \"Tell me about your Nebbiolo\"\n💰 \"Best white under 100$\"\n🥂 \"Champagne for a celebration\"\n🌍 \"What's from Syria or Lebanon?\"\n\nOr just describe what you're in the mood for!";
          }
        }else{
          resp="I'd love to help! Try asking me about:\n\n🍷 Wine styles — \"Something fresh and mineral\" or \"3 bold reds over 200$\"\n🍽 Food pairings — \"What goes with the kebab?\" or \"Wine for the mezzé table\"\n🍇 Grapes — \"Tell me about your Nebbiolo\" or \"What Chenin do you have?\"\n💰 Budget — \"Best red under 150$\" or \"Best value on the list\"\n🌍 Regions — \"What's from Lebanon?\" or \"Local Quebec wines\"\n🥂 Occasions — \"Wine for a date night\" or \"Celebrating a birthday\"\n🏛 Producers — \"Tell me about Selosse\" or \"What is Bargylus?\"\n\nOr just describe what you're in the mood for — I'll find the perfect bottle.";
        }
      }

      // ===== STEP 3: Build wine notes with ALWAYS showing price =====
      if(picks.length>0&&!/•/.test(resp)){
        resp+=picks.map(w=>`\n\n• ${w.name} — ${w.price}$\n${w.producer} · ${w.grape}\n${w.region}, ${w.country}\n${w.profile.split('.').slice(0,2).join('.')}.`).join("");
      }

      setAiResp(resp);setAiWines(picks.slice(0,5));setAiLoading(false);
    },400);
  };

  const filtered=aiMode?[]:W.filter(w=>{
    const sec=w.section===section;
    const srch=!query||[w.name,w.producer,w.grape,w.region,w.country,w.profile].some(f=>f.toLowerCase().includes(query.toLowerCase()));
    const pr=priceFilter==="all"||(priceFilter==="u100"&&w.price<100)||(priceFilter==="100"&&w.price>=100&&w.price<=200)||(priceFilter==="200"&&w.price>200&&w.price<=500)||(priceFilter==="500"&&w.price>500);
    return sec&&srch&&pr;
  });
  const grouped={};filtered.forEach(w=>{if(!grouped[w.color])grouped[w.color]=[];grouped[w.color].push(w)});

  const WineCard=({wine})=>(
    <div className="wc" onClick={()=>setSelected(wine)} style={{padding:"13px 16px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:14,cursor:"pointer"}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap"}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:DOTS[wine.color],display:"inline-block",flexShrink:0}}/>
          <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:500,color:C.white}}>{wine.name}</span>
          <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:C.muted}}>{wine.producer}</span>
        </div>
        <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:C.muted,marginTop:4,display:"flex",gap:6,flexWrap:"wrap"}}>
          <span>{FLAGS[wine.country]||"🍷"} {wine.grape}</span><span style={{color:C.border}}>•</span><span>{wine.region}</span>
        </div>
      </div>
      <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:500,color:C.gold,whiteSpace:"nowrap"}}>{wine.price}$</span>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"Georgia,serif"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:${C.border};border-radius:4px}
        .wc{transition:all .25s ease}.wc:hover{transform:translateY(-1px);background:${C.card}!important;border-color:${C.gold}!important}
        .tb{transition:all .3s;cursor:pointer;border:none;background:none}.tb:hover{color:${C.gold}!important}
        .sb{transition:all .2s;cursor:pointer;white-space:nowrap}.sb:hover{color:${C.gold}!important}
        .pl{transition:all .2s;cursor:pointer}.pl:hover{background:${C.gold}!important;color:${C.bg}!important}
        .fi{transition:all .2s}.fi:hover{background:${C.card}!important}
        .si:focus{outline:none;border-color:${C.gold}!important}
        .mo{animation:fi .25s ease}.mc{animation:su .3s ease}
        @keyframes fi{from{opacity:0}to{opacity:1}}@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pu{0%,100%{opacity:.4}50%{opacity:1}}.ad{animation:pu 1.4s ease-in-out infinite}
        .hint{transition:all .2s;cursor:pointer}.hint:hover{border-color:${C.gold}!important;color:${C.gold}!important}
      `}</style>
      <header style={{padding:"32px 24px 0",textAlign:"center",borderBottom:`1px solid ${C.border}`}}>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(36px,6vw,52px)",fontWeight:300,color:C.white,letterSpacing:"8px",textTransform:"uppercase",marginBottom:4}}>Damas</h1>
        <p style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:C.muted,letterSpacing:"3px",textTransform:"uppercase",marginBottom:24}}>Carte des Vins & Cocktails • {W.length} vins</p>
        <div style={{display:"flex",justifyContent:"center",marginBottom:-1}}>
          {[{id:"wine",l:"Carte des Vins"},{id:"drinks",l:"Cocktails & Boissons"}].map(t=>(
            <button key={t.id} className="tb" onClick={()=>{setTab(t.id);setAiMode(false);setAiResp(null);setAiWines([]);setQuery("")}}
              style={{padding:"12px 28px",fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:tab===t.id?500:400,color:tab===t.id?C.gold:C.muted,borderBottom:tab===t.id?`2px solid ${C.gold}`:"2px solid transparent",letterSpacing:"1px"}}>{t.l}</button>
          ))}
        </div>
      </header>

      {tab==="wine"&&(
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 16px"}}>
          <div style={{padding:"20px 0 8px"}}>
            <div style={{display:"flex",gap:8,alignItems:"stretch"}}>
              <div style={{flex:1,position:"relative"}}>
                <input ref={inputRef} className="si" type="text" value={query}
                  placeholder={aiMode?"Ask anything — \"fresh wine with low acidity\", \"what goes with the fattouch?\"":"Search wines, grapes, regions..."}
                  onChange={e=>{setQuery(e.target.value);if(aiMode){setAiResp(null);setAiWines([])}}}
                  onKeyDown={e=>{if(e.key==="Enter"&&aiMode&&query.trim()&&!aiLoading){e.preventDefault();askAI(query)}}}
                  style={{width:"100%",padding:"12px 16px 12px 40px",background:aiMode?C.aiBg:C.surface,border:`1px solid ${aiMode?C.aiBdr:C.border}`,borderRadius:8,color:C.cream,fontFamily:"'DM Sans',sans-serif",fontSize:13}}
                />
                <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:14,opacity:.5}}>{aiMode?"✦":"⌕"}</span>
              </div>
              <button type="button" onClick={()=>{setAiMode(!aiMode);setAiResp(null);setAiWines([]);setQuery("");setTimeout(()=>inputRef.current?.focus(),100)}}
                style={{padding:"0 16px",borderRadius:8,border:`1px solid ${aiMode?C.gold:C.border}`,background:aiMode?C.gold:"transparent",color:aiMode?C.bg:C.muted,fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:500,cursor:"pointer",whiteSpace:"nowrap",transition:"all .2s"}}>
                {aiMode?"✦ Sommelier ON":"✦ Ask Sommelier"}
              </button>
              {aiMode&&query.trim()&&!aiResp&&(
                <button type="button" disabled={aiLoading} onClick={()=>{if(query.trim()&&!aiLoading)askAI(query)}}
                  style={{padding:"0 20px",borderRadius:8,border:"none",background:aiLoading?C.border:C.gold,color:C.bg,fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500,cursor:aiLoading?"wait":"pointer",whiteSpace:"nowrap"}}>
                  {aiLoading?"...":"Ask"}
                </button>
              )}
            </div>
          </div>

          {aiMode&&!aiResp&&!aiLoading&&(
            <div style={{padding:"12px 0 20px"}}>
              <p style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:C.muted,marginBottom:12}}>Try asking:</p>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {["What goes with the fattouch?","Best red for the ribeye Sharat","Tell me about your Nebbiolo","Wine for a date night","What's available by the glass?","Natural orange wine under 150$","Something from Syria or Lebanon","What's the tasting menu pairing?","Is the kebab halal?","Fresh white, low acidity"].map(h=>(
                  <button key={h} className="hint" onClick={()=>{setQuery(h);askAI(h)}}
                    style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${C.border}`,background:"transparent",color:C.text,fontFamily:"'DM Sans',sans-serif",fontSize:11}}>{h}</button>
                ))}
              </div>
            </div>
          )}

          {aiLoading&&(<div style={{padding:"32px 0",textAlign:"center"}}><div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:12}}>{[0,1,2].map(i=><div key={i} className="ad" style={{width:6,height:6,borderRadius:"50%",background:C.gold,animationDelay:`${i*.2}s`}}/>)}</div><p style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:C.muted}}>Your sommelier is thinking...</p></div>)}

          {aiResp&&(
            <div style={{padding:"16px 0 8px"}}>
              <div style={{padding:"20px 24px",background:C.aiBg,border:`1px solid ${C.aiBdr}`,borderRadius:10,marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><span style={{fontSize:14}}>✦</span><span style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:C.gold,letterSpacing:"2px",textTransform:"uppercase",fontWeight:500}}>Sommelier</span></div>
                <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:C.cream,lineHeight:1.7,whiteSpace:"pre-line"}}>{aiResp}</p>
              </div>
              {aiWines.length>0&&(<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}><p style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:C.gold,letterSpacing:"2px",textTransform:"uppercase",marginBottom:4}}>Recommended wines</p>{aiWines.map((w,i)=><WineCard key={i} wine={w}/>)}</div>)}
              <button onClick={()=>{setAiResp(null);setAiWines([]);setQuery("");inputRef.current?.focus()}} style={{padding:"8px 16px",borderRadius:6,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontFamily:"'DM Sans',sans-serif",fontSize:11,cursor:"pointer"}}>Ask another question</button>
            </div>
          )}

          {!aiMode&&(<>
            <div style={{display:"flex",gap:6,padding:"4px 0 12px",flexWrap:"wrap"}}>
              {[{id:"all",l:"All"},{id:"u100",l:"<100$"},{id:"100",l:"100-200$"},{id:"200",l:"200-500$"},{id:"500",l:"500$+"}].map(f=>(
                <button key={f.id} className="pl" onClick={()=>setPriceFilter(f.id)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${priceFilter===f.id?C.gold:C.border}`,background:priceFilter===f.id?C.gold:"transparent",color:priceFilter===f.id?C.bg:C.muted,fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:priceFilter===f.id?500:400,cursor:"pointer"}}>{f.l}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:4,overflowX:"auto",padding:"4px 0 16px",borderBottom:`1px solid ${C.border}`}}>
              {SECTIONS.map(s=>(<button key={s} className="sb" onClick={()=>setSection(s)} style={{padding:"6px 14px",borderRadius:4,border:"none",background:section===s?C.card:"transparent",color:section===s?C.gold:C.muted,fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:section===s?500:400}}>{s}</button>))}
            </div>
            <div style={{padding:"20px 0 40px"}}>
              {Object.entries(grouped).map(([color,wines])=>(
                <div key={color} style={{marginBottom:28}}>
                  <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:400,color:C.cream,marginBottom:12,paddingBottom:6,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
                    <span style={{width:8,height:8,borderRadius:"50%",background:DOTS[color]}}/>{CLABELS[color]}<span style={{fontSize:12,color:C.muted,fontFamily:"'DM Sans',sans-serif",fontWeight:400}}>({wines.length})</span>
                  </h3>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>{wines.map((w,i)=><WineCard key={i} wine={w}/>)}</div>
                </div>
              ))}
              {Object.keys(grouped).length===0&&<p style={{textAlign:"center",padding:40,fontFamily:"'DM Sans',sans-serif",fontSize:13,color:C.muted}}>No wines match your search.</p>}
            </div>
          </>)}
        </div>
      )}

      {tab==="drinks"&&(
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 16px"}}>
          <div style={{display:"flex",gap:4,overflowX:"auto",padding:"20px 0 16px",borderBottom:`1px solid ${C.border}`}}>
            {Object.keys(COCKTAILS_DATA).map(s=>(<button key={s} className="sb" onClick={()=>setDrinkSec(s)} style={{padding:"6px 14px",borderRadius:4,border:"none",background:drinkSec===s?C.card:"transparent",color:drinkSec===s?C.gold:C.muted,fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:drinkSec===s?500:400}}>{s}</button>))}
          </div>
          <div style={{padding:"20px 0 40px"}}>
            <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:400,color:C.cream,marginBottom:20}}>{drinkSec}</h3>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {COCKTAILS_DATA[drinkSec]?.map((item,i)=>(
                <div key={i} className="fi" style={{padding:"14px 18px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:16}}>
                  <div>
                    <h4 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:500,color:C.white,marginBottom:item.desc?4:0}}>{item.name}</h4>
                    {item.desc&&<p style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:C.muted,lineHeight:1.4}}>{item.desc}</p>}
                    {item.name?.includes("*")&&<span style={{display:"inline-block",padding:"2px 8px",borderRadius:3,fontSize:10,letterSpacing:".5px",textTransform:"uppercase",background:"#2A2832",color:"#9A8AC4",marginTop:4}}>Sans alcool disponible</span>}
                  </div>
                  <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:500,color:C.gold,whiteSpace:"nowrap"}}>{item.price}$</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {selected&&(
        <div className="mo" onClick={()=>setSelected(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:1000}}>
          <div className="mc" onClick={e=>e.stopPropagation()} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,maxWidth:500,width:"100%",maxHeight:"85vh",overflow:"auto"}}>
            <div style={{padding:"28px 28px 20px",borderBottom:`1px solid ${C.border}`,position:"relative"}}>
              <button onClick={()=>setSelected(null)} style={{position:"absolute",top:16,right:16,background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer"}}>✕</button>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:C.gold,letterSpacing:"2px",textTransform:"uppercase",marginBottom:8}}>{FLAGS[selected.country]||"🍷"} {selected.country} · {selected.section}</div>
              <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:400,color:C.white,lineHeight:1.2,marginBottom:4,paddingRight:30}}>{selected.name}</h2>
              <p style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:C.muted}}>{selected.producer}</p>
            </div>
            <div style={{padding:"20px 28px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
                <div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:4}}>Grape</div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:C.cream}}>{selected.grape}</div></div>
                <div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:4}}>Region</div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:C.cream}}>{selected.region}</div></div>
                <div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:4}}>Color</div><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:8,height:8,borderRadius:"50%",background:DOTS[selected.color]}}/><span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:C.cream,textTransform:"capitalize"}}>{selected.color}</span></div></div>
              </div>
              <div style={{marginBottom:24}}>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:8}}>Tasting Profile</div>
                <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:C.text,lineHeight:1.65,fontStyle:"italic"}}>{selected.profile}</p>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 0 8px",borderTop:`1px solid ${C.border}`}}>
                <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:500,color:C.gold}}>{selected.price}$</span>
              </div>
            </div>
          </div>
        </div>
      )}
      <footer style={{textAlign:"center",padding:"24px",borderTop:`1px solid ${C.border}`,fontFamily:"'DM Sans',sans-serif",fontSize:11,color:C.muted}}>Damas — 1201 Avenue Van Horne, Montréal</footer>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));root.render(React.createElement(App));
</script></body></html>
