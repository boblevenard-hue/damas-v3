const WINES_DATA = [
  {n:"Roero Arneis 2024",p:"Tibaldi",pr:17,g:"Arnese",r:"Roero, Piemonte",c:"Italie",cl:"blanc",s:"By the Glass",pf:"Crisp, floral Piedmontese white. White peach, green apple, almond blossom, touch of white pepper. Light-bodied, refreshing acidity, delicate mineral finish. Charming aperitif. Pairs with mezzé spread, fattouch, crevettes kataifi."},
  {n:"Kashf 2022",p:"El Sabban",pr:18,g:"Viognier",r:"Mont Liban",c:"Liban",cl:"blanc",s:"By the Glass",pf:"Aromatic Lebanese Viognier from Mount Lebanon. Lush apricot, peach blossom, jasmine, white spice. Full-bodied, silky almost oily texture, balanced acidity. Honeyed stone fruit finish. El Sabban is among Lebanon\'s exciting new producers. Pairs with humus shawarma, crevettes, halloumi."},
  {n:"Roc Troucat 2023",p:"La Bancale",pr:18,g:"Carignan Blanc",r:"Roussillon",c:"France",cl:"blanc",s:"By the Glass",pf:"Rare white Carignan from old Roussillon vines — very few producers work this grape. Mediterranean herbs, citrus peel, fennel, saline minerality. Medium-bodied, textured, gastronomic weight, oyster-shell finish. Natural winemaking, minimal sulfites. Exceptional with pieuvre or daurade."},
  {n:"Bargylus Blanc 2018",p:"Bargylus",pr:25,g:"Sauvignon Blanc, Chardonnay",r:"Lattakia",c:"Syrie",cl:"blanc",s:"By the Glass",pf:"Syria\'s iconic wine from high-altitude Lattakia vineyards, managed remotely during the war. Sauvignon Blanc-Chardonnay blend. Tropical fruit, flint, cedar, white flowers, hint of smoke. Medium-full body, elegant structure, bright acidity, remarkable aging potential. A symbol of resilience. Magnificent with bar grillé or daurade Samke Harra."},
  {n:"Origins NV",p:"Keush",pr:20,g:"Voskeat",r:"Vayotz Dzor",c:"Arménie",cl:"bulles",s:"By the Glass",pf:"Traditional method sparkling from Armenia\'s ancient Vayotz Dzor — one of earth\'s oldest wine regions. Indigenous Voskeat grape. Fine persistent bubbles, green apple, brioche, toasted almond, chalky volcanic minerality. Crisp and dry. Keush leads Armenia\'s wine renaissance. Perfect aperitif or with borek aux fromages."},
  {n:"Bulles de Roche 2022",p:"Thierry Germain",pr:24,g:"Chenin Blanc",r:"Crémant de Loire",c:"France",cl:"bulles",s:"By the Glass",pf:"Biodynamic Crémant from Loire legend Thierry Germain (Roches Neuves). 100% Chenin from tuffeau limestone. Precise fine mousse, quince, honeycomb, crushed chalk, white flowers. Dry, mineral, long saline finish. Brilliant with borek or crevettes kataifi."},
  {n:"L'Éclat 2023",p:"Roche en Loire",pr:17,g:"Cabernet Franc, Grolleau",r:"Touraine, Loire",c:"France",cl:"rosé",s:"By the Glass",pf:"Pale vibrant Loire rosé. Wild strawberry, pink grapefruit, blood orange, savory herbal edge. Dry, refreshing, lively acidity, clean mineral finish. Best-value pour on our list. Versatile — fattouch, mezzé, pieuvre, or simply as aperitif."},
  {n:"Trebbiano Orange 2022",p:"Casale",pr:18,g:"Trebbiano",r:"Toscane",c:"Italie",cl:"orange",s:"By the Glass",pf:"Skin-contact Tuscan Trebbiano with amber hue from extended maceration. Dried apricot, chamomile, bergamot, roasted almond. Medium-bodied, gentle tannic grip, oxidative nuttiness, herbal complexity. Natural winemaking. Fascinating with makdous, mutabbal, or mouhammara."},
  {n:"Ayehoros 2022",p:"Dalamara",pr:17,g:"Xinomavro, Merlot",r:"Macédoine",c:"Grèce",cl:"rouge",s:"By the Glass",pf:"Greek blend from Naoussa marrying Xinomavro\'s tannic structure and tomato-leaf character with Merlot\'s plush dark fruit. Medium-bodied, earthy, with dried herbs and gentle spice. Food-friendly with moderate tannins. Dalamara is a family estate reviving northern Greek winemaking. Great with kibbeh nayé or kebab."},
  {n:"Dolcetto d'Alba 2022",p:"Mauro Veglio",pr:18,g:"Dolcetto",r:"Piemonte",c:"Italie",cl:"rouge",s:"By the Glass",pf:"Classic Piedmontese Dolcetto from respected Barolo producer Mauro Veglio. Dark cherry, violet, bitter almond, touch of licorice. Soft velvety tannins, low acidity, medium body. Perfect everyday drinking red — the name means \'little sweet one\' though it\'s dry. Pairs with pastirma, kibbeh frit, or pizza."},
  {n:"Mise en Bouche 2023",p:"Darnaud",pr:21,g:"Syrah",r:"Crozes-Hermitage, Rhône",c:"France",cl:"rouge",s:"By the Glass",pf:"Northern Rhône Syrah from Emmanuel Darnaud, one of the region\'s rising stars. Cracked black pepper, blackberry, smoked meat, violet, hint of olive. Medium-bodied with fine silky tannins and a savory, spicy finish. Darnaud also produces our Hermitage (450$). Superb with kebab d\'Alep, carré d\'agneau, or humus shawarma."},
  {n:"Liaison 2022",p:"Enderle Moll",pr:22,g:"Pinot Noir",r:"Baden",c:"Allemagne",cl:"rouge",s:"By the Glass",pf:"Ethereal German Pinot Noir from Baden\'s cool climate. Red cherry, rose petal, forest floor, cranberry, hint of white pepper. Light-bodied, silky translucent tannins, vibrant acidity, long perfumed finish. Enderle & Moll are among Germany\'s top natural Pinot producers. Beautiful with kibbeh nayé or shish taouk."},
  {n:"Bargylus Rouge 2017",p:"Bargylus",pr:27,g:"Syrah, Merlot, Cabernet Sauvignon",r:"Lattakia",c:"Syrie",cl:"rouge",s:"By the Glass",pf:"Syria\'s flagship red from the same coastal Lattakia estate as the blanc. Syrah-dominant blend. Dark fruit, garrigue, leather, cedar, black olive, smoked herbs. Full-bodied with polished tannins, impressive depth, and a long spiced finish. The 2017 is mature and drinking perfectly. A wine that tells the story of Syria. Stunning with carré d\'agneau or faux filet Sharat."},
  {n:"Gran Reserva 2021",p:"Sumarroca",pr:60,g:"Cava Brut Nature",r:"Penedès",c:"Espagne",cl:"bulles",s:"Bulles",pf:"Zero-dosage Cava with extended lees aging from organic Penedès estate. Toasted almond, citrus peel, green apple, brioche. Creamy persistent mousse balanced by bone-dry precision and chalky minerality. Outstanding value for traditional-method sparkling. Aperitif or with borek aux fromages."},
  {n:"Bulles 2021",p:"Polisson",pr:62,g:"Méthode Ancestrale",r:"Oka",c:"Québec",cl:"bulles",s:"Bulles",pf:"Natural pétillant-naturel from Quebec\'s Oka region. Méthode ancestrale — bottled before fermentation completes. Cloudy, funky, alive. Cider apple, fresh bread, pear, gentle effervescence. Raw and characterful, a true expression of Quebec terroir. Fun with mezzé or on its own."},
  {n:"Ces Petits Imprévus 2024",p:"Nival",pr:72,g:"Vidal ancestrale",r:"Lac St Pierre",c:"Québec",cl:"bulles",s:"Bulles",pf:"Ancestral method Vidal from Nival, one of Quebec\'s most exciting producers on the Lac St-Pierre. Tropical fruit, honeyed pear, white flowers, fine persistent bubbles. Fresh, celebratory, with a touch of sweetness balanced by acidity. Great with crevettes kataifi or desserts."},
  {n:"Rio degli Sgoccioli 2021",p:"Cinque Campi",pr:75,g:"Lambrusco",r:"Lambrusco",c:"Italie",cl:"bulles",s:"Bulles",pf:"Rouge brut Lambrusco — deep red color, bone-dry, completely unlike sweet commercial Lambrusco. Sour cherry, violets, wild herbs, snappy tannic fizz. Utterly refreshing and unique. Cinque Campi farms biodynamically in Emilia-Romagna. The most fun wine on our list. Great with charcuterie or mezzé."},
  {n:"Vues 2023",p:"Lieux Communs",pr:80,g:"Riesling ancestrale",r:"Beamsville",c:"Ontario",cl:"bulles",s:"Bulles",pf:"Canadian ancestral Riesling from Ontario\'s Beamsville Bench. Lime blossom, petrol hint, green apple, mineral-driven mousse. Zippy acidity, clean and precise. Lieux Communs is pushing Canadian natural wine forward. Aperitif or with fattouch."},
  {n:"Origins NV (btl)",p:"Keush",pr:84,g:"Voskeat brut",r:"Vayotz Dzor",c:"Arménie",cl:"bulles",s:"Bulles",pf:"Full bottle of the Armenian sparkling also available by glass (20$). Traditional method from indigenous Voskeat grape grown on volcanic soils at altitude. Fine bubbles, green apple, brioche, chalky minerality. One of the most distinctive sparklings on our list — ancient terroir, modern technique. Perfect to start the evening."},
  {n:"Éphémère 2023",p:"Courault",pr:85,g:"Chenin ancestrale",r:"Loire",c:"France",cl:"bulles",s:"Bulles",pf:"Ethereal Loire pét-nat from Courault. 100% Chenin Blanc, méthode ancestrale. Quince, white flower, fresh pear, gentle mousse. Delicate and fleeting — like its name suggests. Low alcohol, natural, easy-drinking. Beautiful aperitif or with lighter mezzés."},
  {n:"Fetembulles 2022",p:"Robinot",pr:100,g:"Chenin ancestrale",r:"Loire",c:"France",cl:"bulles",s:"Bulles",pf:"Wild biodynamic Chenin pét-nat from cult Loire producer Robinot. Jean-Pierre Robinot is a legend of natural wine. Honey, beeswax, quince paste, hazelnut, taut saline finish. Complex, layered, absolutely distinctive. Not your typical sparkling — this is a wine lover\'s wine. Pairs with borek or pieuvre."},
  {n:"Les Années Folles 2022",p:"Robinot",pr:100,g:"Pineau d'Aunis ancestrale",r:"Loire",c:"France",cl:"bulles",s:"Bulles",pf:"Rare sparkling Pineau d\'Aunis — an ancient Loire grape almost extinct. White pepper, rose hip, cranberry, blood orange. Pink-tinged and utterly unique. Also from Robinot. The name means \'The Crazy Years.\' For adventurous palates who want something they\'ve never tasted before."},
  {n:"Bulles de Roche 2022 (btl)",p:"Thierry Germain",pr:105,g:"Chenin Brut",r:"Loire",c:"France",cl:"bulles",s:"Bulles",pf:"Full bottle of the Crémant also available by glass (24$). Biodynamic Chenin from Roches Neuves\' tuffeau limestone. Precise mineral mousse, quince, brioche, chalk. Dry and elegant with remarkable length. One of France\'s finest Crémants. Aperitif through to borek."},
  {n:"I Hope Everyday 2021",p:"Steen",pr:105,g:"Rosé ancestrale",r:"Ardèche",c:"France",cl:"bulles",s:"Bulles",pf:"Joyful rosé pét-nat from the Ardèche by South African-born winemaker Steen. Strawberry, watermelon rind, rose petal, playful mousse. Light, fun, and infectiously drinkable. The label art is as joyful as the wine. Perfect for starting a mezzé feast."},
  {n:"Crémant de Jura 2022",p:"Touraize",pr:110,g:"Brut Nature",r:"Arbois, Jura",c:"France",cl:"bulles",s:"Bulles",pf:"Zero-dosage Jura Crémant from Touraize in Arbois. Yellow apple, hazelnut, slight oxidative edge typical of Jura terroir, fine mousse. Dry and distinctive — if you love Jura wines, this is a sparkling introduction to that world. Pairs with richer mezzés or pieuvre."},
  {n:"Prs 2020",p:"Vivanterre",pr:115,g:"Demi-sec",r:"Alsace",c:"France",cl:"bulles",s:"Bulles",pf:"Off-dry Alsatian sparkler from natural producer Vivanterre. Exotic fruit, ginger, lychee, touch of residual sweetness balanced by bright acidity. Aromatic and charming. The slight sweetness makes it wonderful with spicier dishes — mouhammara, kebab, or our desserts."},
  {n:"La Chassornade 2021",p:"Cossard",pr:115,g:"Aligoté ancestrale",r:"Bourgogne",c:"France",cl:"bulles",s:"Bulles",pf:"Burgundian Aligoté pét-nat from legendary négociant Dominique Cossard. Lemony, chalky, electrifyingly fresh. Cossard sources from top Burgundy sites and makes wine with minimal intervention. A sparkling that\'s both serious and playful. With fattouch or oysters."},
  {n:"Funambulles 2022",p:"Lafitte",pr:120,g:"Gros Manseng ancestrale",r:"Jurançon",c:"France",cl:"bulles",s:"Bulles",pf:"Southwest France pét-nat from Gros Manseng — a grape usually used for sweet Jurançon. Tropical punch, quince paste, mango, tightrope balance of sweetness and acid. The name means \'tightrope walkers.\' Unique and delightful. Try with crevettes or Safarjal dessert."},
  {n:"L'Artiglio 2019",p:"Cinque Campi",pr:122,g:"Orange ancestrale",r:"Emilia-Romagna",c:"Italie",cl:"bulles",s:"Bulles",pf:"Skin-contact sparkling from the same producer as our Lambrusco. Amber hue, dried herb, tangerine peel, saffron, tannic savory fizz. A wine that defies categorization. For the most adventurous guest at the table. Pairs with complex mezzé or makdous."},
  {n:"Segelfalter 2021",p:"Tscheppe",pr:150,g:"Demi-sec Muskateller",r:"Styria",c:"Autriche",cl:"bulles",s:"Bulles",pf:"Austrian Muskateller from Eduard Tscheppe in Styria. Intoxicating floral aromatics — lychee, rose, elderflower, orange blossom. Delicately sweet with a perfumed, ethereal palate. One of Austria\'s most poetic wines. Stunning with our Halaweit El Jibn or Kunafa desserts."},
  {n:"Cuvée Zéro",p:"Tarlant",pr:130,g:"Extra Brut",r:"Vallée de la Marne",c:"France",cl:"bulles",s:"Champagne",pf:"Zero-dosage grower Champagne from the Tarlant family (14th generation). Razor-sharp precision — green apple, chalk, toasted bread, citrus zest. Bone-dry with no added sugar, letting the terroir speak purely. One of the best entry points into serious Champagne. Aperitif or with borek and caviar."},
  {n:"Sainte Anne",p:"Chartogne-Taillet",pr:145,g:"Brut",r:"Montagne de Reims",c:"France",cl:"bulles",s:"Champagne",pf:"Single-vineyard grower Champagne from Alexandre Chartogne-Taillet, trained by Anselme Selosse. Red fruit, white pepper, brioche, creamy vinous palate. Elegant and complex with fine persistent mousse. A sommelier favorite — serious wine disguised as celebration. Works through an entire mezzé feast."},
  {n:"Garennes",p:"Laval",pr:275,g:"Extra Brut",r:"Vallée de la Marne",c:"France",cl:"bulles",s:"Champagne",pf:"Small-production Marne Champagne from Laval. Crystalline purity, citrus blossom, hazelnut, crushed stone. Extra Brut with minimal dosage. Stunningly precise and mineral-driven. For the guest who wants Champagne of substance. Aperitif or with pieuvre."},
  {n:"La Rue des Noyers",p:"Benoit Dehu",pr:320,g:"Extra Brut",r:"Vallée de la Marne",c:"France",cl:"bulles",s:"Champagne",pf:"Single-parcel Champagne from old Pinot Meunier vines — a grape often overlooked in Champagne. Rich, vinous, with baked apple, brioche, spice, and toasted hazelnut. Shows the nobility of Meunier in the right hands. A connoisseur\'s Champagne."},
  {n:"Cumières",p:"Laval",pr:325,g:"1er Cru, Extra Brut",r:"Vallée de la Marne",c:"France",cl:"bulles",s:"Champagne",pf:"Premier Cru from Laval\'s top parcel in Cumières. Orchard fruit, brioche, acacia honey, mineral-driven finish of great length. Depth and finesse in equal measure. A Champagne for the table — holds up to richer dishes like our crevettes or even a lighter fish course."},
  {n:"Les Puits 2016",p:"Émilien Feneuil",pr:360,g:"Blanc de Noir, Extra Brut",r:"Vallée de la Marne",c:"France",cl:"bulles",s:"Champagne",pf:"Vintage Blanc de Noir from a single harvest — 100% Pinot Noir. Power and grace. Red fruit, bread crust, baking spice, creamy structured palate. The 2016 has had time to develop complexity. A serious food Champagne — try with pastirma or even a lighter red-meat dish."},
  {n:"Les Pierrières",p:"Ulysse Collin",pr:450,g:"Blanc de Blancs, Extra Brut",r:"Coteaux du Petit Morin",c:"France",cl:"bulles",s:"Champagne",pf:"Cult grower Champagne from Olivier Collin on the chalky slopes of Petit Morin. Laser-focused minerality, citrus, seashell, extraordinary length. Tiny production, perpetually allocated. One of the most exciting Champagne producers today. A wine of pure crystalline beauty."},
  {n:"Largillier",p:"Guillaume Selosse",pr:600,g:"Blanc de Noir, Extra Brut",r:"Côte des Bar",c:"France",cl:"bulles",s:"Champagne",pf:"Guillaume Selosse — son of the legendary Jacques — forging his own path in the Côte des Bar. Pinot Noir-driven with power, spice, oxidative complexity, and depth. Different style from his father but equally compelling. For collectors and Champagne connoisseurs."},
  {n:"Mareuil sur Aÿ 2014",p:"Philipponat",pr:700,g:"1er Cru Extra Brut",r:"Montagne de Reims",c:"France",cl:"bulles",s:"Champagne",pf:"Aged Premier Cru from historic house Philipponat, known for Clos des Goisses. The 2014 shows toasted hazelnut, honey, dried flowers, truffle, majestic lingering finish. Over a decade of evolution. A monument of Champagne. For the most special moments."},
  {n:"Les Carelles",p:"Jacques Selosse",pr:800,g:"Blanc de Blancs Grand Cru",r:"Le Mesnil-sur-Oger",c:"France",cl:"bulles",s:"Champagne",pf:"Legendary single-vineyard Champagne from Jacques Selosse — the man who revolutionized grower Champagne. Les Carelles is a lieu-dit in Le Mesnil. Oxidative Chardonnay with walnut, iodine, beeswax, and profound mineral depth. Among the most sought-after Champagnes in existence. A masterpiece."},
  {n:"La Côte Faron",p:"Jacques Selosse",pr:800,g:"Blanc de Noir Grand Cru",r:"Aÿ",c:"France",cl:"bulles",s:"Champagne",pf:"Grand Cru Pinot Noir from the south-facing slopes of Aÿ. Powerful, vinous, with red fruit, spice, leather, and Selosse\'s signature oxidative brilliance. More structured and commanding than the Blancs. Extremely limited production. A collector\'s grail."},
  {n:"Sous le Mont",p:"Jacques Selosse",pr:800,g:"1er Cru Blanc de Noir",r:"Mareuil sur Aÿ",c:"France",cl:"bulles",s:"Champagne",pf:"Premier Cru single-plot Blanc de Noir from Mareuil-sur-Aÿ. Rich, structured Pinot expression with earth, wild mushroom, toasted brioche, and hazelnut. The most vinous of the Selosse lieux-dits. Decant it like a Burgundy — it rewards the attention."},
  {n:"Substance",p:"Jacques Selosse",pr:850,g:"Grand Cru Brut Nature",r:"Avize, Côte des Blancs",c:"France",cl:"bulles",s:"Champagne",pf:"The crown jewel. Selosse\'s perpetual reserve solera from Grand Cru Avize — every vintage since 1986 lives in this bottle. Layer upon layer of complexity: honey, oxidation, chalk, tropical fruit, nuts, iodine. Grand Cru Brut Nature — zero dosage. Transcendent and unrepeatable. The most profound Champagne on our list."},
  {n:"Rosé 2024",p:"Pigeon Hill",pr:60,g:"Hybrides",r:"Saint Armand",c:"Québec",cl:"rosé",s:"Rosé",pf:"Fresh Quebec hybrid rosé from Saint-Armand. Wild berry, rhubarb, watermelon, crisp and easy-drinking. Local and charming — proof that Quebec can make delightful pink wines. Lowest-priced rosé on our list. Perfect patio pour with fattouch or mezzé."},
  {n:"La Fuitina 2023",p:"Luca Bambara",pr:65,g:"Nero d'Avola",r:"Sicilia",c:"Italie",cl:"rosé",s:"Rosé",pf:"Sicilian rosé from Nero d\'Avola, the island\'s great red grape. Blood orange, Mediterranean herbs, sun-dried tomato, wild fennel. Mineral palate with a sun-kissed warmth. Natural winemaking from young Sicilian producer. Lovely with pieuvre, halloumi, or our grilled vegetables."},
  {n:"Riflesso Rosi 2021",p:"Eugenio Rosi",pr:70,g:"Marzemino",r:"Trentino",c:"Italie",cl:"rosé",s:"Rosé",pf:"Distinctive Trentino rosé from Marzemino — the grape Mozart praised in Don Giovanni. Rose petal, pomegranate, alpine wild strawberry. Silky texture with alpine freshness and fine tannins. Eugenio Rosi is a master of this grape. Elegant with labhne, yalanji, or shish taouk."},
  {n:"Pinot Grigio 2020",p:"Sumenjak",pr:80,g:"Pinot Grigio Ramato",r:"Slovénie",c:"Slovénie",cl:"rosé",s:"Rosé",pf:"Copper-hued ramato-style Pinot Grigio from Slovenia — extended skin contact gives it the amber-pink color. Dried rose, melon, white tea, apricot. Tannic, savory grip with a dry, textured palate. More like a light red than a typical PG. For guests who want something truly different. Try with makdous or mouhammara."},
  {n:"Ward 2023",p:"Heya",pr:88,g:"Tempranillo",r:"Bekaa",c:"Liban",cl:"rosé",s:"Rosé",pf:"Lebanese Tempranillo rosé from the Bekaa Valley — unexpected grape, stunning result. Strawberry, garrigue, dried herbs, pink pepper. Surprising structure and depth for a rosé. Heya is a new Lebanese producer to watch. Beautiful cultural bridge between Spain and Lebanon. With kebab or halloumi."},
  {n:"Test Press 2022",p:"Uva",pr:88,g:"Syrah",r:"Roussillon",c:"France",cl:"rosé",s:"Rosé",pf:"Roussillon Syrah rosé with depth beyond typical pink wine. Lavender, white pepper, cured meat, garrigue. Meaty, savory, almost a light red in rosé form. Natural winemaking. For the guest who says \'I don\'t usually like rosé.\' Excellent with kebab d\'Alep or humus shawarma."},
  {n:"Lladoner Pelut 2023",p:"L'Atelier Vigneron",pr:88,g:"Grenache Poilue",r:"Roussillon",c:"France",cl:"rosé",s:"Rosé",pf:"Rare \'hairy Grenache\' (Grenache Poilue) — the fuzzy-leafed cousin of regular Grenache, nearly extinct. Wild strawberry, thyme, rosemary, rustic Mediterranean character. L\'Atelier Vigneron rescues forgotten varieties. A conversation piece with real substance. With mezzé spread or halloumi."},
  {n:"Faustine 2023",p:"Comte Abbatucci",pr:95,g:"Sciaccarellu",r:"Ajaccio, Corse",c:"France",cl:"rosé",s:"Rosé",pf:"Corsican rosé from indigenous Sciaccarellu grape — only found on the island. Wild maquis herbs, blood orange, sea spray, pink peppercorn. Briny, windswept minerality. Comte Abbatucci is Corsican wine royalty, farming ancient ungrafted vines biodynamically. Extraordinary with pieuvre or daurade."},
  {n:"Rosé 2023",p:"Roc d'Anglade",pr:100,g:"Carignan",r:"Languedoc",c:"France",cl:"rosé",s:"Rosé",pf:"Cult Languedoc estate\'s rosé. Roc d\'Anglade is one of southern France\'s most coveted addresses — impossible to find. Pale salmon, precise, white peach, garrigue, lavender, taut saline finish. Serious rosé with structure. Allocated and rare. Matches our bar grillé beautifully."},
  {n:"Origines 2019",p:"Clos des Jarres",pr:120,g:"Grenache Gris",r:"Roussillon",c:"France",cl:"rosé",s:"Rosé",pf:"Aged Grenache Gris rosé with amber tinge from bottle age. Dried herbs, candied orange, saffron, honey. Complex and evolved — nothing like a young pink wine. This is rosé for people who love aged white Burgundy. Unusual and fascinating. Try with mouhammara or aged cheese."},
  {n:"Sivi Pinot 2021",p:"Keltis",pr:125,g:"Pinot Grigio",r:"Stajerska",c:"Slovénie",cl:"rosé",s:"Rosé",pf:"Slovenian skin-contact Pinot Grigio from Stajerska (Styria). Tea rose, dried apricot, white pepper, walnut. Grippy, oxidative complexity with amber color. More orange wine than rosé in character. Keltis farms on steep terraced hills. For orange wine lovers. Pairs with makdous, mutabbal, or halloumi."},
  {n:"Pompette 2023",p:"Clos des Mourres",pr:75,g:"Grenache Blanc",r:"Côtes du Rhône",c:"France",cl:"blanc",s:"Blanc — France",pf:"Playful southern Rhône white — the name means \'tipsy.\' Grenache Blanc with white peach, anise, fennel, round generous palate. Easy-going charm with Mediterranean warmth. Natural winemaking. Fun with mezzé or as aperitif."},
  {n:"Roc Troucat 2023 (btl)",p:"La Bancale",pr:78,g:"Carignan Blanc",r:"Roussillon",c:"France",cl:"blanc",s:"Blanc — France",pf:"Full bottle of the rare white Carignan also available by glass (18$). Mediterranean herbs, citrus peel, fennel, saline minerality. Textured and gastronomic. Natural winemaking from old vines."},
  {n:"Paulatim 2022",p:"Les Deux Terres",pr:80,g:"Chardonnay",r:"Ardèche",c:"France",cl:"blanc",s:"Blanc — France",pf:"Pure Ardèche Chardonnay from a husband-wife natural wine team. Citrus, white flower, green almond, clean unoaked freshness. Honest, precise, no tricks. The name means \'gradually\' — they believe in patience. Lovely with fattouch or labhne."},
  {n:"Madame de M... 2022",p:"Vendange",pr:82,g:"Roussette de Savoie",r:"Savoie",c:"France",cl:"blanc",s:"Blanc — France",pf:"Alpine Roussette (Altesse) from the French Alps. Green pear, hazelnut, mountain wildflowers, fresh-as-snow minerality. Crisp, elegant, distinctive. A rare grape from a stunning terroir. Perfect with our bar grillé or fondue-style dishes."},
  {n:"Bourgogne Aligoté 2023",p:"Jeannin-Naltet",pr:85,g:"Aligoté",r:"Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Bright Burgundian Aligoté from Mercurey-based Jeannin-Naltet. Lemon curd, green almond, white flowers, zippy mineral-driven acidity. The \'other\' Burgundy white — often more exciting than basic Chardonnay at this price. Traditional base for Kir. With fattouch, labhne, or oysters."},
  {n:"Cours Toujours 2021",p:"Roure",pr:90,g:"Carignan Gris",r:"Roussillon",c:"France",cl:"blanc",s:"Blanc — France",pf:"Rare Carignan Gris from the \'Jajakistan\' lieu-dit in Roussillon. Herbal, textured, saline, with garrigue character. Eric Roure is a master of forgotten grapes. Medium-bodied with real personality. Pairs with halloumi or pieuvre."},
  {n:"Femme Soleil 2023",p:"Hors Champ",pr:90,g:"Grenache Blanc",r:"Roussillon",c:"France",cl:"blanc",s:"Blanc — France",pf:"Sun-drenched Grenache Blanc from Roussillon. White fruit, Mediterranean herbs, fennel pollen, round generous palate. Natural winemaking with warmth and soul. The producer name means \'off-screen.\' With mezzé or crevettes."},
  {n:"Petit Trelans 2022",p:"Chabanon",pr:90,g:"Chenin, Rolle",r:"Languedoc",c:"France",cl:"blanc",s:"Blanc — France",pf:"Chenin-Rolle blend from Languedoc — unusual combination that works beautifully. Fresh citrus, garrigue, mineral tension, medium body. Chabanon is one of Languedoc\'s finest estates. Versatile food wine — fattouch through bar grillé."},
  {n:"Jurançon Sec 2023",p:"Lafitte",pr:105,g:"Mansengs",r:"Sud-Ouest",c:"France",cl:"blanc",s:"Blanc — France",pf:"Dry Jurançon from Gros and Petit Manseng grapes in Southwest France. Exotic fruit, ginger, quince, pineapple, crisp mineral backbone. Lafitte (not Lafite!) is a reference producer in Jurançon. The same producer as our Funambulles sparkling. Superb with spicy dishes — crevettes or daurade."},
  {n:"Corail Blanc 2023",p:"Clos Marinu",pr:115,g:"Vermentino",r:"Ajaccio, Corse",c:"France",cl:"blanc",s:"Blanc — France",pf:"Corsican Vermentino from Ajaccio\'s granite coast. Citrus, Mediterranean herbs, sea salt, maquis scrubland. Mineral and saline with island personality. Clos Marinu farms organically facing the sea. Natural partner for our pieuvre or bar grillé."},
  {n:"Les Copains d'Abord 2023",p:"Clément Lavallée",pr:115,g:"Sauvignon",r:"Saint-Bris, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Burgundian Sauvignon from Saint-Bris — the only Burgundy appellation for Sauvignon Blanc. Fresh citrus, boxwood, grassy notes, mineral precision. Natural winemaking. The name means \'friends first.\' Refreshing with fattouch or as aperitif."},
  {n:"Le Berceau des Fées 2022",p:"Domaine Aux Moines",pr:120,g:"Chenin Blanc",r:"Savennières, Loire",c:"France",cl:"blanc",s:"Blanc — France",pf:"Grand Loire Chenin from Savennières — one of France\'s greatest white wine appellations. Quince, beeswax, chamomile, powerful mineral backbone. Dry, structured, age-worthy. The vineyard name means \'cradle of fairies.\' Magnificent with bar grillé or daurade."},
  {n:"Imalaya 2022",p:"Roc des Anges",pr:120,g:"Carignan Gris",r:"Roussillon",c:"France",cl:"blanc",s:"Blanc — France",pf:"Old-vine Carignan Gris from cult Roussillon producer Roc des Anges. Layered, textured, herbal, with Mediterranean depth and saline minerality. Marjorie Gallet is one of Roussillon\'s most brilliant winemakers. Complex food wine — pieuvre, halloumi, or mutabbal."},
  {n:"Fief de Chaintre 2022",p:"Hardy",pr:120,g:"Melon de Bourgogne",r:"Muscadet, Loire",c:"France",cl:"blanc",s:"Blanc — France",pf:"Serious Muscadet — not the cheap stuff. Extended lees aging gives richness and complexity. Oyster shell, lemon, sea breeze, saline tension. Hardy is redefining what Muscadet can be. One of France\'s most undervalued whites. Dream pairing with our pieuvre or crevettes."},
  {n:"Auxilium 2023",p:"Tixier",pr:125,g:"Chardonnay",r:"Chablis, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Crystalline Chablis from young producer Tixier. Oyster shell, green apple, flint, steely Kimmeridgian clay minerality. Pure, focused, no oak. Chablis at its most transparent. Ideal with our bar grillé, daurade, or seafood mezzés."},
  {n:"Les Voisines 2022",p:"Touraize",pr:128,g:"Chardonnay",r:"Arbois, Jura",c:"France",cl:"blanc",s:"Blanc — France",pf:"Jura Chardonnay from Touraize in Arbois. Yellow apple, hazelnut, gentle oxidative complexity, curry leaf hint. Ouillé style (topped up, less oxidative than sous-voile). A gateway into the fascinating world of Jura whites. With mutabbal or richer mezzés."},
  {n:"Saint-Péray 2023",p:"Johann Michel",pr:130,g:"Marsanne, Roussanne",r:"Rhône",c:"France",cl:"blanc",s:"Blanc — France",pf:"Northern Rhône white from Saint-Péray, Cornas\' white-wine neighbor. Marsanne-Roussanne blend with white peach, almond, acacia, waxy richness. Full-bodied and textured. Johann Michel also makes our Saint-Joseph rouge. Pairs with halloumi, humus shawarma, or bar grillé."},
  {n:"Mercurey 2023",p:"Jeannin-Naltet",pr:130,g:"Chardonnay",r:"Mercurey, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"White Mercurey from the same producer as our Aligoté. Stone fruit, hazelnut, citrus, rounded generous Burgundian palate. Mercurey is better known for reds, making this white a hidden gem. Good value Burgundy. With pieuvre, crevettes, or shish taouk."},
  {n:"Georges 2021",p:"Thillardon",pr:132,g:"Chardonnay",r:"Beaujolais, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"White Beaujolais Chardonnay from Paul-Henri Thillardon, rising star of the region. Citrus, mineral, fresh unoaked purity. Most people don\'t know Beaujolais makes whites — this is a revelation. With fattouch or lighter mezzés."},
  {n:"À l'Ouest 2022",p:"Domaine de l'Enclos",pr:132,g:"Chardonnay",r:"Chablis",c:"France",cl:"blanc",s:"Blanc — France",pf:"Chablis with green apple, chalk, flint, crystalline mineral freshness. From a small-production domaine in the heart of Chablis. Pure and focused. The name means \'to the west.\' Beautiful with bar grillé or pieuvre."},
  {n:"Sous le Parc 2022",p:"Jérémy Arnaud",pr:135,g:"Chardonnay",r:"Béru, Chablis",c:"France",cl:"blanc",s:"Blanc — France",pf:"Single-vineyard Chablis from Béru, made by young winemaker Jérémy Arnaud. Flint, citrus, chalk, focused mineral depth. More textured than typical Chablis. Béru is becoming one of the appellation\'s most exciting villages. With daurade or bar grillé."},
  {n:"La Virada 2021",p:"Camin Larredya",pr:140,g:"Mansengs",r:"Jurançon Sec, Sud-Ouest",c:"France",cl:"blanc",s:"Blanc — France",pf:"Dry Jurançon from Gros and Petit Manseng grown on steep Pyrenean slopes. Exotic fruit, quince, ginger, pineapple, taut mineral backbone. Camin Larredya is one of Jurançon\'s best — the vineyard is worked by horse. Superb with spiced fish or crevettes."},
  {n:"Jus Rare 2020",p:"Devevey",pr:150,g:"Savagnin",r:"Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Rare Burgundian Savagnin — this grape is traditionally from the Jura, making this a rarity. Walnut, curry leaf, gentle oxidative character, nutty depth. Devevey also makes our Volnay rouge (270$). For lovers of unusual wines. Try with mutabbal or aged cheese."},
  {n:"Vaillon 2023",p:"Christian Moreau",pr:150,g:"Chardonnay",r:"1er Cru Chablis",c:"France",cl:"blanc",s:"Blanc — France",pf:"Premier Cru Chablis from the renowned Vaillon vineyard. Oyster shell, green apple, steely minerality, flint, lemon zest. Kimmeridgian clay soils give crystalline purity. Christian Moreau is 6th generation in Chablis. Step up from village Chablis — more depth and length. With bar grillé, daurade, or pieuvre."},
  {n:"Veine Bleue 2018",p:"Rousset-Martin",pr:160,g:"Savagnin",r:"Jura",c:"France",cl:"blanc",s:"Blanc — France",pf:"Jura Savagnin aged sous-voile (under a film of yeast) from Rousset-Martin. Walnut, curry, dried apple, distinctive oxidative character. Not for everyone — this is the real Jura experience. If you love sherry or appreciate unusual wines. Try with aged comté or our mutabbal."},
  {n:"JuCha 2020",p:"Zéroine",pr:160,g:"Chardonnay",r:"Côtes du Jura",c:"France",cl:"blanc",s:"Blanc — France",pf:"Jura Chardonnay with gentle sous-voile influence. Yellow fruit, hazelnut, almond, light oxidative complexity. More approachable than full-oxidative Savagnin. Zéroine is a small natural producer in the Jura. With halloumi, mutabbal, or richer mezzés."},
  {n:"Sous le Cellier 2021",p:"Fichet",pr:165,g:"Chardonnay",r:"Monthélie, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"White Monthélie from Jean-Philippe Fichet, one of Burgundy\'s most consistent producers (also makes our Meursault at 295$ and Auxey-Duresses at 188$). Stone fruit, mineral tension, Burgundian finesse without excess oak. Hidden-gem appellation between Meursault and Volnay."},
  {n:"Iris 2021",p:"Robinot",pr:170,g:"Chenin Blanc",r:"Jasnières, Loire",c:"France",cl:"blanc",s:"Blanc — France",pf:"Cult Loire Chenin from Jean-Pierre Robinot in tiny Jasnières appellation. Quince, honey, beeswax, intense mineral drive. Robinot is a natural wine legend — his wines are wild, alive, profound. Not for the faint of heart. With richer fish dishes or aged cheese."},
  {n:"Les Vignes Blanches 2022",p:"Cordier",pr:172,g:"Chardonnay",r:"1er Cru Pouilly Fuissé, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Premier Cru Pouilly-Fuissé — a newly elevated status for this southern Burgundy appellation. Rich mineral Chardonnay with stone fruit, hazelnut, citrus depth. Cordier is a benchmark producer. Excellent value for Premier Cru Burgundy. With bar grillé, pieuvre, or shish taouk."},
  {n:"Les Cinq Climats 2022",p:"Alain Gras",pr:175,g:"Chardonnay",r:"Saint Romain, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Saint-Romain Chardonnay from 5 different climate parcels. Fresh, mineral, citrus, hazelnut. Saint-Romain sits high above Meursault and produces leaner, more mineral wines. Alain Gras is the village\'s reference. Great value Burgundy."},
  {n:"Vergelesses 2020",p:"Terres de Velle",pr:175,g:"Chardonnay",r:"1er Cru Savigny, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Premier Cru white Savigny-lès-Beaune from the Vergelesses vineyard. Elegant Chardonnay with floral notes, white fruit, mineral depth. Less famous than Meursault but often more refined. A smart sommelier\'s pick."},
  {n:"De L'avant 2020",p:"Maison Maenad",pr:178,g:"Chardonnay",r:"Jura",c:"France",cl:"blanc",s:"Blanc — France",pf:"Jura Chardonnay with apple, hazelnut, subtle oxidative complexity. Maison Maenad is a newer project bringing modern sensibility to Jura traditions. The name references moving forward. With richer mezzés or halloumi."},
  {n:"Melon à Queue Rouge 2020",p:"Ratte",pr:188,g:"Melon",r:"Arbois, Jura",c:"France",cl:"blanc",s:"Blanc — France",pf:"Extremely rare Jura variety — Melon à Queue Rouge (\'red-stemmed melon\'). Almost extinct grape with unique herbal, mineral character. Only a handful of producers work with it. For the wine geek who wants something nobody else has. A true conversation wine."},
  {n:"Auxey-Duresses 2021",p:"Fichet",pr:188,g:"Chardonnay",r:"Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Auxey-Duresses white from Fichet (same producer as our Monthélie 165$ and Meursault 295$). Stone fruit, hazelnut, citrus, classic Burgundian richness. Auxey sits between Meursault and Monthélie — excellent value for the quality. With bar grillé or richer seafood."},
  {n:"Prieur des Noues 2021",p:"Bonnezeaux",pr:190,g:"Chenin",r:"Anjou, Loire",c:"France",cl:"blanc",s:"Blanc — France",pf:"Loire Chenin from Anjou, near the sweet wine appellation of Bonnezeaux but vinified dry. Honey, quince, lanolin, rich yet balanced palate. Loire Chenin at this level offers complexity rivaling white Burgundy at half the price. With daurade or crevettes."},
  {n:"Pfersigberg 2018",p:"Schueller",pr:200,g:"Riesling",r:"Grand Cru, Alsace",c:"France",cl:"blanc",s:"Blanc — France",pf:"Grand Cru Alsace Riesling from the steep Pfersigberg hill. Ripe peach (the name means \'peach hill\'), petrol, powerful mineral structure, incredible concentration. 2018 was a warm vintage giving richness. Schueller farms biodynamically. A reference Riesling. With spiced fish or daurade."},
  {n:"Le Secret 2023",p:"Banneret",pr:200,g:"Grenache",r:"Châteauneuf, Rhône",c:"France",cl:"blanc",s:"Blanc — France",pf:"White Châteauneuf-du-Pape from Domaine du Banneret (same producer as our rouge at 185$). Rich, honeyed, stone fruit, garrigue, white flowers. Full-bodied and powerful. White Châteauneuf is rare and special — only ~7% of production. With our richest mezzés or halloumi."},
  {n:"Roc d'Anglade Blanc 2022",p:"Roc d'Anglade",pr:200,g:"Chenin",r:"Languedoc",c:"France",cl:"blanc",s:"Blanc — France",pf:"Cult Languedoc white from one of southern France\'s most legendary estates. Chenin-based with mineral depth, Mediterranean herbs, and extraordinary complexity. Roc d\'Anglade wines are virtually impossible to find — allocated and tiny production. A trophy bottle."},
  {n:"Saint Péray 2022",p:"Clape",pr:200,g:"Marsanne, Roussanne",r:"Rhône",c:"France",cl:"blanc",s:"Blanc — France",pf:"White wine from Cornas royalty — the Clape family has been making wine since the 1960s. Rich northern Rhône white with white peach, almond, beeswax, waxy depth. Full-bodied and age-worthy. One of the Rhône\'s greatest whites. With bar grillé, daurade, or even lamb."},
  {n:"La Fussière 2022",p:"Bachelet Monnot",pr:200,g:"Chardonnay",r:"1er Cru Maranges, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Premier Cru white Maranges from talented brothers Bachelet-Monnot (also known for Chassagne and Puligny). Precise, mineral Chardonnay with citrus and chalky tension. Maranges is Burgundy\'s best-kept secret. Outstanding value for Premier Cru."},
  {n:"Saint Romain 2022",p:"Renaud Boyer",pr:220,g:"Chardonnay",r:"Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Saint-Romain from rising-star Renaud Boyer. Citrus, chalk, focused mineral freshness. High-altitude Burgundy site producing wines of great purity. Boyer also appears at 350$ with Les Reuchaux. A producer to watch."},
  {n:"Coteaux de Bruno 2019",p:"Clos du Rouge Gorge",pr:220,g:"Maccabeu",r:"Côtes Catalanes, Roussillon",c:"France",cl:"blanc",s:"Blanc — France",pf:"Old-vine Maccabeu from cult Roussillon producer Clos du Rouge Gorge. Herbal, textured, savory, with Mediterranean garrigue depth. Cyril Fhal\'s wines are among the most exciting in all of southern France. Small production, highly allocated. With pieuvre or halloumi."},
  {n:"L'Échelier 2022",p:"Roches Neuves",pr:225,g:"Chenin",r:"Saumur, Loire",c:"France",cl:"blanc",s:"Blanc — France",pf:"Single-vineyard Saumur Chenin from biodynamic master Thierry Germain (same producer as our Crémant). Quince, beeswax, mineral intensity, extraordinary age-worthy structure. L\'Échelier is one of Saumur\'s greatest terroirs. A Chenin for lovers of grand Burgundy."},
  {n:"Puligny Montrachet 2022",p:"Mélin",pr:225,g:"Chardonnay",r:"Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Village Puligny-Montrachet — one of Burgundy\'s most prestigious white wine communes. White flower, lime blossom, hazelnut, electric chalky minerality. Refined Burgundian elegance. Mélin is a small family domaine. Pairs with bar grillé, daurade, or pieuvre."},
  {n:"Blanc de Tronquoy 2019",p:"Tronquoy",pr:230,g:"Sauvignon gris",r:"St. Estephe, Bordeaux",c:"France",cl:"blanc",s:"Blanc — France",pf:"White Bordeaux from Saint-Estèphe made with rare Sauvignon Gris. Exotic fruit, fig, oak spice, textured complexity. A rarity — Saint-Estèphe is known almost exclusively for red. Collector\'s curiosity. With richer fish dishes or foie gras."},
  {n:"Combe Bazin 2021",p:"Cossard",pr:240,g:"Chardonnay",r:"Saint Romain, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Saint-Romain Chardonnay from Dominique Cossard, legendary Burgundy négociant. Precise, mineral, chalky tension, citrus and white flower. Cossard sources from top sites and makes wine with zero intervention. A natural Burgundy benchmark. Also see his sparkling (115$)."},
  {n:"Les Quarts 2022",p:"La Soufrandière",pr:250,g:"Chardonnay",r:"Pouilly-Vinzelles, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Biodynamic Pouilly-Vinzelles from the Bret brothers (La Soufrandière). Rich mineral Chardonnay with stone fruit, honey, chalk depth. Pouilly-Vinzelles neighbors the more famous Pouilly-Fuissé but often outperforms at better value. Serious wine for serious occasions."},
  {n:"Les Clos 2022",p:"Christian Moreau",pr:260,g:"Chardonnay",r:"Grand Cru Chablis",c:"France",cl:"blanc",s:"Blanc — France",pf:"Grand Cru Chablis from the most revered vineyard in the appellation — Les Clos is the largest and arguably greatest Grand Cru. Power, concentration, flint, iodine, oyster shell. Decades of aging potential. Christian Moreau also makes our Premier Cru Vaillon (150$). A benchmark Chablis."},
  {n:"Savagnin 2020",p:"Bienaimé",pr:260,g:"Savagnin",r:"Arlay, Jura",c:"France",cl:"blanc",s:"Blanc — France",pf:"Jura Savagnin from Bienaimé in Arlay. Walnut, curry, dried apple, oxidative depth. Sous-voile aging gives that distinctive Jura character. For the adventurous wine lover who wants to explore this unique region. With aged cheese or our mutabbal."},
  {n:"Clos Béru 2018",p:"Béru",pr:265,g:"Chardonnay",r:"Chablis",c:"France",cl:"blanc",s:"Blanc — France",pf:"Monopole Chablis from Château de Béru — a single walled vineyard, like a Burgundian clos. Rich, mineral, extraordinary concentration and length. Athénaïs de Béru revived this historic property. Biodynamic farming. One of Chablis\' most special wines. With our finest fish dishes."},
  {n:"Clos du Meix 2021",p:"Hubert Lamy",pr:285,g:"Chardonnay",r:"Saint Aubin, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Saint-Aubin from Hubert Lamy, undisputed king of the appellation. Precise, mineral, white flowers, incredible purity of fruit. Lamy\'s Saint-Aubins rival many Puligny-Montrachets at double the price. A smart sommelier\'s pick for exceptional Burgundy value."},
  {n:"Vaudesir 2022",p:"Louis Michel",pr:288,g:"Chardonnay",r:"Grand Cru Chablis",c:"France",cl:"blanc",s:"Blanc — France",pf:"Grand Cru Chablis from Vaudésir — among the most mineral Grand Crus. Louis Michel vinifies entirely without oak (100% stainless steel), giving razor-pure expression of Kimmeridgian terroir. Citrus, flint, sea spray, incredible length. A purist\'s Chablis."},
  {n:"Meursault 2021",p:"Fichet",pr:295,g:"Chardonnay",r:"Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Village Meursault from Jean-Philippe Fichet — one of Burgundy\'s most reliable producers (also our Monthélie 165$, Auxey 188$). Classic Meursault with butter, hazelnut, citrus, honey. Rich yet balanced, with the appellation\'s signature nutty, opulent character. A benchmark. With our finest dishes."},
  {n:"Puligny Montrachet 2022 (Clos)",p:"Clos du Moulin aux Moines",pr:300,g:"Chardonnay",r:"Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Puligny-Montrachet from the historic Clos du Moulin aux Moines. White flower, lime blossom, chalk, electric mineral intensity. Refined and age-worthy. The clos dates back to Cistercian monks. For a special occasion with bar grillé or daurade."},
  {n:"Les Hautés 2021",p:"Vincent",pr:320,g:"Chardonnay",r:"Auxey-Duresses, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Top cuvée Auxey-Duresses from Vincent. Rich, mineral, powerful Burgundian Chardonnay with depth matching wines twice the price. Auxey-Duresses sits in a privileged position between Meursault and Volnay. A collector\'s value play."},
  {n:"La Rue des Noyers 2018",p:"Déhu",pr:320,g:"Pinot Meunier",r:"Coteaux Champenois",c:"France",cl:"blanc",s:"Blanc — France",pf:"Still white wine from the Champagne region — Coteaux Champenois from Pinot Meunier. Extremely rare category. Baked apple, brioche, spice, vinous complexity. Benoit Déhu is one of Meunier\'s greatest champions (also our sparkling at 320$). Unique curiosity for wine connoisseurs."},
  {n:"Les Argillats 2022",p:"Guyon",pr:330,g:"Pinot Blanc",r:"Nuits-Saint-Georges",c:"France",cl:"blanc",s:"Blanc — France",pf:"Rare Pinot Blanc from Nuits-Saint-Georges — almost all NSG production is Pinot Noir. Rich, textured, distinctive. Domaine Guyon is a serious Burgundy estate. This is a unicorn wine — virtually no one makes white Nuits. Conversation piece of the highest order."},
  {n:"Blanc de Duhart Milon 2022",p:"Duhart Milon",pr:325,g:"Sémillon Sauvignon",r:"Pauillac, Bordeaux",c:"France",cl:"blanc",s:"Blanc — France",pf:"White Pauillac from 4th Growth Duhart-Milon (owned by Lafite-Rothschild). Sémillon-Sauvignon blend with richness, oak spice, tropical fruit, waxy texture. White Pauillac is extremely rare — this is a collector\'s piece. With richer fish dishes or foie gras."},
  {n:"En Dresolles 2023",p:"Huber-Verdereau",pr:325,g:"Chardonnay",r:"Meursault, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Meursault lieu-dit from Huber-Verdereau. Butter, hazelnut, citrus, classic nutty richness. Meursault at this level delivers profound Burgundy pleasure. A wine for lingering over. With our finest courses."},
  {n:"Les Reuchaux 2022",p:"Renaud Boyer",pr:350,g:"Chardonnay",r:"Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Top cuvée from rising-star Renaud Boyer (also at 220$ with Saint-Romain). Mineral depth, refined Burgundian elegance, chalky tension. A producer whose prices will only go up. Invest in this wine now."},
  {n:"Concis du Champs 2021",p:"Lamy",pr:385,g:"Chardonnay",r:"Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"From Hubert Lamy, king of Saint-Aubin. Precise, chalky mineral Chardonnay of great depth and purity. Lamy\'s top cuvées compete with the best of Puligny and Chassagne. For serious Burgundy collectors."},
  {n:"Clos de l'Arlot Blanc 2022",p:"L'Arlot",pr:400,g:"Chardonnay",r:"1er Cru Nuits Saint Georges, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"Premier Cru white Nuits-Saint-Georges from the legendary Domaine de l\'Arlot. Extremely rare — white NSG barely exists. Chardonnay with power, mineral depth, and remarkable character. A trophy wine for Burgundy lovers."},
  {n:"Aux Croix Rouges 2021",p:"Cossard",pr:420,g:"Chardonnay",r:"Nuits-Saint-Georges, Bourgogne",c:"France",cl:"blanc",s:"Blanc — France",pf:"White Nuits-Saint-Georges from Dominique Cossard. Another ultra-rare white from a red-wine commune. Powerful, mineral, natural winemaking. Cossard\'s eye for exceptional terroir is unmatched. For collectors and adventurous sommeliers."},
  {n:"L'Hermitage 2002",p:"Chave",pr:500,g:"Marsanne",r:"Hermitage, Rhône",c:"France",cl:"blanc",s:"Blanc — France",pf:"Legendary aged Hermitage blanc from Jean-Louis Chave — the greatest name in Hermitage. The 2002 has over 20 years of bottle age: honeyed richness, beeswax, truffle, dried apricot, extraordinary depth. Marsanne-Roussanne from granite. A monument of French white wine. Once-in-a-lifetime experience."},
  {n:"L'Hermitage 2014",p:"Chave",pr:500,g:"Marsanne",r:"Hermitage, Rhône",c:"France",cl:"blanc",s:"Blanc — France",pf:"Younger vintage of Chave\'s Hermitage. White peach, acacia, granite minerality, immense aging potential. The 2014 is more vibrant and primary than the 2002 — still in its youth. Will evolve beautifully for decades. Same legendary terroir and producer."},
  {n:"Brézé 2018",p:"Clos Rougeard",pr:500,g:"Chenin Blanc",r:"Anjou, Loire",c:"France",cl:"blanc",s:"Blanc — France",pf:"Cult Loire Chenin from the legendary Clos Rougeard — one of France\'s most mythical estates. The Foucault brothers made wine here for decades; now continued by their successors. Quince, beeswax, lanolin, laser-like mineral intensity. Extremely rare and allocated. A pilgrimage wine."},
  {n:"Cos d'Estournel Blanc 2009",p:"Cos d'Estournel",pr:600,g:"Sauvignon Blanc",r:"Saint-Estèphe, Bordeaux",c:"France",cl:"blanc",s:"Blanc — France",pf:"White Bordeaux from 2nd Growth Cos d\'Estournel — one of the Left Bank\'s greatest estates. 2009 is a legendary vintage with over 15 years of age. Exotic fruit, oak spice, rich layered complexity, waxy depth. A grand white Bordeaux for the collector\'s table."},
  {n:"Roero Arneis 2024 (btl)",p:"Tibaldi",pr:80,g:"Arnese",r:"Roero, Piemonte",c:"Italie",cl:"blanc",s:"Blanc — Italie",pf:"Full bottle of the Piedmontese white also available by glass (17$). Crisp, white peach, almond, floral. Light and refreshing. The Roero sits across the Tanaro river from Barolo — same producer, different world."},
  {n:"Tonsur 2023",p:"Pranzegg",pr:88,g:"Muller, Pinot Bianco",r:"Alto Adige",c:"Italie",cl:"blanc",s:"Blanc — Italie",pf:"Alpine blend from biodynamic Alto Adige producer Pranzegg. Müller-Thurgau and Pinot Bianco. Citrus, white flower, mountain herbs, cool mineral precision. High-altitude vineyards above Bolzano. Fresh and pure."},
  {n:"Valtiberia 2023",p:"Sottoilnoce",pr:90,g:"Trebbiano",r:"Emilia-Romagna",c:"Italie",cl:"blanc",s:"Blanc — Italie",pf:"Authentic Trebbiano from Emilia-Romagna. Green apple, chamomile, hazelnut, natural winemaking character. Unfiltered and alive. Sottoilnoce is a small artisan producer. Honest, terroir-driven wine."},
  {n:"Blatterle 2021",p:"Nusserhof",pr:100,g:"Blatterle",r:"Bolzano, Alto Adige",c:"Italie",cl:"blanc",s:"Blanc — Italie",pf:"Extremely rare indigenous Alto Adige variety — Blatterle is almost extinct. Mineral, herbal, almond, distinctive mountain character. Nusserhof is the only producer keeping this grape alive. A living piece of viticultural history. For the wine geek who wants something unique."},
  {n:"Elysium 2022",p:"Pranzegg",pr:105,g:"Pinot Bianco",r:"Alto Adige",c:"Italie",cl:"blanc",s:"Blanc — Italie",pf:"Pure Pinot Bianco from Pranzegg\'s biodynamic alpine vineyards. White flower, citrus, green pear, mineral freshness. More serious than the Tonsur blend — single variety, deeper expression. With lighter mezzés or fish."},
  {n:"Aurora 2022",p:"Salvo Foti",pr:120,g:"Carricante",r:"Etna, Sicilia",c:"Italie",cl:"blanc",s:"Blanc — Italie",pf:"Volcanic Etna white from legendary Sicilian winemaker Salvo Foti, guardian of Etna\'s indigenous varieties. Carricante grown on lava soils at altitude. Citrus, ash, saline minerality, smoky volcanic character. Thrilling and unlike any other white. Stunning with daurade or pieuvre."},
  {n:"Bianco 2020",p:"Selvadolce",pr:135,g:"Vermentino",r:"Ligurie",c:"Italie",cl:"blanc",s:"Blanc — Italie",pf:"Ligurian Vermentino from the Italian Riviera. Sea breeze, citrus, Mediterranean herbs, almond, saline finish. Selvadolce farms on steep seaside terraces. Coastal wine in every sense. Natural partner for our seafood — pieuvre, crevettes, bar grillé."},
  {n:"Santa Marguerita 2021",p:"Occhipinti",pr:155,g:"Grillo",r:"Iblei, Sicilia",c:"Italie",cl:"blanc",s:"Blanc — Italie",pf:"Natural Sicilian Grillo from Arianna Occhipinti — one of Italy\'s most celebrated natural winemakers. Herbal, savory, rich textured palate with wild character. Made with minimal intervention on her estate in Vittoria. Powerful and distinctive. With halloumi or richer mezzés."},
  {n:"Trebbiano d'Abruzzo 2020",p:"Valentini",pr:500,g:"Trebbiano Abruzzese",r:"Abruzzo",c:"Italie",cl:"blanc",s:"Blanc — Italie",pf:"Italy\'s most legendary white wine. Edoardo Valentini\'s Trebbiano is in a class of its own — decades of aging potential, tiny production, near-mythical reputation. Waxy, honeyed, lanolin, profound mineral depth. Only the best barrels are bottled under the Valentini label; the rest is declassified. A unicorn wine. One of the greatest whites in the world."},
  {n:"Vino di Sasso 2024",p:"Sclavos",pr:75,g:"Robola",r:"Céphalonie",c:"Grèce",cl:"blanc",s:"Blanc — Moyen-Orient",pf:"Greek island Robola from Cephalonia\'s limestone slopes. Lemon, sea salt, stony mineral palate, fresh herbs. Sclavos is a pioneer of natural winemaking in Greece. The Ionian island terroir gives wines of crystalline purity. With fattouch, pieuvre, or simply as aperitif."},
  {n:"Kashf 2022 (btl)",p:"El-Sabban",pr:75,g:"Viognier",r:"Mont Liban",c:"Liban",cl:"blanc",s:"Blanc — Moyen-Orient",pf:"Full bottle of the Lebanese Viognier also available by glass (18$). Lush apricot, jasmine, silky texture. A beautiful representation of Lebanon\'s emerging wine scene. El Sabban also makes the Wajd Pinot Noir (80$)."},
  {n:"Bargylus Blanc 2018 (btl)",p:"Bargylus",pr:115,g:"Sauvignon, Chardonnay",r:"Lattakia",c:"Syrie",cl:"blanc",s:"Blanc — Moyen-Orient",pf:"Full bottle of Syria\'s iconic white also available by glass (25$). The Saadé family manages the vineyards remotely from Beirut — the winemaker sends instructions by phone during harvest. A profound wine of resilience and quality. Complex, age-worthy, deeply moving."},
  {n:"Costumbres 2022",p:"Voz Baja",pr:95,g:"Viura",r:"Rioja",c:"Espagne",cl:"blanc",s:"Blanc — Espagne",pf:"Traditional Rioja white from old-vine Viura — the classic white grape of Rioja. Chamomile, lemon, green apple, refreshing unoaked purity. Voz Baja means \'quiet voice\' — the wine speaks softly but with conviction. With mezzé or lighter dishes."},
  {n:"Univers 2022",p:"Muchada-Léclapart",pr:115,g:"Palomino",r:"Jerez",c:"Espagne",cl:"blanc",s:"Blanc — Espagne",pf:"Unfortified Palomino from Jerez — the sherry grape made as still table wine. Saline, chalky, with fino-like complexity. Alejandro Muchada and David Léclapart (famed Champagne producer) joined forces for this revolutionary project. For sherry lovers who want to explore further. With pieuvre or crevettes."},
  {n:"Improvisacio 2022",p:"Enric Soler",pr:150,g:"Xarel·lo",r:"Penedès, Catalonia",c:"Espagne",cl:"blanc",s:"Blanc — Espagne",pf:"Catalan Xarel·lo from Enric Soler — one of Penedès\' greatest white wine producers. Mineral depth, citrus, Mediterranean herbs, textured complexity. Xarel·lo is Catalonia\'s noble white grape. With halloumi or bar grillé."},
  {n:"Elixir 2021",p:"Muchada-Léclapart",pr:152,g:"Moscatel",r:"Jerez",c:"Espagne",cl:"blanc",s:"Blanc — Espagne",pf:"Dry Moscatel from the same Jerez duo. Aromatic, floral, with fino-like saline complexity — all the perfume of Muscat without sweetness. Revolutionary winemaking. With crevettes or daurade."},
  {n:"Nun 2022",p:"Enric Soler",pr:245,g:"Xarel·lo",r:"Penedès, Catalonia",c:"Espagne",cl:"blanc",s:"Blanc — Espagne",pf:"Grand cru-level Catalan white — Enric Soler\'s top cuvée from ancient Xarel·lo vines. Waxy, mineral, extraordinary concentration and length. Rivals the finest white Burgundy. A wine to convert skeptics of Spanish whites. With our finest fish or on its own for contemplation."},
  {n:"Berg 2023",p:"Lesom",pr:95,g:"Riesling",r:"Mosel",c:"Allemagne",cl:"blanc",s:"Blanc — Nord",pf:"Mosel Riesling with racy acidity, lime, petrol, slate-driven minerality. Classic Mosel profile — electrifying and pure. The steep slate slopes of the Mosel produce some of the world\'s most thrilling white wines. With fattouch, daurade, or spicy Asian cuisine."},
  {n:"Umami 2019",p:"Nestarec",pr:110,g:"Traminer, Riesling",r:"Moravia",c:"Tchéquie",cl:"blanc",s:"Blanc — Nord",pf:"Czech natural wine legend Milan Nestarec\'s aromatic blend. Rose petal, lychee, ginger, savory umami-laden finish. The name says it all — this is a wine of savory depth. Nestarec is the Czech Republic\'s most important natural producer. With our spicier dishes or mouhammara."},
  {n:"Matiere à Discussion 2023",p:"Nival",pr:70,g:"Vidal",r:"Lac St Pierre",c:"Québec",cl:"blanc",s:"Blanc — Canada",pf:"Quebec Vidal from Nival on Lac Saint-Pierre. Tropical fruit, pear, honeyed sweetness balanced by fresh acidity. Vidal is a French-American hybrid that thrives in Quebec\'s cold climate. Approachable, charming, great value. Mezzé or aperitif."},
  {n:"Ravel 2022",p:"Lowlife",pr:75,g:"Acadie",r:"Blue Mountains",c:"Ontario",cl:"blanc",s:"Blanc — Canada",pf:"Ontario\'s emerging cool-climate scene. Acadie grape grown in the Blue Mountains. Crisp, citrusy, mineral edge from Bruce Peninsula terroir. Lowlife is part of Ontario\'s natural wine movement. With fattouch or lighter mezzés."},
  {n:"Décor 2022",p:"Lieux Communs",pr:80,g:"Frontenac Blanc",r:"Lanoraie",c:"Québec",cl:"blanc",s:"Blanc — Canada",pf:"Quebec Frontenac Blanc from Lanoraie. Fresh, aromatic, with local terroir expression. Lieux Communs also makes our Ontario Riesling sparkling (80$). Part of the exciting Quebec wine revolution. Aperitif or with mezzé."},
  {n:"Chardonnay 2022",p:"Trail Estate",pr:82,g:"Chardonnay",r:"PEC",c:"Ontario",cl:"blanc",s:"Blanc — Canada",pf:"Prince Edward County Chardonnay — Canada\'s most exciting cool-climate region. Clean, mineral, cool-climate elegance with citrus and green apple. Trail Estate is a PEC benchmark. Proof that Canadian Chardonnay deserves attention. With bar grillé or pieuvre."},
  {n:"Nuance de Gris 2023",p:"Pinard et Filles",pr:85,g:"Frontenac Gris",r:"Magog",c:"Québec",cl:"blanc",s:"Blanc — Canada",pf:"Quebec Frontenac Gris from Pinard et Filles in Magog (Eastern Townships). Aromatic, fresh, with distinctive hybrid character and local personality. Pinard et Filles is a mother-daughter operation pushing Quebec wine forward. Also see their Riesling (95$) and Marquette red (75$)."},
  {n:"Blanc de Mémoire 2021",p:"Nival",pr:85,g:"Pinot",r:"Lac St Pierre",c:"Québec",cl:"blanc",s:"Blanc — Canada",pf:"Quebec Pinot white (blanc de noirs style) from Nival. Delicate, mineral, surprisingly refined. Shows what Quebec can achieve with careful viticulture and winemaking. Nival is one of the province\'s best producers."},
  {n:"Calvaire 2021",p:"Pinard et Filles",pr:95,g:"Riesling",r:"Magog",c:"Québec",cl:"blanc",s:"Blanc — Canada",pf:"Quebec Riesling from Pinard et Filles in Magog. Green apple, lime, mineral purity that rivals European examples. Impressive achievement for Canadian Riesling. The Eastern Townships terroir brings genuine cool-climate character. With fattouch or bar grillé."},
  {n:"Alè 2022",p:"Conestabile della Staffa",pr:66,g:"Malvasia",r:"Umbria",c:"Italie",cl:"orange",s:"Orange",pf:"Skin-contact Umbrian Malvasia — gentle introduction to orange wine. Apricot, herb tea, chamomile, soft tannic grip. Amber-hued and inviting. Affordable entry point. Best value orange wine on our list. With makdous, mutabbal, or just to explore the style."},
  {n:"Trebbiano Orange 2022 (btl)",p:"Casale",pr:88,g:"Trebbiano",r:"Toscana",c:"Italie",cl:"orange",s:"Orange",pf:"Full bottle of the Tuscan skin-contact also available by glass (18$). Extended maceration gives dried fruit, chamomile, nutty oxidative complexity with tannic structure. Natural Tuscan winemaking at its most authentic."},
  {n:"Gewurtz 2020",p:"In der Eben",pr:90,g:"Gewurztraminer",r:"Alto Adige",c:"Italie",cl:"orange",s:"Orange",pf:"Skin-contact Gewurztraminer from Alto Adige. Lychee, rose, Turkish delight, tannic herbal complexity. All the aromatics of Gewurz plus the textural depth of skin contact. In der Eben is a small biodynamic producer. Fascinating with spiced dishes — mouhammara or daurade."},
  {n:"Oxymoron 2022",p:"Mas Guallar",pr:95,g:"Muscat à Petit Grain",r:"Roussillon",c:"France",cl:"orange",s:"Orange",pf:"Skin-contact Muscat from Roussillon — the name captures the contradiction of a dry, tannic Muscat. Floral, aromatic, herbal, with tannic grip. Mas Guallar specializes in forgotten grapes and unusual techniques. With crevettes or halloumi."},
  {n:"Résilience d'en Paillol 2023",p:"Mas Guallar",pr:98,g:"Macabeu",r:"Maury, Roussillon",c:"France",cl:"orange",s:"Orange",pf:"Roussillon Macabeu from the same producer. Herbal, textured, Mediterranean garrigue character. The name \'Résilience\' reflects both the vine and the winemaker\'s philosophy. With mezzé or lighter dishes."},
  {n:"BS 2020",p:"Partida Creus",pr:100,g:"Sumoll Blanco",r:"Catalonia",c:"Espagne",cl:"orange",s:"Orange",pf:"Cult Catalan skin-contact Sumoll Blanco — Partida Creus are heroes of Spanish natural wine. Wild, herbal, untamed character with tannic grip and Mediterranean herbs. Not for the faint-hearted. With mouhammara or aged cheese."},
  {n:"Doma 2021",p:"Naboso",pr:105,g:"Welschriesling",r:"Slovénie",c:"Slovénie",cl:"orange",s:"Orange",pf:"Slovenian skin-contact Welschriesling. Herbal, honeyed, tannic structure, amber color. Slovenia is the spiritual home of orange wine. Naboso makes compelling natural wines in the tradition of Radikon and Gravner. With mutabbal or makdous."},
  {n:"Iastemma 2021",p:"Canlibero",pr:105,g:"Falenghina",r:"Campania",c:"Italie",cl:"orange",s:"Orange",pf:"Campanian skin-contact Falanghina from southern Italy. Herbal, honeyed, Mediterranean warmth, gentle tannins. Canlibero is part of Campania\'s natural wine renaissance. With halloumi or mouhammara."},
  {n:"A Chaira 2021",p:"La Perdida",pr:105,g:"Dona Branca",r:"Galicia",c:"Espagne",cl:"orange",s:"Orange",pf:"Galician skin-contact from indigenous Dona Branca grape. Wild, mineral, Atlantic-influenced freshness with herbal depth. La Perdida (\'the lost one\') is a female-led project reviving forgotten Galician varieties. Unique and compelling. With pieuvre or seafood mezzé."},
  {n:"Obeideh 2022",p:"Sept",pr:105,g:"Obeideh",r:"Batroun",c:"Liban",cl:"orange",s:"Orange",pf:"Lebanese skin-contact from indigenous Obeideh grape — the ancestor of Chardonnay, native to Lebanon. Herbal, honeyed, resinous, with distinctive Middle Eastern character. Sept is a young Lebanese producer doing exciting work. Cultural significance meets quality. With the whole mezzé table."},
  {n:"Matassa Blanc 2022",p:"Matassa",pr:115,g:"Maccabeu",r:"Roussillon",c:"France",cl:"orange",s:"Orange",pf:"Cult Roussillon Maccabeu from Tom Lubbe\'s Matassa — a South African-born winemaker who became a Roussillon legend. Complex, layered, dried apricot, garrigue, textured savory palate. One of natural wine\'s most important producers. With halloumi, mutabbal, or mouhammara."},
  {n:"Thirst Trap 2021",p:"Stagiaire",pr:115,g:"Sauvignon Blanc",r:"Californie",c:"États-Unis",cl:"orange",s:"Orange",pf:"Californian skin-contact Sauvignon Blanc — wild, funky, with herbal and citrus character. The playful name belies serious winemaking. A New World take on the skin-contact tradition. For adventurous palates."},
  {n:"Vinu Jancu 2019",p:"La Garagista",pr:115,g:"La Crescent",r:"Vermont",c:"États-Unis",cl:"orange",s:"Orange",pf:"Vermont skin-contact from cold-hardy La Crescent hybrid grape. Wild, honeyed, with unique New England terroir. La Garagista is a pioneer of Vermont natural wine. Perhaps the most unusual wine on our entire list. A conversation starter."},
  {n:"Bianco 2020 (Halara)",p:"Halara",pr:130,g:"Catarratto",r:"Marsala, Sicilia",c:"Italie",cl:"orange",s:"Orange",pf:"Sicilian skin-contact Catarratto from near Marsala. Herbal, saline, volcanic mineral character, dried fruit. Halara farms on the western tip of Sicily facing Africa. With pieuvre or halloumi."},
  {n:"Ansoncaca 2020",p:"Carfagna",pr:150,g:"Ansonica",r:"Giglio, Toscana",c:"Italie",cl:"orange",s:"Orange",pf:"Island Tuscan skin-contact Ansonica from tiny Giglio island. Sea salt, wild herbs, Mediterranean scrub, golden amber color. Made on an island of 800 inhabitants. As wild as wine gets. With our most adventurous mezzé pairings."},
  {n:"Scodavacca 2017",p:"Montanar",pr:160,g:"Verduzzo",r:"Friuli-Venezia Giulia",c:"Italie",cl:"orange",s:"Orange",pf:"Friulian Verduzzo with years of skin contact and bottle age. Honey, dried apricot, walnut, tannic oxidative depth. Friuli is the Italian heartland of orange wine. Complex and contemplative. With aged cheese or rich mezzé."},
  {n:"Pappou 2020",p:"Kalathas",pr:165,g:"Rozaki",r:"Tinos",c:"Grèce",cl:"orange",s:"Orange",pf:"Greek Cycladic island wine from Rozaki — traditionally a table grape. Wildly unique: honey, herbs, Aegean sea breeze, amber color. Kalathas makes wine on the windswept island of Tinos. An amber-wine adventure for the curious. Nothing else tastes like this."},
  {n:"Sons Cartoixa Marina 2017",p:"Sicus",pr:170,g:"Xarello",r:"Penedès, Catalonia",c:"Espagne",cl:"orange",s:"Orange",pf:"Catalan skin-contact Xarel·lo from seaside vineyards. Saline, herbal, Mediterranean depth, extended maceration. Sicus is a radical Catalan producer doing deep skin-contact work with indigenous grapes. With pieuvre or halloumi."},
  {n:"Celeste 2018",p:"Domaine De L'écu",pr:180,g:"Chardonnay",r:"Muscadet, Loire",c:"France",cl:"orange",s:"Orange",pf:"Skin-contact Chardonnay from Guy Bossard\'s legendary Muscadet estate. Honeyed, textured, mineral freshness from schist and gneiss soils. An unusual wine from an unusual place — Chardonnay skin-contact in Muscadet country. Complex and thought-provoking."},
  {n:"Bardette 2022",p:"Labet",pr:200,g:"Savagnin",r:"Rotalier, Jura",c:"France",cl:"orange",s:"Orange",pf:"Jura Savagnin from the Labet family in Rotalier. Walnut, curry leaf, dried herbs, distinctive oxidative character. Skin contact adds tannic grip to the Jura\'s already complex flavors. Profound and age-worthy. For the wine enthusiast ready for the deepest end of the pool."},
  {n:"Terre 2022",p:"Roches Neuves",pr:200,g:"Chenin Blanc",r:"Saumur, Loire",c:"France",cl:"orange",s:"Orange",pf:"Skin-contact Chenin from Thierry Germain\'s biodynamic Saumur estate (same producer as our Crémant 24$/105$ and L\'Échelier 225$). Quince, beeswax, tannic grip, intense minerality. Germain\'s most experimental wine. With mouhammara, halloumi, or mutabbal."},
  {n:"Côt Lectif 2023",p:"Quastana",pr:70,g:"Côt",r:"Touraine, Loire",c:"France",cl:"rouge",s:"Rouge — France",pf:"Loire Malbec (called Côt locally) — dark plum, violet, juicy crunchy freshness. Natural, unfiltered, glou-glou (slurpable). Light tannins, bright acidity. The most fun red on our list at a great price. With pastirma, kibbeh frit, or just on its own."},
  {n:"Château Tire Pé 2022",p:"Château Tire Pé",pr:75,g:"Merlot",r:"Entre-Deux-Mers, Bordeaux",c:"France",cl:"rouge",s:"Rouge — France",pf:"Approachable organic Bordeaux Merlot from Entre-Deux-Mers. Ripe plum, soft tannins, smooth easy finish. Not the austere Bordeaux you might expect — this is generous and friendly. Great value red. With humus shawarma or pastirma."},
  {n:"Les Sources 2021",p:"Jean Faux",pr:80,g:"Merlot, Cabernet",r:"Bordeaux Supérieur",c:"France",cl:"rouge",s:"Rouge — France",pf:"Bordeaux Supérieur blend from Château Jean Faux. Dark fruit, herbs, structured elegance. Organic and biodynamic farming. Shows that great Bordeaux doesn\'t need to be expensive. With kebab or kibbeh frit."},
  {n:"Mise en Bouche 2023 (btl)",p:"Darnaud",pr:90,g:"Syrah",r:"Crozes-Hermitage, Rhône",c:"France",cl:"rouge",s:"Rouge — France",pf:"Full bottle of the Crozes-Hermitage also available by glass (21$). Emmanuel Darnaud\'s entry-level northern Rhône — cracked pepper, blackberry, smoked meat, savory finish. Darnaud also makes our Saint-Joseph (162$) and Hermitage (450$). Step into the northern Rhône here."},
  {n:"La Vouivre 2023",p:"Drach",pr:95,g:"Pinot Noir, Gamay",r:"Lorraine",c:"France",cl:"rouge",s:"Rouge — France",pf:"Lorraine blend of Pinot Noir and Gamay — yes, wine from Lorraine! Light, fresh, cherry, herbal character. Drach is reviving winemaking in this nearly-forgotten French region. A curiosity with genuine charm. With shish taouk or lighter mezzés."},
  {n:"La Combe des Cerisiers 2023",p:"L'Atelier Vigneron",pr:100,g:"Syrah",r:"Roussillon",c:"France",cl:"rouge",s:"Rouge — France",pf:"Roussillon Syrah with dark fruit, garrigue, Mediterranean spice, wild herbs. L\'Atelier Vigneron (also our Lladoner Pelut rosé 88$) works with indigenous and rare varieties. Natural winemaking. With kebab or carré d\'agneau."},
  {n:"French Disko 2022",p:"Matassa",pr:108,g:"Cinsault",r:"Roussillon",c:"France",cl:"rouge",s:"Rouge — France",pf:"Cult Cinsault from Tom Lubbe\'s Matassa estate (also our orange Matassa Blanc 115$). Light, electric, cherry, herbal freshness. Cinsault is the elegant, lighter side of the Mediterranean — think Pinot Noir of the south. With kibbeh nayé or shish taouk."},
  {n:"Bourgogne Rouge 2022",p:"Fichet",pr:110,g:"Pinot Noir",r:"Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Pure regional Burgundy Pinot from Fichet (same producer as Meursault 295$, Auxey 188$, Monthélie 165$). Red cherry, earth, silky tannins, elegant and classic. Fichet\'s reds are as reliable as his whites. Entry into serious Burgundy. With kibbeh nayé or shish taouk."},
  {n:"Trousseau des Corvées 2022",p:"Domaine de la Tournelle",pr:110,g:"Trousseau",r:"Arbois, Jura",c:"France",cl:"rouge",s:"Rouge — France",pf:"Jura Trousseau from a top Arbois producer. Cranberry, white pepper, strawberry, ethereal delicacy. Trousseau is pale and light like Pinot but with its own unique wild character. La Tournelle farms biodynamically. For adventurous red drinkers."},
  {n:"Jeunes Vignes 2023",p:"Rouge Gorge",pr:112,g:"Grenache",r:"Roussillon",c:"France",cl:"rouge",s:"Rouge — France",pf:"Young-vine Grenache from Clos du Rouge Gorge — one of Roussillon\'s most exciting estates (also blanc at 220$). Fresh, fruity, Mediterranean herbs. The entry-level wine from a cult address. Great value for the producer\'s quality."},
  {n:"Foun del Bosc 2022",p:"Mas Guallar",pr:115,g:"Carignan",r:"Maury, Roussillon",c:"France",cl:"rouge",s:"Rouge — France",pf:"Old-vine Carignan from Maury\'s schist soils. Dark, intense, garrigue, wild herbs, black fruit. Mas Guallar (also our orange wines) champions Maury\'s distinctive terroir. With kebab or joue de boeuf."},
  {n:"Inopia Rouge 2021",p:"Saouma",pr:115,g:"Grenache",r:"Côtes du Rhône",c:"France",cl:"rouge",s:"Rouge — France",pf:"Southern Rhône Grenache from Saouma (also our Châteauneuf Ariosa 450$). Red fruit, garrigue, sun-baked warmth, silky tannins. Entry into the Saouma world — the same meticulous approach at accessible pricing. With mezzé or lighter grillades."},
  {n:"Trousseau 2022",p:"Touraize",pr:120,g:"Trousseau",r:"Arbois, Jura",c:"France",cl:"rouge",s:"Rouge — France",pf:"Jura Trousseau from Touraize (also our Crémant 110$ and white Voisines 128$). Cranberry, white pepper, translucent ethereal delicacy. Haunting lightness that defies expectations of red wine. With kibbeh nayé or as a \'red\' for white-wine lovers."},
  {n:"Vin des Amis 2023",p:"Clape",pr:145,g:"Syrah",r:"Rhône (Cornas)",c:"France",cl:"rouge",s:"Rouge — France",pf:"From Cornas royalty — the Clape family is the undisputed reference in this appellation. \'Friends Wine\' is their gentler expression: black olive, iron, violets, smoked herbs. More approachable than their grand Cornas. With kebab or carré d\'agneau."},
  {n:"Château Pitray 2020",p:"Château Pitray",pr:145,g:"Merlot",r:"Castillon Côtes de Bordeaux",c:"France",cl:"rouge",s:"Rouge — France",pf:"Right Bank Bordeaux from Castillon — neighbor of Saint-Émilion. Rich Merlot with plum, earth, structured tannins. Pitray has been in the same family since the Middle Ages. Classic, elegant Bordeaux at fair price. With filet mignon or joue de boeuf."},
  {n:"Saint-Joseph 2023",p:"Johann Michel",pr:145,g:"Syrah",r:"Saint Joseph, Rhône",c:"France",cl:"rouge",s:"Rouge — France",pf:"Northern Rhône Saint-Joseph from Johann Michel (also our white Saint-Péray 130$). Pepper, dark fruit, granite minerality, fine tannins. Saint-Joseph offers the northern Rhône Syrah experience at more accessible prices than Hermitage or Cornas. With carré d\'agneau or kebab."},
  {n:"Marginale 2022",p:"Roches Neuves",pr:145,g:"Cabernet Franc",r:"Saumur-Champigny, Loire",c:"France",cl:"rouge",s:"Rouge — France",pf:"Biodynamic Loire Cabernet Franc from Thierry Germain (same as our Crémant, L\'Échelier, Terre...). Violet, graphite, precise mineral drive. Cab Franc at its most elegant. Germain is one of the Loire\'s greatest vignerons. With kebab or filet mignon."},
  {n:"Clos des Grands Voyens 2022",p:"Jeannin-Naltet",pr:160,g:"Pinot Noir",r:"1er Cru Mercurey, Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Premier Cru Mercurey from the same producer as our Aligoté (85$) and white Mercurey (130$). Structured Pinot with cherry, earth, spice, and real finesse. Mercurey offers some of Burgundy\'s best value at Premier Cru level."},
  {n:"La Dardouille 2022",p:"Darnaud",pr:162,g:"Syrah",r:"Saint Joseph, Rhône",c:"France",cl:"rouge",s:"Rouge — France",pf:"Saint-Joseph from Darnaud (also Crozes 21$/90$ and Hermitage 450$). Dark fruit, smoke, northern Rhône minerality. A step up from the Crozes — more depth and complexity. With carré d\'agneau or faux filet Sharat."},
  {n:"Ploussard 2018",p:"Overnoy",pr:175,g:"Poulsard",r:"Arbois-Pupillin, Jura",c:"France",cl:"rouge",s:"Rouge — France",pf:"The holy grail of Jura — Pierre Overnoy is the godfather of natural wine in France. His Poulsard (Ploussard) is translucent, ethereal, haunting: rose hip, cranberry, tea, mushroom, forest floor. Almost impossible to find. If you see this on the list, order it. A piece of wine history."},
  {n:"Pinot Noir 2022",p:"Schueller",pr:180,g:"Pinot Noir",r:"Alsace",c:"France",cl:"rouge",s:"Rouge — France",pf:"Alsatian Pinot Noir from biodynamic producer Schueller (also our Grand Cru Riesling 200$). Red cherry, spice, elegant structure. Alsace Pinot Noir is underrated and underpriced. With kibbeh nayé or shish taouk."},
  {n:"Domaine du Banneret 2022",p:"Banneret",pr:185,g:"Grenache",r:"Châteauneuf-du-Pape, Rhône",c:"France",cl:"rouge",s:"Rouge — France",pf:"Classic Châteauneuf-du-Pape — ripe red fruit, garrigue, lavender, sun-baked warmth. Banneret also makes our white Châteauneuf (200$). The appellation\'s signature blend of Grenache with other Rhône varieties. Full-bodied, generous, spiced. With carré d\'agneau or grillades mixtes."},
  {n:"Roc d'Anglade Rouge 2022",p:"Roc d'Anglade",pr:200,g:"Grenache",r:"Languedoc",c:"France",cl:"rouge",s:"Rouge — France",pf:"Cult Languedoc estate — virtually impossible to find, highly allocated. Garrigue, dark fruit, Mediterranean spice, polished tannins, incredible depth. Also see the blanc (200$) and Reserva Especial (315$). One of southern France\'s greatest wines. With any of our grillades."},
  {n:"Pommard 2016",p:"Giroud",pr:220,g:"Pinot Noir",r:"Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Aged Pommard — one of Burgundy\'s most powerful appellations. Rich, structured Pinot with dark cherry, earth, leather from 8 years of age. Giroud is a respected Beaune négociant. Pommard is for those who want their Burgundy with muscle. With filet mignon or faux filet."},
  {n:"Outre Terre 2022",p:"Roches Neuves",pr:220,g:"Cabernet Franc",r:"Saumur Champigny, Loire",c:"France",cl:"rouge",s:"Rouge — France",pf:"Single-vineyard biodynamic Cab Franc from Thierry Germain. Deep, mineral, violet, graphite, cassis. More structured than Marginale (145$). The name means \'beyond the land.\' With kebab or carré d\'agneau."},
  {n:"La Tourtine 2022",p:"Tempier",pr:220,g:"Mourvèdre",r:"Bandol, Provence",c:"France",cl:"rouge",s:"Rouge — France",pf:"Bandol Mourvèdre from legendary Domaine Tempier — the estate that defined Bandol as a great appellation. Dark, wild, meaty, garrigue, leather. Age-worthy and profound. Mourvèdre at its most noble. With carré d\'agneau or grillades mixtes."},
  {n:"Auguste 2022",p:"Clos des Vignes du Maynes",pr:230,g:"Pinot Fin",r:"Mâconnais, Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Rare Pinot Fin (a Pinot Noir sub-variety) from biodynamic Mâconnais estate. Elegant, perfumed, distinctive. Clos des Vignes du Maynes has been biodynamic since 1954 — one of France\'s oldest. A living monument to organic viticulture."},
  {n:"Grande Réserve 2015",p:"Château des Tours",pr:245,g:"Grenache",r:"Côtes du Rhône",c:"France",cl:"rouge",s:"Rouge — France",pf:"Legendary Côtes du Rhône from Château des Tours — the \'other\' estate of the Rayas family (Châteauneuf\'s most mythical domaine). Deep, complex, age-worthy Grenache that transcends its humble appellation. With 10 years of age, it\'s drinking beautifully. With carré d\'agneau."},
  {n:"Chorey-les-Beaune 2022",p:"Guyon",pr:250,g:"Pinot Noir",r:"Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Chorey-lès-Beaune from Domaine Guyon. Fresh, elegant, classic Burgundy charm. Chorey sits on the plain below the Beaune slope — lighter soils, more accessible wines. A charming Burgundy for the table."},
  {n:"Vieilles Vignes 2022",p:"Eric Texier",pr:255,g:"Grenache",r:"Châteauneuf-du-Pape",c:"France",cl:"rouge",s:"Rouge — France",pf:"Old-vine Châteauneuf from Eric Texier — a former nuclear engineer turned natural winemaker. Concentrated, complex, garrigue, spice. Texier\'s scientific precision applied to minimal-intervention winemaking. With carré d\'agneau or faux filet."},
  {n:"La Charpenterie 2019",p:"Collier",pr:270,g:"Cabernet Franc",r:"Saumur Champigny, Loire",c:"France",cl:"rouge",s:"Rouge — France",pf:"Single-vineyard Loire Cab Franc from Antoine Sanzay (Domaine Collier). Violet, graphite, cassis, mineral tension. One of the Loire\'s rising stars. With kebab or carré d\'agneau."},
  {n:"Volnay 2021",p:"Devevey",pr:270,g:"Pinot Noir",r:"Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Village Volnay from Devevey (also our Savagnin blanc 150$). Elegant red cherry, violet, silky perfumed palate. Volnay is Burgundy\'s most feminine, graceful appellation. Classic finesse. With kibbeh nayé, shish taouk, or simply to sip and contemplate."},
  {n:"Clos Saint Michel 1998",p:"Mousset",pr:300,g:"Grenache",r:"Chateauneuf, Rhône",c:"France",cl:"rouge",s:"Rouge — France",pf:"Aged Châteauneuf with 27 years of evolution. Leather, dried herbs, mushroom, truffle, fading fruit. The pleasure of aged wine — tertiary complexity and silk. Rare to find Châteauneuf this old on a restaurant list. Special occasion wine."},
  {n:"Le Passetemps 2021",p:"Vincent",pr:300,g:"Pinot Noir",r:"1er Cru Santenay, Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Premier Cru Santenay Pinot from Vincent. Structured, deep, elegant Burgundy. Santenay is the southern end of the Côte d\'Or — undervalued and excellent. The name means \'pastime.\' For serious Burgundy enjoyment."},
  {n:"Roc Breïa 2023",p:"Théo Dancer",pr:310,g:"Pinot Noir",r:"Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Rising-star Burgundy from young Théo Dancer. Fresh, precise Pinot with mineral clarity and purity of fruit. A producer whose reputation is growing fast — get these wines while you still can. Future star."},
  {n:"Reserva Especial",p:"Roc D'Anglade",pr:315,g:"Carignan, Mourvèdre",r:"Languedoc",c:"France",cl:"rouge",s:"Rouge — France",pf:"Reserve cuvée from cult Roc d\'Anglade (also rouge 200$ and blanc 200$). Old-vine Carignan-Mourvèdre blend. Dark, complex, massive depth. Decades of aging potential. The summit of Languedoc winemaking."},
  {n:"Genavrières 2013",p:"Domaine Tawse",pr:320,g:"Pinot Noir",r:"1er Cru Morey Saint Denis, Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Aged Premier Cru Morey-Saint-Denis with 12 years of evolution. Earth, truffle, dried roses, silk. Domaine Tawse is a Canadian-owned Burgundy estate. Mature Burgundy is an exquisite experience — this is ready now."},
  {n:"Clos des Aigrots 2020",p:"Lafarge",pr:340,g:"Pinot Noir",r:"1er Cru Beaune, Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Premier Cru Beaune from the legendary Lafarge family — one of Burgundy\'s most respected domaines. Pure, mineral, age-worthy Pinot with cherry, iron, and chalk. Classic, traditional Burgundy winemaking. A reference."},
  {n:"Camille 2018",p:"Robinot",pr:350,g:"Pineau d'Aunis",r:"Jasnières, Loire",c:"France",cl:"rouge",s:"Rouge — France",pf:"Rare Pineau d\'Aunis from natural wine legend Robinot (also sparkling 100$, Chenin 170$). White pepper, cranberry, ethereal and hauntingly light — more like a darker rosé than conventional red. An ancient grape making a comeback. Utterly unique."},
  {n:"Aux Coucherias 2021",p:"Voillot",pr:360,g:"Pinot Noir",r:"1er Cru Beaune, Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Premier Cru Beaune from Joseph Voillot — a traditional Burgundy estate with impeccable reputation. Classic, structured Pinot with cherry, mineral depth, fine tannins. Old-school Burgundy at its best."},
  {n:"Aux Montagnes 2021",p:"Lachaux",pr:375,g:"Pinot Noir",r:"Côtes de Nuits, Bourgogne",c:"France",cl:"rouge",s:"Rouge — France",pf:"Côtes de Nuits from Arnaud Lachaux — nephew of the legendary Lalou Bize-Leroy. Precise, mineral, perfumed. Rising-star producer with illustrious family connections. Wines of great purity and depth."},
